groups:
  - name: aura-status-alerts
    rules:
      - alert: AuraApiDown
        expr: up{job="aura-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Aura API is down"

      - alert: HighErrorRate
        expr: rate(aura_http_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"

      - alert: ActiveIncidentTooLong
        expr: status_incidents_active > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Incident active for more than 30 minutes"
