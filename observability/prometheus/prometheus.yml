global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml
  - /etc/prometheus/payment-rules.yml

scrape_configs:
  - job_name: aura-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - aura-api:5000
        labels:
          service: aura-marketplace-api
          environment: local

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
