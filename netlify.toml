[build]
  command = "npm run build --prefix app"
  publish = "app/dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' https://apis.google.com https://accounts.google.com https://checkout.razorpay.com https://js.stripe.com https://www.google.com https://www.gstatic.com https://www.recaptcha.net https://challenges.cloudflare.com; style-src 'self' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-attr 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://dbtrhsolhec1s.cloudfront.net wss://dbtrhsolhec1s.cloudfront.net https://api.github.com https://api.stripe.com https://js.stripe.com https://hooks.stripe.com https://checkout.razorpay.com https://api.razorpay.com https://*.razorpay.com https://*.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com https://firebaselogging.googleapis.com https://www.google.com https://www.gstatic.com https://www.recaptcha.net https://challenges.cloudflare.com https://*.firebaseio.com https://*.firebaseapp.com https://*.web.app https://*.livekit.cloud wss://*.livekit.cloud; frame-src 'self' https://accounts.google.com https://checkout.razorpay.com https://js.stripe.com https://hooks.stripe.com https://www.google.com https://www.recaptcha.net https://challenges.cloudflare.com https://*.firebaseapp.com https://*.web.app https://app.powerbi.com; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(), payment=(self), usb=(), serial=(), bluetooth=()"

[[redirects]]
  from = "/socket.io"
  to = "https://dbtrhsolhec1s.cloudfront.net/socket.io/"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://dbtrhsolhec1s.cloudfront.net/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://dbtrhsolhec1s.cloudfront.net/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://dbtrhsolhec1s.cloudfront.net/health"
  status = 200
  force = true

[[redirects]]
  from = "/health/ready"
  to = "https://dbtrhsolhec1s.cloudfront.net/health/ready"
  status = 200
  force = true

[[redirects]]
  from = "/health/live"
  to = "https://dbtrhsolhec1s.cloudfront.net/health/live"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://dbtrhsolhec1s.cloudfront.net/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
