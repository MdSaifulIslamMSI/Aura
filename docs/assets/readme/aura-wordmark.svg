<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Aura Marketplace wordmark</title>
  <desc id="desc">A polished Aura Marketplace wordmark for the repository README.</desc>
  <defs>
    <linearGradient id="aura" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#30f2e8"/>
      <stop offset="0.48" stop-color="#1ac4af"/>
      <stop offset="1" stop-color="#7c8cff"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071723"/>
      <stop offset="1" stop-color="#0b2427"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.9 0 0 0 0 0.82 0 0 0 0.42 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { fill: #f8fbff; font: 800 78px Arial, sans-serif; letter-spacing: 4px; }
      .sub { fill: #9fb7c7; font: 700 20px Arial, sans-serif; letter-spacing: 5px; }
      .micro { fill: #34ded0; font: 700 16px Arial, sans-serif; letter-spacing: 4px; }
      .rule { stroke: #1e6073; stroke-width: 2; }
    </style>
  </defs>

  <rect x="18" y="18" width="924" height="224" rx="36" fill="url(#plate)" stroke="#155167" stroke-width="2"/>
  <g transform="translate(92 74)" filter="url(#glow)">
    <circle cx="58" cy="58" r="50" fill="#06151f" stroke="url(#aura)" stroke-width="5"/>
    <path d="M58 19 L84 93 H72 L66 76 H49 L43 93 H31 L58 19 Z M52 64 H63 L58 46 Z" fill="url(#aura)"/>
    <path d="M88 31 C110 52 111 83 91 104" fill="none" stroke="#30f2e8" stroke-width="7" stroke-linecap="round"/>
    <path d="M28 31 C6 52 5 83 25 104" fill="none" stroke="#7c8cff" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="214" y="120" class="title">AURA</text>
  <text x="218" y="158" class="sub">MARKETPLACE</text>
  <line x1="218" y1="184" x2="782" y2="184" class="rule"/>
  <text x="220" y="213" class="micro">AI COMMERCE  |  SECURE CHECKOUT  |  GATED RELEASES</text>
</svg>
