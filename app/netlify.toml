[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/socket.io"
  to = "http://3.109.181.238:5000/socket.io/"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "http://3.109.181.238:5000/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "http://3.109.181.238:5000/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "http://3.109.181.238:5000/health"
  status = 200
  force = true

[[redirects]]
  from = "/health/ready"
  to = "http://3.109.181.238:5000/health/ready"
  status = 200
  force = true

[[redirects]]
  from = "/health/live"
  to = "http://3.109.181.238:5000/health/live"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "http://3.109.181.238:5000/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
