[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/socket.io"
  to = "https://api.aurapilot.example.com/socket.io/"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://api.aurapilot.example.com/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://api.aurapilot.example.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://api.aurapilot.example.com/health"
  status = 200
  force = true

[[redirects]]
  from = "/health/ready"
  to = "https://api.aurapilot.example.com/health/ready"
  status = 200
  force = true

[[redirects]]
  from = "/health/live"
  to = "https://api.aurapilot.example.com/health/live"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://api.aurapilot.example.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
