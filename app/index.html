<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#06b6d4" />
  <meta name="description"
    content="Aura — Premium e-commerce + peer-to-peer marketplace with Trade-In, Price Alerts & Voice Search" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aura" />
  <link rel="manifest" href="/manifest.json" />
  <title>Aura — Hybrid Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        const cleanupKey = 'aura-sw-cleanup-v2';
        let hadRegistration = false;
        let hadAuraCache = false;

        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          hadRegistration = registrations.length > 0;
          await Promise.all(registrations.map((registration) => registration.unregister()));
        } catch (_) {}

        try {
          if ('caches' in window) {
            const cacheKeys = await caches.keys();
            const auraCacheKeys = cacheKeys.filter((key) => key.startsWith('aura-'));
            hadAuraCache = auraCacheKeys.length > 0;
            await Promise.all(auraCacheKeys.map((key) => caches.delete(key)));
          }
        } catch (_) {}

        if ((hadRegistration || hadAuraCache || navigator.serviceWorker.controller) && !sessionStorage.getItem(cleanupKey)) {
          sessionStorage.setItem(cleanupKey, '1');
          window.location.reload();
          return;
        }

        sessionStorage.removeItem(cleanupKey);
      });
    }
  </script>
</body>

</html>
