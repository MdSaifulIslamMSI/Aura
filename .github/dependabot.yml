version: 2

updates:
  - package-ecosystem: npm
    directories:
      - /
      - /app
      - /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directories:
      - /
      - /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
