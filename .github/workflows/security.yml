name: Security Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      STAGING_URL: ${{ vars.STAGING_URL || '' }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL || '' }}
      STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL || '' }}
      STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL || '' }}
      STAGING_SSM_PREFIX: ${{ vars.STAGING_SSM_PREFIX || '' }}

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install app dependencies
        run: npm --prefix app ci

      - name: Run regression tests
        run: npm test

      - name: Validate environment contract
        run: npm run env:validate

      - name: Validate auth environment contract
        run: npm run auth:env:validate

      - name: Run auth smoke contract
        run: npm run auth:smoke

      - name: Run smoke preflight without live requests
        run: npm run smoke:preflight

      - name: Scan for production fallback regressions
        run: npm run scan:prod-fallbacks

      - name: Run high/critical dependency gate
        run: npm run security:deps

      - name: Run Gitleaks secret scan
        run: npm run security:gitleaks

      - name: Run Semgrep static analysis
        run: npm run security:semgrep

      - name: Run Trivy filesystem scan
        run: npm run security:trivy

      - name: Run Hadolint Dockerfile scan
        run: npm run security:hadolint

      - name: Run IaC scanner bundle
        run: npm run security:iac

      - name: Generate npm SBOMs
        run: npm run sbom:generate

      - name: Run OWASP ZAP baseline against staging
        if: ${{ env.STAGING_URL != '' }}
        env:
          SMOKE_TARGET_ENV: staging
          SMOKE_BASE_URL: ${{ env.STAGING_URL }}
        run: |
          npm run smoke:preflight
          npm run security:zap -- "$STAGING_URL"

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-gate-reports
          path: security-reports/
          retention-days: 14

  docker-image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: security

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Run Trivy image scan
        run: npm run security:trivy:image

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('security-reports/trivy-image.sarif') != ''
        with:
          sarif_file: security-reports/trivy-image.sarif
          category: trivy-image

      - name: Upload image security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docker-image-security-reports
          path: security-reports/
          retention-days: 14
