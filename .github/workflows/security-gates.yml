name: Security Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write
  attestations: write

concurrency:
  group: security-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm --prefix server ci
      - name: Run regression tests
        run: npm test

  environment-contract:
    name: Environment Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate default environment contract
        run: npm run env:validate
      - name: Validate auth environment contract
        run: npm run auth:env:validate
      - name: Run auth smoke contract
        run: npm run auth:smoke
      - name: Run non-live smoke preflight
        run: npm run smoke:preflight
      - name: Scan for unsafe production fallbacks
        run: npm run scan:prod-fallbacks

  evidence:
    name: Evidence Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify security evidence map
        run: npm run security:evidence

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run high and critical dependency audit
        run: npm run security:deps

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Block newly introduced high-risk dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Gitleaks
        run: npm run security:gitleaks
      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('security-reports/gitleaks-report.sarif') != ''
        with:
          sarif_file: security-reports/gitleaks-report.sarif
          category: gitleaks
      - name: Upload secret scan report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-report
          path: |
            security-reports/gitleaks-report.json
            security-reports/gitleaks-report.sarif
          retention-days: 30

  sast:
    name: SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Semgrep
        run: npm run security:semgrep
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('security-reports/semgrep-report.sarif') != ''
        with:
          sarif_file: security-reports/semgrep-report.sarif
          category: semgrep
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: semgrep-report
          path: |
            security-reports/semgrep-report.json
            security-reports/semgrep-report.sarif
          retention-days: 30

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Trivy filesystem scan
        run: npm run security:trivy
      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('security-reports/trivy-fs.sarif') != ''
        with:
          sarif_file: security-reports/trivy-fs.sarif
          category: trivy-filesystem
      - name: Upload Trivy filesystem reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-fs-reports
          path: |
            security-reports/trivy-fs.json
            security-reports/trivy-fs.sarif
            security-reports/trivy-fs-table.txt
          retention-days: 30

  iac-security:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Run Checkov, tfsec, and Terrascan
        run: npm run security:iac
      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('security-reports/checkov-report.sarif') != ''
        with:
          sarif_file: security-reports/checkov-report.sarif
          category: checkov
      - name: Upload IaC security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: iac-security-reports
          path: |
            security-reports/checkov-report.json
            security-reports/checkov-report.sarif
            security-reports/tfsec-report.json
            security-reports/terrascan-report.json
          if-no-files-found: error
          retention-days: 30

  supply-chain-integrity:
    name: Supply Chain Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Verify action and scanner image pins
        run: npm run security:supply-chain-pins
      - name: Verify code scanning SARIF contract
        run: npm run security:sarif-contract

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Attest SBOM provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  zap-baseline:
    name: DAST - OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [tests]
    env:
      STAGING_URL: ${{ vars.STAGING_URL || '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Resolve ZAP target
        id: zap-target
        shell: bash
        env:
          SMOKE_TARGET_ENV: ${{ env.STAGING_URL != '' && 'staging' || 'local' }}
          SMOKE_BASE_URL: ${{ env.STAGING_URL != '' && env.STAGING_URL || 'http://127.0.0.1:4173' }}
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL || '' }}
          STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL || '' }}
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL || '' }}
          STAGING_SSM_PREFIX: ${{ vars.STAGING_SSM_PREFIX || '' }}
        run: |
          if [ -n "$STAGING_URL" ]; then
            npm run smoke:preflight
            echo "target=$STAGING_URL" >> "$GITHUB_OUTPUT"
            echo "mode=external-staging" >> "$GITHUB_OUTPUT"
          else
            echo "target=http://127.0.0.1:4173" >> "$GITHUB_OUTPUT"
            echo "mode=local-preview" >> "$GITHUB_OUTPUT"
          fi
      - name: Install frontend dependencies
        if: steps.zap-target.outputs.mode == 'local-preview'
        run: npm --prefix app ci
      - name: Build local frontend preview
        if: steps.zap-target.outputs.mode == 'local-preview'
        run: npm --prefix app run build
      - name: Start local frontend preview
        if: steps.zap-target.outputs.mode == 'local-preview'
        shell: bash
        run: |
          npm --prefix app run preview -- --host 0.0.0.0 --port 4173 > "$RUNNER_TEMP/aura-vite-preview.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/aura-vite-preview.pid"
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:4173" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/aura-vite-preview.log"
          exit 1
      - name: Run ZAP baseline against staging
        run: npm run security:zap -- "${{ steps.zap-target.outputs.target }}"
        env:
          SMOKE_TARGET_ENV: ${{ env.STAGING_URL != '' && 'staging' || 'local' }}
          SMOKE_BASE_URL: ${{ env.STAGING_URL != '' && env.STAGING_URL || 'http://127.0.0.1:4173' }}
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL || '' }}
          STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL || '' }}
          STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL || '' }}
          STAGING_SSM_PREFIX: ${{ vars.STAGING_SSM_PREFIX || '' }}
      - name: Upload ZAP reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-baseline-report
          path: |
            security-reports/zap-baseline.html
            security-reports/zap-baseline.json
            security-reports/zap-baseline.md
          if-no-files-found: error
          retention-days: 30

  security-suite:
    name: Focused Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [tests]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm --prefix server ci
      - name: Run auth, authorization, upload, webhook, rate-limit, header, and logging tests
        run: |
          npm run security:auth
          npm run security:access-control
          npm run security:tokens
          npm run security:rate-limit
          npm run security:cors-csrf
          npm run security:admin
          npm run security:routes:coverage:strict
          npm run security:pqc:proof:strict
          npm run security:pqc:scorecard:strict
          npm run security:pqc:provider-register
          npm run security:pqc:real-target
          npm run traffic:fortress:test
          npm run security:traffic:matrix:strict
          npm run security:traffic:rate-limits:strict
          npm run security:traffic:proof:strict
          npm run security:maturity:strict
          npm run security:webhooks
          npm run security:headers
          npm run security:logging
          npm run security:malware-runtime
      - name: Upload PQC and traffic fortress reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pqc-traffic-fortress-reports
          path: |
            reports/security/pqc-real-target-proof.json
            reports/security/pqc-real-target-proof.md
            reports/security/traffic-resilience-matrix.json
            reports/security/traffic-resilience-matrix.md
            reports/security/rate-limit-coverage.json
            reports/security/rate-limit-coverage.md
            reports/security/traffic-resilience-proof.json
            reports/security/traffic-resilience-proof.md
            reports/security/security-maturity-scorecard.json
            reports/security/security-maturity-scorecard.md
          if-no-files-found: ignore
          retention-days: 14
