name: Security Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

concurrency:
  group: security-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm --prefix server ci
      - name: Run regression tests
        run: npm test

  evidence:
    name: Evidence Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify security evidence map
        run: npm run security:evidence

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run high and critical dependency audit
        run: npm run security:deps

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Gitleaks
        run: npm run security:gitleaks
      - name: Upload secret scan report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json
          retention-days: 30

  sast:
    name: SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Semgrep
        run: npm run security:semgrep
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: semgrep-report
          path: security-reports/semgrep-report.json
          retention-days: 30

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Trivy filesystem scan
        run: npm run security:trivy
      - name: Upload Trivy filesystem reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-fs-reports
          path: |
            security-reports/trivy-fs.json
            security-reports/trivy-fs-table.txt
          retention-days: 30

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  zap-baseline:
    name: DAST - OWASP ZAP Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [tests]
    env:
      STAGING_URL: ${{ vars.STAGING_URL || '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Resolve ZAP target
        id: zap-target
        shell: bash
        run: |
          if [ -n "$STAGING_URL" ]; then
            echo "target=$STAGING_URL" >> "$GITHUB_OUTPUT"
            echo "mode=external-staging" >> "$GITHUB_OUTPUT"
          else
            echo "target=http://127.0.0.1:4173" >> "$GITHUB_OUTPUT"
            echo "mode=local-preview" >> "$GITHUB_OUTPUT"
          fi
      - name: Install frontend dependencies
        if: steps.zap-target.outputs.mode == 'local-preview'
        run: npm --prefix app ci
      - name: Build local frontend preview
        if: steps.zap-target.outputs.mode == 'local-preview'
        run: npm --prefix app run build
      - name: Start local frontend preview
        if: steps.zap-target.outputs.mode == 'local-preview'
        shell: bash
        run: |
          npm --prefix app run preview -- --host 0.0.0.0 --port 4173 > "$RUNNER_TEMP/aura-vite-preview.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/aura-vite-preview.pid"
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:4173" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/aura-vite-preview.log"
          exit 1
      - name: Run ZAP baseline against staging
        run: npm run security:zap -- "${{ steps.zap-target.outputs.target }}"
      - name: Upload ZAP reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-baseline-report
          path: |
            security-reports/zap-baseline.html
            security-reports/zap-baseline.json
            security-reports/zap-baseline.md
          if-no-files-found: error
          retention-days: 30

  security-suite:
    name: Focused Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [tests]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: npm --prefix server ci
      - name: Run auth, authorization, upload, webhook, rate-limit, header, and logging tests
        run: |
          npm run security:auth
          npm run security:access-control
          npm run security:tokens
          npm run security:rate-limit
          npm run security:cors-csrf
          npm run security:admin
          npm run security:webhooks
          npm run security:headers
          npm run security:logging
          npm run security:malware-runtime
