name: Deploy Backend To Azure

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'infra/azure/**'
      - '.dockerignore'
      - '.github/workflows/deploy-backend-azure.yml'
      - '.github/workflows/rollback-backend-azure.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || '03748f55-bdf3-4f48-8f88-303b118193b2' }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || '7f9460de-1fc8-477a-b8ba-80609bc24a31' }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || 'f7bef511-7ed6-4896-a010-45e5ecd699ef' }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'rg-aura-prod' }}
  ACR_NAME: ${{ vars.ACR_NAME || 'auramsi20260318acr' }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER || 'auramsi20260318acr.azurecr.io' }}
  IMAGE_NAME: ${{ vars.ACR_IMAGE_NAME || 'aura-backend' }}
  API_APP_NAME: ${{ vars.API_APP_NAME || 'aura-msi-api-ca' }}
  WORKER_APP_NAME: ${{ vars.WORKER_APP_NAME || 'aura-msi-worker-ca' }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME || 'aura-msi-20260318-kv' }}
  CONTAINER_ENV_NAME: ${{ vars.CONTAINER_ENV_NAME || 'aura-msi-ca-env' }}
  BACKEND_IDENTITY_NAME: ${{ vars.BACKEND_IDENTITY_NAME || 'aura-msi-backend-id' }}
  HEALTH_PATH: ${{ vars.AZURE_HEALTH_PATH || '/health' }}
  HEALTH_TIMEOUT_SECONDS: ${{ vars.AZURE_HEALTH_TIMEOUT_SECONDS || '240' }}
  HEALTH_POLL_INTERVAL_SECONDS: ${{ vars.AZURE_HEALTH_POLL_INTERVAL_SECONDS || '10' }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Run controlled assistant backend regressions
        working-directory: ./server
        env:
          NODE_ENV: test
        run: >
          npx jest --runInBand --runTestsByPath
          tests/aiRoutes.test.js
          tests/healthRoutes.test.js
          tests/commerceAssistantService.test.js
          tests/geminiGatewayService.test.js
          tests/modelGatewayService.test.js
          tests/ollamaGatewayService.test.js
          tests/runtimeConfig.test.js

      - name: Validate Azure runtime templates in dry-run mode
        shell: pwsh
        run: |
          & ".\\infra\\azure\\sync-containerapps-runtime.ps1" `
            -SourceEnvFile ".\\server\\.env.azure-secrets.example" `
            -DryRun `
            -PlanOutputPath "${{ runner.temp }}\\azure-runtime-plan.json"

      - name: Set release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          build_ts="$(date -u +%Y%m%d%H%M%S)"
          image_tag="${build_ts}-${short_sha}"
          revision_suffix="r${GITHUB_RUN_NUMBER}-${short_sha:0:7}"

          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "revision_suffix=${revision_suffix}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${image_tag}" >> "${GITHUB_OUTPUT}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare Azure Container Apps CLI
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade

      - name: Build and push backend image via Azure Container Registry
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "${ACR_NAME}" \
            --image "${IMAGE_NAME}:${{ steps.meta.outputs.image_tag }}" \
            --file server/Dockerfile \
            server

      - name: Materialize optional Azure runtime env file
        id: runtime_env
        shell: bash
        env:
          AZURE_RUNTIME_ENV_FILE: ${{ secrets.AZURE_RUNTIME_ENV_FILE }}
        run: |
          set -euo pipefail
          if [[ -n "${AZURE_RUNTIME_ENV_FILE:-}" ]]; then
            env_file="${RUNNER_TEMP}/azure-runtime.env"
            printf '%s' "${AZURE_RUNTIME_ENV_FILE}" > "${env_file}"
            echo "path=${env_file}" >> "${GITHUB_OUTPUT}"
            echo "sync_secrets=true" >> "${GITHUB_OUTPUT}"
          else
            echo "path=" >> "${GITHUB_OUTPUT}"
            echo "sync_secrets=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Sync Azure runtime configuration
        shell: pwsh
        env:
          SOURCE_ENV_FILE: ${{ steps.runtime_env.outputs.path }}
          SYNC_SECRETS: ${{ steps.runtime_env.outputs.sync_secrets }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || '' }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL || '' }}
          APP_BUILD_SHA: ${{ github.sha }}
        run: |
          if ($env:SYNC_SECRETS -eq "true") {
            & ".\\infra\\azure\\sync-containerapps-runtime.ps1" `
              -ResourceGroup "${{ env.RESOURCE_GROUP }}" `
              -KeyVaultName "${{ env.KEY_VAULT_NAME }}" `
              -ContainerEnvName "${{ env.CONTAINER_ENV_NAME }}" `
              -IdentityName "${{ env.BACKEND_IDENTITY_NAME }}" `
              -ApiAppName "${{ env.API_APP_NAME }}" `
              -WorkerAppName "${{ env.WORKER_APP_NAME }}" `
              -ApiImageRef "${{ steps.meta.outputs.image_ref }}" `
              -WorkerImageRef "${{ steps.meta.outputs.image_ref }}" `
              -SourceEnvFile "${env:SOURCE_ENV_FILE}" `
              -SyncKeyVaultSecrets `
              -FrontendOrigin "${env:FRONTEND_ORIGIN}" `
              -ApiPublicUrl "${env:API_PUBLIC_URL}"
          } else {
            & ".\\infra\\azure\\sync-containerapps-runtime.ps1" `
              -ResourceGroup "${{ env.RESOURCE_GROUP }}" `
              -KeyVaultName "${{ env.KEY_VAULT_NAME }}" `
              -ContainerEnvName "${{ env.CONTAINER_ENV_NAME }}" `
              -IdentityName "${{ env.BACKEND_IDENTITY_NAME }}" `
              -ApiAppName "${{ env.API_APP_NAME }}" `
              -WorkerAppName "${{ env.WORKER_APP_NAME }}" `
              -ApiImageRef "${{ steps.meta.outputs.image_ref }}" `
              -WorkerImageRef "${{ steps.meta.outputs.image_ref }}" `
              -FrontendOrigin "${env:FRONTEND_ORIGIN}" `
              -ApiPublicUrl "${env:API_PUBLIC_URL}"
          }

      - name: Verify Azure runtime configuration
        if: steps.runtime_env.outputs.path != ''
        shell: pwsh
        env:
          SOURCE_ENV_FILE: ${{ steps.runtime_env.outputs.path }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || '' }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL || '' }}
        run: |
          & ".\\infra\\azure\\verify-containerapps-runtime.ps1" `
            -ResourceGroup "${{ env.RESOURCE_GROUP }}" `
            -KeyVaultName "${{ env.KEY_VAULT_NAME }}" `
            -ApiAppName "${{ env.API_APP_NAME }}" `
            -WorkerAppName "${{ env.WORKER_APP_NAME }}" `
            -SourceEnvFile "${env:SOURCE_ENV_FILE}" `
            -FrontendOrigin "${env:FRONTEND_ORIGIN}" `
            -ApiPublicUrl "${env:API_PUBLIC_URL}" `
            -ReportOutputPath "${{ runner.temp }}/azure-runtime-verify.json"

      - name: Promote image through health-gated release
        id: release
        shell: bash
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
          REVISION_SUFFIX: ${{ steps.meta.outputs.revision_suffix }}
        run: |
          set -euo pipefail
          bash infra/azure/promote-containerapps.sh

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Azure Backend Deployment"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.image_ref }}\`"
            echo "- API revision: \`${{ steps.release.outputs.candidate_api_revision }}\`"
            echo "- Worker revision: \`${{ steps.release.outputs.candidate_worker_revision }}\`"
            echo "- Key Vault: \`${{ env.KEY_VAULT_NAME }}\`"
            echo "- API URL: [https://${{ steps.release.outputs.production_fqdn }}](https://${{ steps.release.outputs.production_fqdn }})"
            echo "- Previous API revision: \`${{ steps.release.outputs.previous_api_revision }}\`"
            echo "- Previous worker image: \`${{ steps.release.outputs.previous_worker_image }}\`"
            echo "- Frontend routing sync: \`powershell -ExecutionPolicy Bypass -File infra/azure/sync-frontend-routing.ps1 -BackendUrl https://${{ steps.release.outputs.production_fqdn }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
