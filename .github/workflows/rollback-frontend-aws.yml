name: Rollback Frontend AWS

on:
  workflow_call:
    inputs:
      rollback_ref:
        description: Optional git ref/version to roll back to
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollback:
    name: Roll back AWS S3 / CloudFront storefront
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.rollback_ref != '' && inputs.rollback_ref || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN || secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Setup Node.js for rebuild fallback
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Execute AWS frontend rollback hook
        env:
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
          AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET }}
          AWS_FRONTEND_DISTRIBUTION_ID: ${{ vars.AWS_FRONTEND_DISTRIBUTION_ID }}
          AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL }}
          AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
        run: |
          set -euo pipefail

          if [ -f "infra/aws/rollback-frontend-s3.sh" ]; then
            bash infra/aws/rollback-frontend-s3.sh
          elif [ -f "infra/aws/rollback-frontend-s3.ps1" ]; then
            pwsh -NoLogo -NoProfile -File infra/aws/rollback-frontend-s3.ps1
          else
            echo "::error::Missing rollback hook: infra/aws/rollback-frontend-s3.sh or infra/aws/rollback-frontend-s3.ps1"
            echo "Create one hook that restores the previous S3 release prefix and invalidates CloudFront."
            exit 1
          fi
