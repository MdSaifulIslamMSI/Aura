name: Rollback Frontend AWS

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      rollback_ref:
        description: Optional completed AWS frontend snapshot id to restore
        required: false
        default: ""
        type: string
      execute_rollback:
        description: Allow a trusted reusable-workflow caller to execute the rollback hook
        required: false
        default: false
        type: boolean
      parent_holds_production_lock:
        description: Internal only; the reusable-workflow caller already owns the shared production mutation lock
        required: false
        default: false
        type: boolean
    secrets:
      AWS_FRONTEND_DEPLOY_ROLE_ARN:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ inputs.parent_holds_production_lock == true && format('aura-production-parent-{0}-rollback-frontend-aws', github.run_id) || 'aura-production-mutation' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

jobs:
  rollback:
    name: Roll back AWS S3 / CloudFront storefront
    runs-on: ubuntu-latest
    # The deploy role trusts the main-branch OIDC subject. A GitHub Environment
    # changes that subject, so do not add one without updating and verifying IAM.

    steps:
      - name: Checkout
        if: inputs.execute_rollback == true
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
        with:
          role-to-assume: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN || secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Verify AWS rollback identity
        run: aws sts get-caller-identity --query Account --output text > /dev/null

      - name: Execute AWS frontend rollback hook
        if: inputs.execute_rollback == true
        env:
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
          AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET }}
          AWS_FRONTEND_DISTRIBUTION_ID: ${{ vars.AWS_FRONTEND_DISTRIBUTION_ID }}
          AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL }}
        run: |
          set -euo pipefail

          if [ -f "infra/aws/rollback-frontend-s3.sh" ]; then
            bash infra/aws/rollback-frontend-s3.sh
          elif [ -f "infra/aws/rollback-frontend-s3.ps1" ]; then
            pwsh -NoLogo -NoProfile -File infra/aws/rollback-frontend-s3.ps1
          else
            echo "::error::Missing rollback hook: infra/aws/rollback-frontend-s3.sh or infra/aws/rollback-frontend-s3.ps1"
            echo "Create one hook that restores the previous S3 release prefix and invalidates CloudFront."
            exit 1
          fi

      - name: Confirm credential-only validation
        if: inputs.execute_rollback != true
        run: echo "AWS rollback credential validation passed; no rollback hook was executed."
