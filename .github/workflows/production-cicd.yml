name: Production CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "desktop/**"
      - "gateway/**"
      - "server/**"
      - "infra/aws/**"
      - "netlify.toml"
      - ".netlifyignore"
      - "vercel.json"
      - "app/vercel.json"
      - "gateway/vercel.json"
      - ".vercelignore"
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"
      - "fastlane/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend to AWS
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: Deploy storefront to Netlify, Vercel, and AWS S3
        required: false
        default: true
        type: boolean
      deploy_gateway:
        description: Deploy gateway to Vercel
        required: false
        default: true
        type: boolean
      release_desktop:
        description: Build and publish desktop GitHub Release
        required: false
        default: true
        type: boolean
      release_mobile:
        description: Build and publish mobile GitHub Release
        required: false
        default: true
        type: boolean
      desktop_version:
        description: Optional desktop version, for example 1.2.0
        required: false
        default: ""
        type: string
      mobile_version:
        description: Optional mobile version, for example 1.2.0
        required: false
        default: ""
        type: string
      skip_backend_healthcheck:
        description: Skip backend readiness check after AWS deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: production-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      gateway: ${{ steps.filter.outputs.gateway }}
      desktop: ${{ steps.filter.outputs.desktop }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "server/**"
              - "infra/aws/**"
              - ".github/workflows/ci.yml"
              - ".github/workflows/deploy-backend-aws.yml"
              - ".github/workflows/production-cicd.yml"
            frontend:
              - "app/**"
              - "netlify.toml"
              - ".netlifyignore"
              - "vercel.json"
              - "app/vercel.json"
              - ".vercelignore"
              - ".github/workflows/ci.yml"
              - ".github/workflows/deploy-netlify.yml"
              - ".github/workflows/deploy-frontend-aws.yml"
              - ".github/workflows/production-cicd.yml"
              - "infra/aws/bootstrap-frontend-s3.ps1"
              - "infra/aws/bootstrap-frontend-github-oidc.ps1"
              - "infra/aws/deploy-frontend-s3.ps1"
              - "docs/aws-frontend-deployment.md"
            gateway:
              - "gateway/**"
              - "gateway/vercel.json"
              - ".vercelignore"
              - ".github/workflows/ci.yml"
              - ".github/workflows/deploy-gateway-vercel.yml"
              - ".github/workflows/production-cicd.yml"
            desktop:
              - "app/**"
              - "desktop/**"
              - "package.json"
              - "package-lock.json"
              - ".github/workflows/ci.yml"
              - ".github/workflows/desktop-release.yml"
              - ".github/workflows/production-cicd.yml"
            mobile:
              - "app/capacitor.config.ts"
              - "app/android/**"
              - "app/ios/**"
              - "app/package.json"
              - "app/package-lock.json"
              - "app/src/config/firebase.js"
              - "app/src/context/AuthContext.jsx"
              - "app/src/context/NotificationContext.jsx"
              - "app/src/context/SocketContext.jsx"
              - "app/src/context/VideoCallContext.jsx"
              - "app/src/services/deviceTrustClient.js"
              - "app/src/services/mobileReleaseChannel.js"
              - "app/src/services/nativeAppExperience.js"
              - "app/src/services/nativeSocialAuth.js"
              - "app/src/components/shared/MobileUpdateBanner.jsx"
              - "app/src/utils/nativeRuntime.js"
              - "Gemfile"
              - "Gemfile.lock"
              - "fastlane/**"
              - "docs/mobile-app-delivery.md"
              - "README.md"
              - ".github/workflows/mobile-release.yml"
              - ".github/workflows/production-cicd.yml"

  ci:
    name: Quality gates
    uses: ./.github/workflows/ci.yml

  production-deploy-config:
    name: Detect production deploy configuration
    runs-on: ubuntu-latest
    outputs:
      backend_ready: ${{ steps.detect.outputs.backend_ready }}
      frontend_ready: ${{ steps.detect.outputs.frontend_ready }}
      gateway_ready: ${{ steps.detect.outputs.gateway_ready }}
    steps:
      - name: Check deploy credentials and hosted origins
        id: detect
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN || '' }}
          AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET || '' }}
          AWS_INSTANCE_TAG_VALUE: ${{ vars.AWS_INSTANCE_TAG_VALUE || '' }}
          AWS_PARAMETER_STORE_PATH_PREFIX: ${{ vars.AWS_PARAMETER_STORE_PATH_PREFIX || '' }}
          AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN || '' }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID || secrets.NETLIFY_SITE_ID || '' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || '' }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || secrets.VERCEL_ORG_ID || '' }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID || '' }}
          AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET || '' }}
          AWS_FRONTEND_DISTRIBUTION_ID: ${{ vars.AWS_FRONTEND_DISTRIBUTION_ID || '' }}
          AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL || '' }}
          AWS_FRONTEND_DEPLOY_ROLE_ARN: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN || secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN || '' }}
        run: |
          set -euo pipefail

          check_group() {
            local group="$1"
            shift
            local ready="true"

            for name in "$@"; do
              local value
              value="$(printenv "$name" || true)"
              if [ -z "${value}" ]; then
                echo "::warning::Missing ${name}; automatic ${group} production deploy will be skipped on push."
                ready="false"
              fi
            done

            echo "${group}_ready=${ready}" >> "$GITHUB_OUTPUT"
            echo "${group} production deploy ready: ${ready}"
          }

          check_group backend \
            AWS_DEPLOY_ROLE_ARN \
            AWS_DEPLOY_BUCKET \
            AWS_INSTANCE_TAG_VALUE \
            AWS_PARAMETER_STORE_PATH_PREFIX \
            AURA_BACKEND_ORIGIN

          check_group frontend \
            NETLIFY_AUTH_TOKEN \
            NETLIFY_SITE_ID \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            AWS_FRONTEND_BUCKET \
            AWS_FRONTEND_DISTRIBUTION_ID \
            AWS_FRONTEND_PUBLIC_URL \
            AWS_FRONTEND_DEPLOY_ROLE_ARN \
            AURA_BACKEND_ORIGIN

          check_group gateway VERCEL_TOKEN

  deploy-backend:
    name: Deploy backend to AWS
    needs:
      - changes
      - ci
      - production-deploy-config
    if: |
      (
        github.event_name == 'push' &&
        needs.changes.outputs.backend == 'true' &&
        needs.production-deploy-config.outputs.backend_ready == 'true'
      ) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend == true)
    uses: ./.github/workflows/deploy-backend-aws.yml
    with:
      git_ref: ${{ github.sha }}
      skip_healthcheck: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_backend_healthcheck || false }}
    secrets: inherit

  deploy-frontend:
    name: Deploy storefront
    needs:
      - changes
      - ci
      - production-deploy-config
    if: |
      (
        github.event_name == 'push' &&
        needs.changes.outputs.frontend == 'true' &&
        needs.production-deploy-config.outputs.frontend_ready == 'true'
      ) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true)
    uses: ./.github/workflows/deploy-netlify.yml
    with:
      target: production
    secrets: inherit

  deploy-gateway:
    name: Deploy gateway
    needs:
      - changes
      - ci
      - production-deploy-config
    if: |
      (
        github.event_name == 'push' &&
        needs.changes.outputs.gateway == 'true' &&
        needs.production-deploy-config.outputs.gateway_ready == 'true'
      ) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_gateway == true)
    uses: ./.github/workflows/deploy-gateway-vercel.yml
    with:
      target: production
    secrets: inherit

  release-desktop:
    name: Publish desktop apps
    needs:
      - changes
      - ci
      - deploy-backend
      - deploy-frontend
      - deploy-gateway
    if: |
      always() &&
      (
        (github.event_name == 'push' && needs.changes.outputs.desktop == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.release_desktop == true)
      ) &&
      needs.ci.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped')
    uses: ./.github/workflows/desktop-release.yml
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.desktop_version || '' }}
      require_windows_signing: false
    secrets: inherit

  release-mobile:
    name: Publish mobile apps
    needs:
      - changes
      - ci
      - deploy-backend
      - deploy-frontend
      - deploy-gateway
      - release-desktop
    if: |
      always() &&
      (
        (github.event_name == 'push' && needs.changes.outputs.mobile == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.release_mobile == true)
      ) &&
      needs.ci.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') &&
      (needs.release-desktop.result == 'success' || needs.release-desktop.result == 'skipped')
    uses: ./.github/workflows/mobile-release.yml
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.mobile_version || '' }}
    secrets: inherit
