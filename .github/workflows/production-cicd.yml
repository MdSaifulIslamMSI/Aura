            elif [ "${{ needs.quality-gates.result }}" != "success" ] || [ "${{ needs.security-gates.result }}" != "success" ]; then
              echo "Gateway deploy was blocked because CI or security gates did not pass."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Gateway deploy was not requested for this run."
            else
              echo "Gateway deploy did not run because production approval or release manifest did not complete."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-tests:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
    if: |
      always() &&
      (
        needs.deploy-backend.result == 'success' ||
        needs.deploy-frontend-netlify.result == 'success' ||
        needs.deploy-frontend-aws.result == 'success' ||
        needs.deploy-gateway.result == 'success'
      )

    steps:
      - name: Run production smoke checks
        env:
          BACKEND_DEPLOY_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_NETLIFY_DEPLOY_RESULT: ${{ needs.deploy-frontend-netlify.result }}
          FRONTEND_AWS_DEPLOY_RESULT: ${{ needs.deploy-frontend-aws.result }}
          GATEWAY_DEPLOY_RESULT: ${{ needs.deploy-gateway.result }}
          AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
          BACKEND_HEALTH_PATH: ${{ vars.BACKEND_HEALTH_PATH || '/health' }}
          NETLIFY_PRODUCTION_URL: ${{ vars.NETLIFY_PRODUCTION_URL || '' }}
          AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL || '' }}
          GATEWAY_PRODUCTION_URL: ${{ vars.GATEWAY_PRODUCTION_URL || '' }}
          GATEWAY_HEALTH_PATH: ${{ vars.GATEWAY_HEALTH_PATH || '/' }}
        run: |
          set -euo pipefail

          smoke_if_deployed() {
            local name="$1"
            local deploy_result="$2"
            local url="$3"

            if [ "${deploy_result}" != "success" ]; then
              echo "Skipping ${name}; related deploy result was ${deploy_result}."
              return 0
            fi

            if [ -z "${url}" ]; then
              echo "Skipping ${name}; related URL is empty."
              return 0
            fi

            echo "Checking ${name}: ${url}"
            curl --fail --show-error --silent --location --max-time 30 "${url}" > /dev/null
            echo "${name} is healthy."
          }

          smoke_if_deployed "backend" "${BACKEND_DEPLOY_RESULT}" "${AURA_BACKEND_ORIGIN}${BACKEND_HEALTH_PATH}"
          smoke_if_deployed "netlify storefront" "${FRONTEND_NETLIFY_DEPLOY_RESULT}" "${NETLIFY_PRODUCTION_URL}"
          smoke_if_deployed "aws storefront" "${FRONTEND_AWS_DEPLOY_RESULT}" "${AWS_FRONTEND_PUBLIC_URL}"
          smoke_if_deployed "gateway" "${GATEWAY_DEPLOY_RESULT}" "${GATEWAY_PRODUCTION_URL}${GATEWAY_HEALTH_PATH}"

  smoke-tests-noop:
    name: Smoke tests no-op
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
    if: always() && needs.smoke-tests.result == 'skipped'

    steps:
      - name: Explain smoke decision
        run: |
          {
            echo "## Smoke Tests No-Op"
            echo
            echo "No smoke tests ran because no deployment job completed successfully."
            echo
            echo "| Deploy job | Result |"
            echo "|---|---|"
            echo "| Backend | ${{ needs.deploy-backend.result }} |"
            echo "| Frontend Netlify | ${{ needs.deploy-frontend-netlify.result }} |"
            echo "| Frontend AWS | ${{ needs.deploy-frontend-aws.result }} |"
            echo "| Gateway | ${{ needs.deploy-gateway.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  rollback-backend:
    name: Roll back backend
    needs:
      - plan
      - production-approval
      - deploy-backend
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_backend == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.auto_rollback_on_smoke_failure == true &&
          needs.deploy-backend.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-backend-aws.yml
    permissions:
      contents: read
      id-token: write
    with:
      rollback_ref: ${{ inputs.rollback_ref || '' }}
    secrets: inherit

  rollback-frontend-netlify:
    name: Roll back Netlify storefront
    needs:
      - plan
      - production-approval
      - deploy-frontend-netlify
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_frontend_netlify == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.auto_rollback_on_smoke_failure == true &&
          needs.deploy-frontend-netlify.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-netlify.yml
    permissions:
      contents: read
    with:
      rollback_ref: ${{ inputs.rollback_ref || '' }}
    secrets: inherit

  rollback-frontend-aws:
    name: Roll back AWS storefront
    needs:
      - plan
      - production-approval
      - deploy-frontend-aws
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_frontend_aws == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.auto_rollback_on_smoke_failure == true &&
          needs.deploy-frontend-aws.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-frontend-aws.yml
    permissions:
      contents: read
      id-token: write
    with:
      rollback_ref: ${{ inputs.rollback_ref || '' }}
    secrets: inherit

  rollback-gateway:
    name: Roll back gateway
    needs:
      - plan
      - production-approval
      - deploy-gateway
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_gateway == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.auto_rollback_on_smoke_failure == true &&
          needs.deploy-gateway.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-gateway-vercel.yml
    permissions:
      contents: read
    with:
      rollback_ref: ${{ inputs.rollback_ref || '' }}
    secrets: inherit

  rollback-decisions:
    name: Rollback decision summary
    runs-on: ubuntu-latest
    needs:
      - plan
      - smoke-tests
      - rollback-backend
      - rollback-frontend-netlify
      - rollback-frontend-aws
      - rollback-gateway
    if: always()

    steps:
      - name: Explain rollback decisions
        run: |
          {
            echo "## Rollback Decisions"
            echo
            echo "| Rollback | Planned/manual | Result |"
            echo "|---|---:|---|"
            echo "| Backend | ${{ needs.plan.outputs.should_rollback_backend }} | ${{ needs.rollback-backend.result }} |"
            echo "| Netlify frontend | ${{ needs.plan.outputs.should_rollback_frontend_netlify }} | ${{ needs.rollback-frontend-netlify.result }} |"
            echo "| AWS frontend | ${{ needs.plan.outputs.should_rollback_frontend_aws }} | ${{ needs.rollback-frontend-aws.result }} |"
            echo "| Gateway | ${{ needs.plan.outputs.should_rollback_gateway }} | ${{ needs.rollback-gateway.result }} |"
            echo
            echo "| Auto rollback condition | Value |"
            echo "|---|---|"
            echo "| Workflow dispatch | ${{ github.event_name == 'workflow_dispatch' }} |"
            echo "| Auto rollback input | ${{ inputs.auto_rollback_on_smoke_failure || false }} |"
            echo "| Smoke result | ${{ needs.smoke-tests.result }} |"
            echo
            echo "Rollbacks only run for confirmed manual rollback requests or for workflow_dispatch smoke failures when auto rollback is explicitly enabled."
          } >> "$GITHUB_STEP_SUMMARY"

  release-desktop:
    name: Publish desktop apps
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
    if: |
      always() &&
      needs.plan.outputs.should_release_desktop == 'true' &&
      needs.quality-gates.result == 'success' &&
      needs.security-gates.result == 'success' &&
      needs.production-approval.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend-netlify.result == 'success' || needs.deploy-frontend-netlify.result == 'skipped') &&
      (needs.deploy-frontend-aws.result == 'success' || needs.deploy-frontend-aws.result == 'skipped') &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')
    uses: ./.github/workflows/desktop-release.yml
    permissions:
      contents: write
    with:
      version: ${{ inputs.desktop_version || '' }}
      require_windows_signing: false
      require_macos_signing: false
      publish_store_release: false
    secrets: inherit

  release-desktop-noop:
    name: Desktop release no-op
    runs-on: ubuntu-latest
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
      - release-desktop
    if: always() && needs.release-desktop.result == 'skipped'

    steps:
      - name: Explain desktop release decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED: ${{ needs.plan.outputs.desktop_changed }}
          SHOULD: ${{ needs.plan.outputs.should_release_desktop }}
          MANUAL_CONFIRMED: ${{ needs.plan.outputs.manual_confirmed }}
          MANUAL_REQUESTED: ${{ inputs.release_desktop || false }}
        run: |
          {
            echo "## Desktop Release No-Op"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Changed | ${CHANGED} |"
            echo "| Manual requested | ${MANUAL_REQUESTED} |"
            echo "| Manual confirmed | ${MANUAL_CONFIRMED} |"
            echo "| Planned release | ${SHOULD} |"
            echo "| Quality gates | ${{ needs.quality-gates.result }} |"
            echo "| Security gates | ${{ needs.security-gates.result }} |"
            echo "| Approval | ${{ needs.production-approval.result }} |"
            echo "| Smoke tests | ${{ needs.smoke-tests.result }} |"
            echo
            if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${MANUAL_REQUESTED}" = "true" ] && [ "${MANUAL_CONFIRMED}" != "true" ]; then
              echo "Desktop release was requested but no-opped because confirm_production was not PRODUCTION."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Desktop release was not requested for this run."
            elif [ "${{ needs.quality-gates.result }}" != "success" ] || [ "${{ needs.security-gates.result }}" != "success" ]; then
              echo "Desktop release was blocked because CI or security gates did not pass."
            elif [ "${{ needs.smoke-tests.result }}" = "failure" ]; then
              echo "Desktop release was blocked because smoke tests failed."
            else
              echo "Desktop release did not run because approval or a dependent production job was not safe."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-mobile:
    name: Publish mobile apps
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
    if: |
      always() &&
      needs.plan.outputs.should_release_mobile == 'true' &&
      needs.quality-gates.result == 'success' &&
      needs.security-gates.result == 'success' &&
      needs.production-approval.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend-netlify.result == 'success' || needs.deploy-frontend-netlify.result == 'skipped') &&
      (needs.deploy-frontend-aws.result == 'success' || needs.deploy-frontend-aws.result == 'skipped') &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')
    uses: ./.github/workflows/mobile-release.yml
    permissions:
      contents: write
    with:
      version: ${{ inputs.mobile_version || '' }}
      require_android_signing: false
      require_ios_signing: false
      publish_store_release: false
    secrets: inherit

  release-mobile-noop:
    name: Mobile release no-op
    runs-on: ubuntu-latest
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
      - release-mobile
    if: always() && needs.release-mobile.result == 'skipped'

    steps:
      - name: Explain mobile release decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED: ${{ needs.plan.outputs.mobile_changed }}
          SHOULD: ${{ needs.plan.outputs.should_release_mobile }}
          MANUAL_CONFIRMED: ${{ needs.plan.outputs.manual_confirmed }}
          MANUAL_REQUESTED: ${{ inputs.release_mobile || false }}
        run: |
          {
            echo "## Mobile Release No-Op"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Changed | ${CHANGED} |"
            echo "| Manual requested | ${MANUAL_REQUESTED} |"
            echo "| Manual confirmed | ${MANUAL_CONFIRMED} |"
            echo "| Planned release | ${SHOULD} |"
            echo "| Quality gates | ${{ needs.quality-gates.result }} |"
            echo "| Security gates | ${{ needs.security-gates.result }} |"
            echo "| Approval | ${{ needs.production-approval.result }} |"
            echo "| Smoke tests | ${{ needs.smoke-tests.result }} |"
            echo
            if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${MANUAL_REQUESTED}" = "true" ] && [ "${MANUAL_CONFIRMED}" != "true" ]; then
              echo "Mobile release was requested but no-opped because confirm_production was not PRODUCTION."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Mobile release was not requested for this run."
            elif [ "${{ needs.quality-gates.result }}" != "success" ] || [ "${{ needs.security-gates.result }}" != "success" ]; then
              echo "Mobile release was blocked because CI or security gates did not pass."
            elif [ "${{ needs.smoke-tests.result }}" = "failure" ]; then
              echo "Mobile release was blocked because smoke tests failed."
            else
              echo "Mobile release did not run because approval or a dependent production job was not safe."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  production-tag:
    name: Create production traceability tag
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
      - release-desktop
      - release-mobile
    if: |
      always() &&
      (
        needs.deploy-backend.result == 'success' ||
        needs.deploy-frontend-netlify.result == 'success' ||
        needs.deploy-frontend-aws.result == 'success' ||
        needs.deploy-gateway.result == 'success' ||
        needs.release-desktop.result == 'success' ||
        needs.release-mobile.result == 'success'
      ) &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push production tag
        id: tag
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          tag="production-${timestamp}-${short_sha}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${tag}" -m "Production release ${tag} from ${GITHUB_SHA}"
          git push origin "${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Created production tag: ${tag}"

  production-summary:
    name: Production release summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - production-approval-noop
      - release-manifest
      - deploy-backend
      - deploy-backend-noop
      - deploy-frontend-netlify
      - deploy-frontend-netlify-noop
      - deploy-frontend-aws
      - deploy-frontend-aws-noop
      - deploy-gateway
      - deploy-gateway-noop
      - smoke-tests
      - smoke-tests-noop
      - rollback-backend
      - rollback-frontend-netlify
      - rollback-frontend-aws
      - rollback-gateway
      - rollback-decisions
      - release-desktop
      - release-desktop-noop
      - release-mobile
      - release-mobile-noop
      - production-tag

    steps:
      - name: Write production summary
        run: |
          {
            echo "## Aura Production Release Summary"
            echo
            echo "### A. Run metadata"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${{ github.event_name }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Ref | ${{ github.ref }} |"
            echo "| SHA | ${{ github.sha }} |"
            echo "| Run | ${{ github.run_id }} |"
            echo
            echo "### B. Plan decisions"
            echo
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Requested production action | ${{ needs.plan.outputs.requested_production_action }} |"
            echo "| Planned production action | ${{ needs.plan.outputs.planned_production_action }} |"
            echo "| Manual confirmed | ${{ needs.plan.outputs.manual_confirmed }} |"
            echo "| Should run smoke tests | ${{ needs.plan.outputs.should_run_smoke_tests }} |"
            echo
            echo "### C. Provider readiness"
            echo
            echo "| Provider | Ready | Missing config names |"
            echo "|---|---:|---|"
            echo "| Backend AWS | ${{ needs.plan.outputs.backend_ready }} | ${{ needs.plan.outputs.backend_missing }} |"
            echo "| Frontend Netlify | ${{ needs.plan.outputs.frontend_netlify_ready }} | ${{ needs.plan.outputs.frontend_netlify_missing }} |"
            echo "| Frontend AWS | ${{ needs.plan.outputs.frontend_aws_ready }} | ${{ needs.plan.outputs.frontend_aws_missing }} |"
            echo "| Gateway Vercel | ${{ needs.plan.outputs.gateway_ready }} | ${{ needs.plan.outputs.gateway_missing }} |"
            echo
            echo "### D. CI/security/approval results"
            echo
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| Quality gates | ${{ needs.quality-gates.result }} |"
            echo "| Security gates | ${{ needs.security-gates.result }} |"
            echo "| Production approval | ${{ needs.production-approval.result }} |"
            echo "| Release manifest | ${{ needs.release-manifest.result }} |"
            echo
            echo "### E. Deploy decisions/results"
            echo
            echo "| Deploy | Planned | Result | No-op job |"
            echo "|---|---:|---|---|"
            echo "| Backend AWS | ${{ needs.plan.outputs.should_deploy_backend }} | ${{ needs.deploy-backend.result }} | ${{ needs.deploy-backend-noop.result }} |"
            echo "| Frontend Netlify | ${{ needs.plan.outputs.should_deploy_frontend_netlify }} | ${{ needs.deploy-frontend-netlify.result }} | ${{ needs.deploy-frontend-netlify-noop.result }} |"
            echo "| Frontend AWS | ${{ needs.plan.outputs.should_deploy_frontend_aws }} | ${{ needs.deploy-frontend-aws.result }} | ${{ needs.deploy-frontend-aws-noop.result }} |"
            echo "| Gateway Vercel | ${{ needs.plan.outputs.should_deploy_gateway }} | ${{ needs.deploy-gateway.result }} | ${{ needs.deploy-gateway-noop.result }} |"
            echo
            echo "### F. Smoke test result"
            echo
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Smoke tests | ${{ needs.smoke-tests.result }} |"
            echo "| Smoke tests no-op | ${{ needs.smoke-tests-noop.result }} |"
            echo
            echo "### G. Rollback decisions/results"
            echo
            echo "| Rollback | Planned | Result |"
            echo "|---|---:|---|"
            echo "| Backend | ${{ needs.plan.outputs.should_rollback_backend }} | ${{ needs.rollback-backend.result }} |"
            echo "| Frontend Netlify | ${{ needs.plan.outputs.should_rollback_frontend_netlify }} | ${{ needs.rollback-frontend-netlify.result }} |"
            echo "| Frontend AWS | ${{ needs.plan.outputs.should_rollback_frontend_aws }} | ${{ needs.rollback-frontend-aws.result }} |"
            echo "| Gateway | ${{ needs.plan.outputs.should_rollback_gateway }} | ${{ needs.rollback-gateway.result }} |"
            echo
            echo "### H. Desktop/mobile release result"
            echo
            echo "| Release | Planned | Result | No-op job |"
            echo "|---|---:|---|---|"
            echo "| Desktop | ${{ needs.plan.outputs.should_release_desktop }} | ${{ needs.release-desktop.result }} | ${{ needs.release-desktop-noop.result }} |"
            echo "| Mobile | ${{ needs.plan.outputs.should_release_mobile }} | ${{ needs.release-mobile.result }} | ${{ needs.release-mobile-noop.result }} |"
            echo
            echo "### I. Signing status"
            echo
            echo "| Platform | Required | Enabled |"
            echo "|---|---:|---:|"
            echo "| Windows | false | ${{ needs.plan.outputs.signing_enabled }} |"
            echo "| macOS | false | ${{ needs.plan.outputs.signing_enabled }} |"
            echo "| Android | false | ${{ needs.plan.outputs.signing_enabled }} |"
            echo "| iOS | false | ${{ needs.plan.outputs.signing_enabled }} |"
            echo
            echo "### J. Store publishing status"
            echo
            echo "| Store publishing | Enabled |"
            echo "|---|---:|"
            echo "| Microsoft Store / Mac App Store / Google Play / App Store | ${{ needs.plan.outputs.store_publish_enabled }} |"
            echo
            echo "### K. Production tag"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag job result | ${{ needs.production-tag.result }} |"
            echo "| Tag | ${{ needs.production-tag.outputs.tag }} |"
          } >> "$GITHUB_STEP_SUMMARY"
