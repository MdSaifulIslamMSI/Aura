name: Aura Production Release Orchestrator

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "desktop/**"
      - "gateway/**"
      - "server/**"
      - "scripts/security-*.mjs"
      - "scripts/duo-activate.mjs"
      - "scripts/cloudflare-free-security-activate.mjs"
      - "scripts/smoke-origin-protection.mjs"
      - "scripts/smoke-production-login.mjs"
      - "scripts/validate-login-*.mjs"
      - "scripts/run-auth-*.js"
      - "scripts/auth-runner.js"
      - "scripts/classify-auth-change-risk.js"
      - "scripts/count-auth-combinations.js"
      - "scripts/ci-cd-doctor.mjs"
      - "tests/auth/**"
      - "docs/*security*.md"
      - "docs/ci-cd.md"
      - "docs/ci-cd-secrets.md"
      - "docs/critical-invariants.md"
      - "docs/emergency-controls.md"
      - "docs/login-staging-production-activation.md"
      - "docs/privileged-access-management.md"
      - "SECURITY_TEST_PLAN.md"
      - "security_best_practices_report.md"
      - ".gitleaks.toml"
      - "security-audit-exceptions.json"
      - "infra/cloudflare/**"
      - "infra/aws/**"
      - "netlify.toml"
      - ".netlifyignore"
      - "vercel.json"
      - "app/vercel.json"
      - "gateway/vercel.json"
      - ".vercelignore"
      - "package.json"
      - "package-lock.json"
      - "Gemfile"
      - "Gemfile.lock"
      - "fastlane/**"
      - ".github/workflows/**"

  workflow_dispatch:
    inputs:
      confirm_production:
        description: Type PRODUCTION to allow manual production deploy/release/rollback
        required: false
        default: ""
        type: string

      deploy_backend:
        description: Deploy backend to AWS
        required: false
        default: false
        type: boolean

      deploy_frontend_netlify:
        description: Deploy storefront to Netlify, Vercel, and AWS S3
        required: false
        default: false
        type: boolean

      deploy_frontend_aws:
        description: Deploy storefront to AWS S3 / CloudFront
        required: false
        default: false
        type: boolean

      deploy_gateway:
        description: Deploy gateway to Vercel
        required: false
        default: false
        type: boolean

      release_desktop:
        description: Build and publish desktop GitHub Release
        required: false
        default: false
        type: boolean

      release_mobile:
        description: Build and publish mobile GitHub Release
        required: false
        default: false
        type: boolean

      rollback_backend:
        description: Roll back backend deployment
        required: false
        default: false
        type: boolean

      rollback_frontend_netlify:
        description: Roll back Netlify storefront deployment
        required: false
        default: false
        type: boolean

      rollback_frontend_aws:
        description: Roll back AWS S3 / CloudFront storefront deployment
        required: false
        default: false
        type: boolean

      rollback_gateway:
        description: Roll back Vercel gateway deployment
        required: false
        default: false
        type: boolean

      auto_rollback_on_smoke_failure:
        description: Automatically run rollback hooks if smoke tests fail
        required: false
        default: false
        type: boolean

      desktop_version:
        description: Optional desktop version, for example 1.2.0
        required: false
        default: ""
        type: string

      mobile_version:
        description: Optional mobile version, for example 1.2.0
        required: false
        default: ""
        type: string

      rollback_ref:
        description: Optional git ref/version to roll back to
        required: false
        default: ""
        type: string

      skip_backend_healthcheck:
        description: Skip backend readiness check after AWS deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: aura-production-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x

jobs:
  plan:
    name: Plan production actions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      backend_changed: ${{ steps.plan.outputs.backend_changed }}
      frontend_netlify_changed: ${{ steps.plan.outputs.frontend_netlify_changed }}
      frontend_aws_changed: ${{ steps.plan.outputs.frontend_aws_changed }}
      gateway_changed: ${{ steps.plan.outputs.gateway_changed }}
      desktop_changed: ${{ steps.plan.outputs.desktop_changed }}
      mobile_changed: ${{ steps.plan.outputs.mobile_changed }}
      backend_ready: ${{ steps.plan.outputs.backend_ready }}
      frontend_netlify_ready: ${{ steps.plan.outputs.frontend_netlify_ready }}
      frontend_aws_ready: ${{ steps.plan.outputs.frontend_aws_ready }}
      gateway_ready: ${{ steps.plan.outputs.gateway_ready }}
      backend_missing: ${{ steps.plan.outputs.backend_missing }}
      frontend_netlify_missing: ${{ steps.plan.outputs.frontend_netlify_missing }}
      frontend_aws_missing: ${{ steps.plan.outputs.frontend_aws_missing }}
      gateway_missing: ${{ steps.plan.outputs.gateway_missing }}
      manual_confirmed: ${{ steps.plan.outputs.manual_confirmed }}
      requested_production_action: ${{ steps.plan.outputs.requested_production_action }}
      planned_production_action: ${{ steps.plan.outputs.planned_production_action }}
      requested_deploy_or_release_action: ${{ steps.plan.outputs.requested_deploy_or_release_action }}
      requested_rollback_action: ${{ steps.plan.outputs.requested_rollback_action }}
      should_deploy_backend: ${{ steps.plan.outputs.should_deploy_backend }}
      should_deploy_frontend_netlify: ${{ steps.plan.outputs.should_deploy_frontend_netlify }}
      should_deploy_frontend_aws: ${{ steps.plan.outputs.should_deploy_frontend_aws }}
      should_deploy_gateway: ${{ steps.plan.outputs.should_deploy_gateway }}
      should_release_desktop: ${{ steps.plan.outputs.should_release_desktop }}
      should_release_mobile: ${{ steps.plan.outputs.should_release_mobile }}
      should_rollback_backend: ${{ steps.plan.outputs.should_rollback_backend }}
      should_rollback_frontend_netlify: ${{ steps.plan.outputs.should_rollback_frontend_netlify }}
      should_rollback_frontend_aws: ${{ steps.plan.outputs.should_rollback_frontend_aws }}
      should_rollback_gateway: ${{ steps.plan.outputs.should_rollback_gateway }}
      should_run_smoke_tests: ${{ steps.plan.outputs.should_run_smoke_tests }}
      signing_enabled: ${{ steps.plan.outputs.signing_enabled }}
      store_publish_enabled: ${{ steps.plan.outputs.store_publish_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build production plan
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          CONFIRM_PRODUCTION: ${{ inputs.confirm_production || '' }}
          INPUT_DEPLOY_BACKEND: ${{ inputs.deploy_backend || false }}
          INPUT_DEPLOY_FRONTEND_NETLIFY: ${{ inputs.deploy_frontend_netlify || false }}
          INPUT_DEPLOY_FRONTEND_AWS: ${{ inputs.deploy_frontend_aws || false }}
          INPUT_DEPLOY_GATEWAY: ${{ inputs.deploy_gateway || false }}
          INPUT_RELEASE_DESKTOP: ${{ inputs.release_desktop || false }}
          INPUT_RELEASE_MOBILE: ${{ inputs.release_mobile || false }}
          INPUT_ROLLBACK_BACKEND: ${{ inputs.rollback_backend || false }}
          INPUT_ROLLBACK_FRONTEND_NETLIFY: ${{ inputs.rollback_frontend_netlify || false }}
          INPUT_ROLLBACK_FRONTEND_AWS: ${{ inputs.rollback_frontend_aws || false }}
          INPUT_ROLLBACK_GATEWAY: ${{ inputs.rollback_gateway || false }}
          INPUT_AUTO_ROLLBACK_ON_SMOKE_FAILURE: ${{ inputs.auto_rollback_on_smoke_failure || false }}
          AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN || '' }}
          AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET || '' }}
          AWS_INSTANCE_TAG_VALUE: ${{ vars.AWS_INSTANCE_TAG_VALUE || '' }}
          AWS_PARAMETER_STORE_PATH_PREFIX: ${{ vars.AWS_PARAMETER_STORE_PATH_PREFIX || '' }}
          AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN || '' }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID || secrets.NETLIFY_SITE_ID || '' }}
          NETLIFY_PRODUCTION_URL: ${{ vars.NETLIFY_PRODUCTION_URL || '' }}
          AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET || '' }}
          AWS_FRONTEND_DISTRIBUTION_ID: ${{ vars.AWS_FRONTEND_DISTRIBUTION_ID || '' }}
          AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL || '' }}
          AWS_FRONTEND_DEPLOY_ROLE_ARN: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN || secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN || '' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || '' }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || secrets.VERCEL_ORG_ID || '' }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID || '' }}
          GATEWAY_PRODUCTION_URL: ${{ vars.GATEWAY_PRODUCTION_URL || '' }}
        run: |
          set -euo pipefail

          bool_or() {
            for value in "$@"; do
              if [ "${value}" = "true" ]; then
                echo "true"
                return
              fi
            done
            echo "false"
          }

          emit() {
            echo "$1=$2" >> "$GITHUB_OUTPUT"
          }

          missing_names() {
            local names=()
            local name
            for name in "$@"; do
              if [ -z "${!name:-}" ]; then
                names+=("${name}")
              fi
            done

            if [ "${#names[@]}" -eq 0 ]; then
              printf 'none'
            else
              local IFS=','
              printf '%s' "${names[*]}"
            fi
          }

          ready_from_missing() {
            if [ "$1" = "none" ]; then
              echo "true"
            else
              echo "false"
            fi
          }

          matches_any() {
            local file="$1"
            shift
            local pattern
            for pattern in "$@"; do
              case "${file}" in
                ${pattern}) return 0 ;;
              esac
            done
            return 1
          }

          surface_changed() {
            shift
            local file
            for file in "${changed_files[@]}"; do
              if [ -n "${file}" ] && matches_any "${file}" "$@"; then
                echo "true"
                return
              fi
            done
            echo "false"
          }

          changed_files=()
          if [ "${EVENT_NAME}" = "push" ]; then
            if [ -n "${BEFORE_SHA}" ] && ! printf '%s' "${BEFORE_SHA}" | grep -Eq '^0+$' && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              mapfile -t changed_files < <(git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}")
            else
              mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r "${HEAD_SHA}")
            fi
          fi

          backend_changed="$(surface_changed backend \
            'server/*' \
            'infra/aws/*' \
            'scripts/security-*.mjs' \
            'scripts/duo-activate.mjs' \
            'scripts/cloudflare-free-security-activate.mjs' \
            'scripts/smoke-origin-protection.mjs' \
            'scripts/smoke-production-login.mjs' \
            'scripts/validate-login-*.mjs' \
            'scripts/run-auth-*.js' \
            'scripts/auth-runner.js' \
            'scripts/classify-auth-change-risk.js' \
            'scripts/count-auth-combinations.js' \
            'tests/auth/*' \
            'docs/*security*.md' \
            'docs/ci-cd.md' \
            'docs/ci-cd-secrets.md' \
            'docs/critical-invariants.md' \
            'docs/emergency-controls.md' \
            'docs/login-staging-production-activation.md' \
            'docs/privileged-access-management.md' \
            'SECURITY_TEST_PLAN.md' \
            'security_best_practices_report.md' \
            '.gitleaks.toml' \
            'security-audit-exceptions.json' \
            '.github/workflows/ci.yml' \
            '.github/workflows/deploy-backend-aws.yml' \
            '.github/workflows/rollback-backend-aws.yml' \
            '.github/workflows/production-cicd.yml')"

          frontend_netlify_changed="$(surface_changed frontend_netlify \
            'app/*' \
            'netlify.toml' \
            '.netlifyignore' \
            'vercel.json' \
            'app/vercel.json' \
            '.vercelignore' \
            'infra/aws/bootstrap-frontend-s3.ps1' \
            'infra/aws/bootstrap-frontend-github-oidc.ps1' \
            'infra/aws/deploy-frontend-s3.ps1' \
            'docs/aws-frontend-deployment.md' \
            'docs/ci-cd-secrets.md' \
            'package.json' \
            'package-lock.json' \
            '.github/workflows/ci.yml' \
            '.github/workflows/deploy-netlify.yml' \
            '.github/workflows/deploy-frontend-aws.yml' \
            '.github/workflows/rollback-netlify.yml' \
            '.github/workflows/rollback-frontend-aws.yml' \
            '.github/workflows/production-cicd.yml')"

          frontend_aws_changed="$(surface_changed frontend_aws \
            'app/*' \
            'infra/aws/bootstrap-frontend-s3.ps1' \
            'infra/aws/bootstrap-frontend-github-oidc.ps1' \
            'infra/aws/deploy-frontend-s3.ps1' \
            'docs/aws-frontend-deployment.md' \
            'docs/ci-cd-secrets.md' \
            'package.json' \
            'package-lock.json' \
            '.github/workflows/ci.yml' \
            '.github/workflows/deploy-frontend-aws.yml' \
            '.github/workflows/rollback-frontend-aws.yml' \
            '.github/workflows/production-cicd.yml')"

          gateway_changed="$(surface_changed gateway \
            'gateway/*' \
            'gateway/vercel.json' \
            '.vercelignore' \
            'docs/ci-cd-secrets.md' \
            '.github/workflows/ci.yml' \
            '.github/workflows/deploy-gateway-vercel.yml' \
            '.github/workflows/rollback-gateway-vercel.yml' \
            '.github/workflows/production-cicd.yml')"

          desktop_changed="$(surface_changed desktop \
            'app/*' \
            'desktop/*' \
            'docs/ci-cd-secrets.md' \
            'package.json' \
            'package-lock.json' \
            '.github/workflows/ci.yml' \
            '.github/workflows/desktop-release.yml' \
            '.github/workflows/production-cicd.yml')"

          mobile_changed="$(surface_changed mobile \
            'app/capacitor.config.ts' \
            'app/android/*' \
            'app/ios/*' \
            'app/package.json' \
            'app/package-lock.json' \
            'app/src/config/firebase.js' \
            'app/src/context/AuthContext.jsx' \
            'app/src/context/NotificationContext.jsx' \
            'app/src/context/SocketContext.jsx' \
            'app/src/context/VideoCallContext.jsx' \
            'app/src/services/deviceTrustClient.js' \
            'app/src/services/mobileReleaseChannel.js' \
            'app/src/services/nativeAppExperience.js' \
            'app/src/services/nativeSocialAuth.js' \
            'app/src/components/shared/MobileUpdateBanner.jsx' \
            'app/src/utils/nativeRuntime.js' \
            'Gemfile' \
            'Gemfile.lock' \
            'fastlane/*' \
            'docs/mobile-app-delivery.md' \
            'docs/ci-cd-secrets.md' \
            'README.md' \
            '.github/workflows/mobile-release.yml' \
            '.github/workflows/production-cicd.yml')"

          backend_missing="$(missing_names AWS_DEPLOY_ROLE_ARN AWS_DEPLOY_BUCKET AWS_INSTANCE_TAG_VALUE AWS_PARAMETER_STORE_PATH_PREFIX AURA_BACKEND_ORIGIN)"
          frontend_netlify_missing="$(missing_names NETLIFY_AUTH_TOKEN NETLIFY_SITE_ID NETLIFY_PRODUCTION_URL VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID AWS_FRONTEND_BUCKET AWS_FRONTEND_DISTRIBUTION_ID AWS_FRONTEND_PUBLIC_URL AWS_FRONTEND_DEPLOY_ROLE_ARN AURA_BACKEND_ORIGIN)"
          frontend_aws_missing="$(missing_names AWS_FRONTEND_BUCKET AWS_FRONTEND_DISTRIBUTION_ID AWS_FRONTEND_PUBLIC_URL AWS_FRONTEND_DEPLOY_ROLE_ARN AURA_BACKEND_ORIGIN)"
          gateway_missing="$(missing_names VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID GATEWAY_PRODUCTION_URL)"

          backend_ready="$(ready_from_missing "${backend_missing}")"
          frontend_netlify_ready="$(ready_from_missing "${frontend_netlify_missing}")"
          frontend_aws_ready="$(ready_from_missing "${frontend_aws_missing}")"
          gateway_ready="$(ready_from_missing "${gateway_missing}")"

          manual_confirmed="false"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${CONFIRM_PRODUCTION}" = "PRODUCTION" ]; then
            manual_confirmed="true"
          fi

          deploy_backend_requested="false"
          deploy_frontend_netlify_requested="false"
          deploy_frontend_aws_requested="false"
          deploy_gateway_requested="false"
          release_desktop_requested="false"
          release_mobile_requested="false"
          rollback_backend_requested="false"
          rollback_frontend_netlify_requested="false"
          rollback_frontend_aws_requested="false"
          rollback_gateway_requested="false"

          if [ "${EVENT_NAME}" = "push" ]; then
            deploy_backend_requested="${backend_changed}"
            deploy_frontend_netlify_requested="${frontend_netlify_changed}"
            deploy_frontend_aws_requested="${frontend_aws_changed}"
            deploy_gateway_requested="${gateway_changed}"
            release_desktop_requested="${desktop_changed}"
            release_mobile_requested="${mobile_changed}"
          else
            deploy_backend_requested="${INPUT_DEPLOY_BACKEND}"
            deploy_frontend_netlify_requested="${INPUT_DEPLOY_FRONTEND_NETLIFY}"
            deploy_frontend_aws_requested="${INPUT_DEPLOY_FRONTEND_AWS}"
            deploy_gateway_requested="${INPUT_DEPLOY_GATEWAY}"
            release_desktop_requested="${INPUT_RELEASE_DESKTOP}"
            release_mobile_requested="${INPUT_RELEASE_MOBILE}"
            rollback_backend_requested="${INPUT_ROLLBACK_BACKEND}"
            rollback_frontend_netlify_requested="${INPUT_ROLLBACK_FRONTEND_NETLIFY}"
            rollback_frontend_aws_requested="${INPUT_ROLLBACK_FRONTEND_AWS}"
            rollback_gateway_requested="${INPUT_ROLLBACK_GATEWAY}"
          fi

          should_deploy_backend="false"
          should_deploy_frontend_netlify="false"
          should_deploy_frontend_aws="false"
          should_deploy_gateway="false"
          should_release_desktop="false"
          should_release_mobile="false"
          should_rollback_backend="false"
          should_rollback_frontend_netlify="false"
          should_rollback_frontend_aws="false"
          should_rollback_gateway="false"

          if [ "${EVENT_NAME}" = "push" ]; then
            [ "${backend_changed}" = "true" ] && [ "${backend_ready}" = "true" ] && should_deploy_backend="true"
            [ "${frontend_netlify_changed}" = "true" ] && [ "${frontend_netlify_ready}" = "true" ] && should_deploy_frontend_netlify="true"
            [ "${frontend_aws_changed}" = "true" ] && [ "${frontend_aws_ready}" = "true" ] && should_deploy_frontend_aws="true"
            [ "${gateway_changed}" = "true" ] && [ "${gateway_ready}" = "true" ] && should_deploy_gateway="true"
            [ "${desktop_changed}" = "true" ] && should_release_desktop="true"
            [ "${mobile_changed}" = "true" ] && should_release_mobile="true"
          elif [ "${manual_confirmed}" = "true" ]; then
            [ "${INPUT_DEPLOY_BACKEND}" = "true" ] && [ "${backend_ready}" = "true" ] && should_deploy_backend="true"
            [ "${INPUT_DEPLOY_FRONTEND_NETLIFY}" = "true" ] && [ "${frontend_netlify_ready}" = "true" ] && should_deploy_frontend_netlify="true"
            [ "${INPUT_DEPLOY_FRONTEND_AWS}" = "true" ] && [ "${frontend_aws_ready}" = "true" ] && should_deploy_frontend_aws="true"
            [ "${INPUT_DEPLOY_GATEWAY}" = "true" ] && [ "${gateway_ready}" = "true" ] && should_deploy_gateway="true"
            [ "${INPUT_RELEASE_DESKTOP}" = "true" ] && should_release_desktop="true"
            [ "${INPUT_RELEASE_MOBILE}" = "true" ] && should_release_mobile="true"
            [ "${INPUT_ROLLBACK_BACKEND}" = "true" ] && [ "${backend_ready}" = "true" ] && should_rollback_backend="true"
            [ "${INPUT_ROLLBACK_FRONTEND_NETLIFY}" = "true" ] && [ "${frontend_netlify_ready}" = "true" ] && should_rollback_frontend_netlify="true"
            [ "${INPUT_ROLLBACK_FRONTEND_AWS}" = "true" ] && [ "${frontend_aws_ready}" = "true" ] && should_rollback_frontend_aws="true"
            [ "${INPUT_ROLLBACK_GATEWAY}" = "true" ] && [ "${gateway_ready}" = "true" ] && should_rollback_gateway="true"
          fi

          requested_deploy_or_release_action="$(bool_or "${deploy_backend_requested}" "${deploy_frontend_netlify_requested}" "${deploy_frontend_aws_requested}" "${deploy_gateway_requested}" "${release_desktop_requested}" "${release_mobile_requested}")"
          requested_rollback_action="$(bool_or "${rollback_backend_requested}" "${rollback_frontend_netlify_requested}" "${rollback_frontend_aws_requested}" "${rollback_gateway_requested}")"
          requested_production_action="$(bool_or "${requested_deploy_or_release_action}" "${requested_rollback_action}")"
          planned_production_action="$(bool_or "${should_deploy_backend}" "${should_deploy_frontend_netlify}" "${should_deploy_frontend_aws}" "${should_deploy_gateway}" "${should_release_desktop}" "${should_release_mobile}" "${should_rollback_backend}" "${should_rollback_frontend_netlify}" "${should_rollback_frontend_aws}" "${should_rollback_gateway}")"
          should_run_smoke_tests="$(bool_or "${should_deploy_backend}" "${should_deploy_frontend_netlify}" "${should_deploy_frontend_aws}" "${should_deploy_gateway}")"

          emit backend_changed "${backend_changed}"
          emit frontend_netlify_changed "${frontend_netlify_changed}"
          emit frontend_aws_changed "${frontend_aws_changed}"
          emit gateway_changed "${gateway_changed}"
          emit desktop_changed "${desktop_changed}"
          emit mobile_changed "${mobile_changed}"
          emit backend_ready "${backend_ready}"
          emit frontend_netlify_ready "${frontend_netlify_ready}"
          emit frontend_aws_ready "${frontend_aws_ready}"
          emit gateway_ready "${gateway_ready}"
          emit backend_missing "${backend_missing}"
          emit frontend_netlify_missing "${frontend_netlify_missing}"
          emit frontend_aws_missing "${frontend_aws_missing}"
          emit gateway_missing "${gateway_missing}"
          emit manual_confirmed "${manual_confirmed}"
          emit requested_production_action "${requested_production_action}"
          emit planned_production_action "${planned_production_action}"
          emit requested_deploy_or_release_action "${requested_deploy_or_release_action}"
          emit requested_rollback_action "${requested_rollback_action}"
          emit should_deploy_backend "${should_deploy_backend}"
          emit should_deploy_frontend_netlify "${should_deploy_frontend_netlify}"
          emit should_deploy_frontend_aws "${should_deploy_frontend_aws}"
          emit should_deploy_gateway "${should_deploy_gateway}"
          emit should_release_desktop "${should_release_desktop}"
          emit should_release_mobile "${should_release_mobile}"
          emit should_rollback_backend "${should_rollback_backend}"
          emit should_rollback_frontend_netlify "${should_rollback_frontend_netlify}"
          emit should_rollback_frontend_aws "${should_rollback_frontend_aws}"
          emit should_rollback_gateway "${should_rollback_gateway}"
          emit should_run_smoke_tests "${should_run_smoke_tests}"
          emit signing_enabled "false"
          emit store_publish_enabled "false"

          {
            echo "## Production Plan"
            echo
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Changed files | ${#changed_files[@]} |"
            echo "| Manual confirmed | ${manual_confirmed} |"
            echo "| Requested production action | ${requested_production_action} |"
            echo "| Planned production action | ${planned_production_action} |"
            echo "| Signing enabled | false |"
            echo "| Store publishing enabled | false |"
            echo
            echo "| Surface | Changed | Ready | Missing config | Planned action |"
            echo "|---|---:|---:|---|---:|"
            echo "| Backend | ${backend_changed} | ${backend_ready} | ${backend_missing} | ${should_deploy_backend} |"
            echo "| Frontend Netlify | ${frontend_netlify_changed} | ${frontend_netlify_ready} | ${frontend_netlify_missing} | ${should_deploy_frontend_netlify} |"
            echo "| Frontend AWS | ${frontend_aws_changed} | ${frontend_aws_ready} | ${frontend_aws_missing} | ${should_deploy_frontend_aws} |"
            echo "| Gateway | ${gateway_changed} | ${gateway_ready} | ${gateway_missing} | ${should_deploy_gateway} |"
            echo "| Desktop | ${desktop_changed} | n/a | none | ${should_release_desktop} |"
            echo "| Mobile | ${mobile_changed} | n/a | none | ${should_release_mobile} |"
            echo
            echo "Signing and store publishing are intentionally disabled by this orchestrator. Desktop and mobile release workflows receive explicit false signing/store inputs."
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gates:
    name: Quality gates
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  security-gates:
    name: Security gates and SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Basic secret pattern scan
        run: |
          set -euo pipefail

          echo "Scanning for dangerous committed secret patterns..."

          if grep -RInE \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=build \
            --exclude-dir=.next \
            --exclude-dir=.vercel \
            --exclude-dir=.netlify \
            --exclude="*.lock" \
            --exclude="start-student-pack-dev.ps1" \
            --exclude="student-pack-cli-start.md" \
            "(AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY-----|aws_secret_access_key[[:space:]]*=|AWS_SECRET_ACCESS_KEY[[:space:]]*=|GITHUB_TOKEN[[:space:]]*=[[:space:]]*[A-Za-z0-9_./+-]{20,}|VERCEL_TOKEN[[:space:]]*=[[:space:]]*[A-Za-z0-9_./+-]{20,}|NETLIFY_AUTH_TOKEN[[:space:]]*=[[:space:]]*[A-Za-z0-9_./+-]{20,})" \
            .; then
              echo "::error::Potential committed secret pattern detected. Remove the value and rotate the credential before production deploy."
              exit 1
          fi

          echo "No obvious committed secret patterns found."

      - name: NPM production dependency audit
        run: |
          set -euo pipefail

          audit_npm_dir() {
            local dir="$1"

            if [ -f "${dir}/package-lock.json" ]; then
              echo "Running npm audit in ${dir}"
              (
                cd "${dir}"
                npm audit --audit-level=high --omit=dev
              )
            else
              echo "No package-lock.json in ${dir}; skipping npm audit for this workspace."
            fi
          }

          audit_npm_dir "."
          audit_npm_dir "app"
          audit_npm_dir "gateway"
          audit_npm_dir "server"

      - name: Generate npm SBOMs
        run: |
          set -euo pipefail
          mkdir -p sbom

          sbom_npm_dir() {
            local dir="$1"
            local name="$2"

            if [ -f "${dir}/package-lock.json" ]; then
              echo "Generating SBOM for ${dir}"
              (
                cd "${dir}"
                if ! npm sbom --package-lock-only --legacy-peer-deps --omit=dev --sbom-format cyclonedx > "${GITHUB_WORKSPACE}/sbom/${name}.cdx.json"; then
                  echo "npm sbom failed for ${dir}; generating a package-lock fallback SBOM."
                  SBOM_NAME="${name}" node <<'EOF' > "${GITHUB_WORKSPACE}/sbom/${name}.cdx.json"
          const fs = require('fs');

          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const components = Object.entries(lock.packages || {})
            .filter(([packagePath, pkg]) => packagePath && pkg && pkg.dev !== true)
            .map(([packagePath, pkg]) => {
              const fallbackName = packagePath.split('node_modules/').pop() || packagePath;
              return {
                type: 'library',
                name: pkg.name || fallbackName,
                version: pkg.version || '0.0.0',
              };
            });

          process.stdout.write(JSON.stringify({
            bomFormat: 'CycloneDX',
            specVersion: '1.5',
            version: 1,
            metadata: {
              timestamp: new Date().toISOString(),
              component: {
                type: 'application',
                name: lock.name || process.env.SBOM_NAME || 'workspace',
                version: lock.version || '0.0.0',
              },
            },
            components,
          }, null, 2));
          EOF
                fi
              )
            else
              echo "No package-lock.json in ${dir}; skipping SBOM for this workspace."
            fi
          }

          sbom_npm_dir "." "root"
          sbom_npm_dir "app" "app"
          sbom_npm_dir "gateway" "gateway"
          sbom_npm_dir "server" "server"

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: aura-production-sbom
          path: sbom/*.json
          if-no-files-found: warn
          retention-days: 90

  production-approval:
    name: Production approval gate
    runs-on: ubuntu-latest
    needs:
      - plan
      - quality-gates
      - security-gates
    if: |
      always() &&
      needs.plan.outputs.planned_production_action == 'true' &&
      (
        (
          needs.plan.outputs.requested_deploy_or_release_action != 'true' &&
          needs.plan.outputs.requested_rollback_action == 'true'
        ) ||
        (
          needs.quality-gates.result == 'success' &&
          needs.security-gates.result == 'success'
        )
      )
    environment:
      name: production

    steps:
      - name: Explain approval reason
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_DEPLOY_OR_RELEASE: ${{ needs.plan.outputs.requested_deploy_or_release_action }}
          REQUESTED_ROLLBACK: ${{ needs.plan.outputs.requested_rollback_action }}
        run: |
          {
            echo "## Production Approval"
            echo
            echo "Approval passed for a planned production action."
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Deploy or release requested | ${REQUESTED_DEPLOY_OR_RELEASE} |"
            echo "| Rollback requested | ${REQUESTED_ROLLBACK} |"
            echo "| Quality gates | ${{ needs.quality-gates.result }} |"
            echo "| Security gates | ${{ needs.security-gates.result }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| SHA | ${{ github.sha }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  production-approval-noop:
    name: Production approval no-op
    runs-on: ubuntu-latest
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
    if: always() && needs.production-approval.result != 'success'

    steps:
      - name: Explain why approval did not run
        run: |
          {
            echo "## Production Approval No-Op"
            echo
            echo "| Reason | Value |"
            echo "|---|---|"
            echo "| Planned production action | ${{ needs.plan.outputs.planned_production_action }} |"
            echo "| Requested production action | ${{ needs.plan.outputs.requested_production_action }} |"
            echo "| Manual confirmed | ${{ needs.plan.outputs.manual_confirmed }} |"
            echo "| Quality gates | ${{ needs.quality-gates.result }} |"
            echo "| Security gates | ${{ needs.security-gates.result }} |"
            echo "| Approval result | ${{ needs.production-approval.result }} |"
            echo
            if [ "${{ needs.plan.outputs.planned_production_action }}" != "true" ]; then
              echo "No real production action was planned, so the production environment approval was intentionally not requested."
            elif [ "${{ needs.plan.outputs.requested_deploy_or_release_action }}" = "true" ] && { [ "${{ needs.quality-gates.result }}" != "success" ] || [ "${{ needs.security-gates.result }}" != "success" ]; }; then
              echo "A deploy or release was requested, but production approval was blocked because CI or security gates did not pass."
            else
              echo "Production approval did not complete successfully."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-manifest:
    name: Create release manifest
    runs-on: ubuntu-latest
    needs:
      - plan
      - production-approval
    if: always() && needs.production-approval.result == 'success'
    permissions:
      contents: read

    steps:
      - name: Create manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          BACKEND_CHANGED: ${{ needs.plan.outputs.backend_changed }}
          FRONTEND_NETLIFY_CHANGED: ${{ needs.plan.outputs.frontend_netlify_changed }}
          FRONTEND_AWS_CHANGED: ${{ needs.plan.outputs.frontend_aws_changed }}
          GATEWAY_CHANGED: ${{ needs.plan.outputs.gateway_changed }}
          DESKTOP_CHANGED: ${{ needs.plan.outputs.desktop_changed }}
          MOBILE_CHANGED: ${{ needs.plan.outputs.mobile_changed }}
          BACKEND_READY: ${{ needs.plan.outputs.backend_ready }}
          FRONTEND_NETLIFY_READY: ${{ needs.plan.outputs.frontend_netlify_ready }}
          FRONTEND_AWS_READY: ${{ needs.plan.outputs.frontend_aws_ready }}
          GATEWAY_READY: ${{ needs.plan.outputs.gateway_ready }}
          SHOULD_DEPLOY_BACKEND: ${{ needs.plan.outputs.should_deploy_backend }}
          SHOULD_DEPLOY_FRONTEND_NETLIFY: ${{ needs.plan.outputs.should_deploy_frontend_netlify }}
          SHOULD_DEPLOY_FRONTEND_AWS: ${{ needs.plan.outputs.should_deploy_frontend_aws }}
          SHOULD_DEPLOY_GATEWAY: ${{ needs.plan.outputs.should_deploy_gateway }}
          SHOULD_RELEASE_DESKTOP: ${{ needs.plan.outputs.should_release_desktop }}
          SHOULD_RELEASE_MOBILE: ${{ needs.plan.outputs.should_release_mobile }}
          SHOULD_ROLLBACK_BACKEND: ${{ needs.plan.outputs.should_rollback_backend }}
          SHOULD_ROLLBACK_FRONTEND_NETLIFY: ${{ needs.plan.outputs.should_rollback_frontend_netlify }}
          SHOULD_ROLLBACK_FRONTEND_AWS: ${{ needs.plan.outputs.should_rollback_frontend_aws }}
          SHOULD_ROLLBACK_GATEWAY: ${{ needs.plan.outputs.should_rollback_gateway }}
          SIGNING_ENABLED: ${{ needs.plan.outputs.signing_enabled }}
          STORE_PUBLISH_ENABLED: ${{ needs.plan.outputs.store_publish_enabled }}
        run: |
          node <<'EOF'
          const fs = require('fs');

          const bool = (name) => process.env[name] === 'true';
          const manifest = {
            project: 'Aura',
            workflow: 'Aura Production Release Orchestrator',
            event: process.env.EVENT_NAME,
            actor: process.env.ACTOR,
            ref: process.env.REF_NAME,
            sha: process.env.SHA,
            runId: process.env.RUN_ID,
            changed: {
              backend: bool('BACKEND_CHANGED'),
              frontendNetlify: bool('FRONTEND_NETLIFY_CHANGED'),
              frontendAws: bool('FRONTEND_AWS_CHANGED'),
              gateway: bool('GATEWAY_CHANGED'),
              desktop: bool('DESKTOP_CHANGED'),
              mobile: bool('MOBILE_CHANGED'),
            },
            providerReadiness: {
              backend: bool('BACKEND_READY'),
              frontendNetlify: bool('FRONTEND_NETLIFY_READY'),
              frontendAws: bool('FRONTEND_AWS_READY'),
              gateway: bool('GATEWAY_READY'),
            },
            plannedActions: {
              deployBackend: bool('SHOULD_DEPLOY_BACKEND'),
              deployFrontendNetlify: bool('SHOULD_DEPLOY_FRONTEND_NETLIFY'),
              deployFrontendAws: bool('SHOULD_DEPLOY_FRONTEND_AWS'),
              deployGateway: bool('SHOULD_DEPLOY_GATEWAY'),
              releaseDesktop: bool('SHOULD_RELEASE_DESKTOP'),
              releaseMobile: bool('SHOULD_RELEASE_MOBILE'),
              rollbackBackend: bool('SHOULD_ROLLBACK_BACKEND'),
              rollbackFrontendNetlify: bool('SHOULD_ROLLBACK_FRONTEND_NETLIFY'),
              rollbackFrontendAws: bool('SHOULD_ROLLBACK_FRONTEND_AWS'),
              rollbackGateway: bool('SHOULD_ROLLBACK_GATEWAY'),
            },
            signing: {
              enabled: bool('SIGNING_ENABLED'),
              requireWindowsSigning: false,
              requireMacosSigning: false,
              requireAndroidSigning: false,
              requireIosSigning: false,
            },
            storePublishing: {
              enabled: bool('STORE_PUBLISH_ENABLED'),
              publishStoreRelease: false,
            },
          };

          fs.writeFileSync('release-manifest.json', `${JSON.stringify(manifest, null, 2)}\n`);
          console.log(JSON.stringify(manifest, null, 2));
          EOF

      - name: Upload release manifest
        uses: actions/upload-artifact@v7
        with:
          name: aura-production-release-manifest
          path: release-manifest.json
          retention-days: 90

  deploy-backend:
    name: Deploy backend to AWS
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - release-manifest
    if: |
      always() &&
      needs.plan.outputs.should_deploy_backend == 'true' &&
      needs.quality-gates.result == 'success' &&
      needs.security-gates.result == 'success' &&
      needs.production-approval.result == 'success' &&
      needs.release-manifest.result == 'success'
    uses: ./.github/workflows/deploy-backend-aws.yml
    permissions:
      contents: read
      id-token: write
    with:
      git_ref: ${{ github.sha }}
      skip_healthcheck: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_backend_healthcheck || false }}
    secrets: inherit

  deploy-backend-noop:
    name: Deploy backend no-op
    runs-on: ubuntu-latest
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - deploy-backend
    if: always() && needs.deploy-backend.result == 'skipped'

    steps:
      - name: Explain backend deploy decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED: ${{ needs.plan.outputs.backend_changed }}
          READY: ${{ needs.plan.outputs.backend_ready }}
          MISSING: ${{ needs.plan.outputs.backend_missing }}
          SHOULD: ${{ needs.plan.outputs.should_deploy_backend }}
          MANUAL_CONFIRMED: ${{ needs.plan.outputs.manual_confirmed }}
          MANUAL_REQUESTED: ${{ inputs.deploy_backend || false }}
        run: |
          {
            echo "## Backend Deploy No-Op"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Changed | ${CHANGED} |"
            echo "| Manual requested | ${MANUAL_REQUESTED} |"
            echo "| Manual confirmed | ${MANUAL_CONFIRMED} |"
            echo "| Ready | ${READY} |"
            echo "| Missing config | ${MISSING} |"
            echo "| Planned deploy | ${SHOULD} |"
            echo "| Quality gates | ${{ needs.quality-gates.result }} |"
            echo "| Security gates | ${{ needs.security-gates.result }} |"
            echo "| Approval | ${{ needs.production-approval.result }} |"
            echo
            if [ "${READY}" != "true" ] && { [ "${CHANGED}" = "true" ] || [ "${MANUAL_REQUESTED}" = "true" ]; }; then
              echo "Backend deploy was requested but no-opped because required configuration is missing: ${MISSING}."
            elif [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${MANUAL_REQUESTED}" = "true" ] && [ "${MANUAL_CONFIRMED}" != "true" ]; then
              echo "Backend deploy was requested but no-opped because confirm_production was not PRODUCTION."
            elif [ "${{ needs.quality-gates.result }}" != "success" ] || [ "${{ needs.security-gates.result }}" != "success" ]; then
              echo "Backend deploy was blocked because CI or security gates did not pass."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Backend deploy was not requested for this run."
            else
              echo "Backend deploy did not run because production approval or release manifest did not complete."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-frontend-netlify:
    name: Deploy storefront to Netlify, Vercel, and AWS
