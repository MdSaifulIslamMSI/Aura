      needs.security-gates.result == 'success' &&
      needs.production-approval.result == 'success' &&
      needs.release-manifest.result == 'success'
    uses: ./.github/workflows/deploy-gateway-vercel.yml
    permissions:
      contents: read
      issues: write
      pull-requests: write
    with:
      target: production
    secrets:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  deploy-gateway-noop:
    name: Deploy gateway no-op
    runs-on: ubuntu-latest
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - deploy-gateway
    if: always() && needs.deploy-gateway.result == 'skipped'

    steps:
      - name: Explain gateway deploy decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED: ${{ needs.plan.outputs.gateway_changed }}
          READY: ${{ needs.plan.outputs.gateway_ready }}
          MISSING: ${{ needs.plan.outputs.gateway_missing }}
          SHOULD: ${{ needs.plan.outputs.should_deploy_gateway }}
          MANUAL_CONFIRMED: ${{ needs.plan.outputs.manual_confirmed }}
          MANUAL_REQUESTED: ${{ needs.plan.outputs.deploy_gateway_requested }}
          QUALITY_GATES_RESULT: ${{ needs.quality-gates.result }}
          SECURITY_GATES_RESULT: ${{ needs.security-gates.result }}
          APPROVAL_RESULT: ${{ needs.production-approval.result }}
        run: |
          {
            echo "## Gateway Deploy No-Op"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Changed | ${CHANGED} |"
            echo "| Manual requested | ${MANUAL_REQUESTED} |"
            echo "| Manual confirmed | ${MANUAL_CONFIRMED} |"
            echo "| Ready | ${READY} |"
            echo "| Missing config | ${MISSING} |"
            echo "| Planned deploy | ${SHOULD} |"
            echo "| Quality gates | ${QUALITY_GATES_RESULT} |"
            echo "| Security gates | ${SECURITY_GATES_RESULT} |"
            echo "| Approval | ${APPROVAL_RESULT} |"
            echo
            if [ "${READY}" != "true" ] && { [ "${CHANGED}" = "true" ] || [ "${MANUAL_REQUESTED}" = "true" ]; }; then
              echo "Gateway deploy was requested but no-opped because required configuration is missing: ${MISSING}."
            elif [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${MANUAL_REQUESTED}" = "true" ] && [ "${MANUAL_CONFIRMED}" != "true" ]; then
              echo "Gateway deploy was requested but no-opped because confirm_production was not PRODUCTION."
            elif [ "${QUALITY_GATES_RESULT}" != "success" ] || [ "${SECURITY_GATES_RESULT}" != "success" ]; then
              echo "Gateway deploy was blocked because CI or security gates did not pass."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Gateway deploy was not requested for this run."
            else
              echo "Gateway deploy did not run because production approval or release manifest did not complete."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-tests:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
    if: |
      always() &&
      (
        needs.deploy-backend.result == 'success' ||
        needs.deploy-frontend-netlify.result == 'success' ||
        needs.deploy-frontend-aws.result == 'success' ||
        needs.deploy-gateway.result == 'success'
      )

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Preflight production smoke target
        env:
          SMOKE_TARGET_ENV: production
          ALLOW_PRODUCTION_SMOKE: "true"
          SMOKE_BASE_URL: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || vars.AWS_FRONTEND_PUBLIC_URL || vars.NETLIFY_PRODUCTION_URL || vars.GATEWAY_PRODUCTION_URL || '' }}
          PROD_BASE_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL || vars.NETLIFY_PRODUCTION_URL || vars.GATEWAY_PRODUCTION_URL || '' }}
          PROD_API_BASE_URL: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
          PROD_SSM_PREFIX: /aura/prod
        run: node scripts/smoke-preflight.mjs

      - name: Run production smoke checks
        env:
          BACKEND_DEPLOY_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_NETLIFY_DEPLOY_RESULT: ${{ needs.deploy-frontend-netlify.result }}
          FRONTEND_AWS_DEPLOY_RESULT: ${{ needs.deploy-frontend-aws.result }}
          GATEWAY_DEPLOY_RESULT: ${{ needs.deploy-gateway.result }}
          AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
          BACKEND_HEALTH_PATH: ${{ vars.BACKEND_HEALTH_PATH || '/health' }}
          NETLIFY_PRODUCTION_URL: ${{ vars.NETLIFY_PRODUCTION_URL || '' }}
          AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL || '' }}
          GATEWAY_PRODUCTION_URL: ${{ vars.GATEWAY_PRODUCTION_URL || '' }}
          GATEWAY_HEALTH_PATH: ${{ vars.GATEWAY_HEALTH_PATH || '/' }}
        run: |
          set -euo pipefail

          smoke_if_deployed() {
            local name="$1"
            local deploy_result="$2"
            local url="$3"

            if [ "${deploy_result}" != "success" ]; then
              echo "Skipping ${name}; related deploy result was ${deploy_result}."
              return 0
            fi

            if [ -z "${url}" ]; then
              echo "Skipping ${name}; related URL is empty."
              return 0
            fi

            echo "Checking ${name}: ${url}"
            curl --fail --show-error --silent --location --max-time 30 "${url}" > /dev/null
            echo "${name} is healthy."
          }

          smoke_if_deployed "backend" "${BACKEND_DEPLOY_RESULT}" "${AURA_BACKEND_ORIGIN}${BACKEND_HEALTH_PATH}"
          smoke_if_deployed "netlify storefront" "${FRONTEND_NETLIFY_DEPLOY_RESULT}" "${NETLIFY_PRODUCTION_URL}"
          smoke_if_deployed "aws storefront" "${FRONTEND_AWS_DEPLOY_RESULT}" "${AWS_FRONTEND_PUBLIC_URL}"
          smoke_if_deployed "gateway" "${GATEWAY_DEPLOY_RESULT}" "${GATEWAY_PRODUCTION_URL}${GATEWAY_HEALTH_PATH}"

  smoke-tests-noop:
    name: Smoke tests no-op
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
    if: always() && needs.smoke-tests.result == 'skipped'

    steps:
      - name: Explain smoke decision
        env:
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          FRONTEND_NETLIFY_RESULT: ${{ needs.deploy-frontend-netlify.result }}
          FRONTEND_AWS_RESULT: ${{ needs.deploy-frontend-aws.result }}
          GATEWAY_RESULT: ${{ needs.deploy-gateway.result }}
        run: |
          {
            echo "## Smoke Tests No-Op"
            echo
            echo "No smoke tests ran because no deployment job completed successfully."
            echo
            echo "| Deploy job | Result |"
            echo "|---|---|"
            echo "| Backend | ${BACKEND_RESULT} |"
            echo "| Frontend Netlify | ${FRONTEND_NETLIFY_RESULT} |"
            echo "| Frontend AWS | ${FRONTEND_AWS_RESULT} |"
            echo "| Gateway | ${GATEWAY_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"

  rollback-backend:
    name: Roll back backend
    needs:
      - plan
      - production-approval
      - deploy-backend
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_backend == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.auto_rollback_on_smoke_failure == 'true' &&
          needs.deploy-backend.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-backend-aws.yml
    permissions:
      contents: read
      id-token: write
    with:
      rollback_ref: ${{ github.event.inputs.rollback_ref || '' }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  rollback-frontend-netlify:
    name: Roll back Netlify storefront
    needs:
      - plan
      - production-approval
      - deploy-frontend-netlify
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_frontend_netlify == 'true' ||
        (
