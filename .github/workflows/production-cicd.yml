      (needs.deploy-frontend-netlify.result == 'success' || needs.deploy-frontend-netlify.result == 'skipped') &&
      (needs.deploy-frontend-aws.result == 'success' || needs.deploy-frontend-aws.result == 'skipped') &&
      (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') &&
