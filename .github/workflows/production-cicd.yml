        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.auto_rollback_on_smoke_failure == 'true' &&
          needs.deploy-frontend-aws.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-frontend-aws.yml
    permissions:
      contents: read
      id-token: write
    with:
      rollback_ref: ${{ github.event.inputs.rollback_ref || '' }}
    secrets:
      AWS_FRONTEND_DEPLOY_ROLE_ARN: ${{ secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN }}

  rollback-gateway:
    name: Roll back gateway
    needs:
      - plan
      - production-approval
      - deploy-gateway
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
      (
        needs.plan.outputs.should_rollback_gateway == 'true' ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.auto_rollback_on_smoke_failure == 'true' &&
          needs.deploy-gateway.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-gateway-vercel.yml
    permissions:
      contents: read
    with:
      rollback_ref: ${{ github.event.inputs.rollback_ref || '' }}
    secrets:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  rollback-decisions:
    name: Rollback decision summary
    runs-on: ubuntu-latest
    needs:
      - plan
      - smoke-tests
      - rollback-backend
      - rollback-frontend-netlify
      - rollback-frontend-aws
      - rollback-gateway
    if: always()

    steps:
      - name: Explain rollback decisions
        env:
          SHOULD_ROLLBACK_BACKEND: ${{ needs.plan.outputs.should_rollback_backend }}
          ROLLBACK_BACKEND_RESULT: ${{ needs.rollback-backend.result }}
          SHOULD_ROLLBACK_FRONTEND_NETLIFY: ${{ needs.plan.outputs.should_rollback_frontend_netlify }}
          ROLLBACK_FRONTEND_NETLIFY_RESULT: ${{ needs.rollback-frontend-netlify.result }}
          SHOULD_ROLLBACK_FRONTEND_AWS: ${{ needs.plan.outputs.should_rollback_frontend_aws }}
          ROLLBACK_FRONTEND_AWS_RESULT: ${{ needs.rollback-frontend-aws.result }}
          SHOULD_ROLLBACK_GATEWAY: ${{ needs.plan.outputs.should_rollback_gateway }}
          ROLLBACK_GATEWAY_RESULT: ${{ needs.rollback-gateway.result }}
          IS_WORKFLOW_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          AUTO_ROLLBACK_INPUT: ${{ github.event.inputs.auto_rollback_on_smoke_failure == 'true' }}
          SMOKE_TESTS_RESULT: ${{ needs.smoke-tests.result }}
        run: |
          {
            echo "## Rollback Decisions"
            echo
            echo "| Rollback | Planned/manual | Result |"
            echo "|---|---:|---|"
            echo "| Backend | ${SHOULD_ROLLBACK_BACKEND} | ${ROLLBACK_BACKEND_RESULT} |"
            echo "| Netlify frontend | ${SHOULD_ROLLBACK_FRONTEND_NETLIFY} | ${ROLLBACK_FRONTEND_NETLIFY_RESULT} |"
            echo "| AWS frontend | ${SHOULD_ROLLBACK_FRONTEND_AWS} | ${ROLLBACK_FRONTEND_AWS_RESULT} |"
            echo "| Gateway | ${SHOULD_ROLLBACK_GATEWAY} | ${ROLLBACK_GATEWAY_RESULT} |"
            echo
            echo "| Auto rollback condition | Value |"
            echo "|---|---|"
            echo "| Workflow dispatch | ${IS_WORKFLOW_DISPATCH} |"
            echo "| Auto rollback input | ${AUTO_ROLLBACK_INPUT} |"
            echo "| Smoke result | ${SMOKE_TESTS_RESULT} |"
            echo
            echo "Rollbacks only run for confirmed manual rollback requests or for workflow_dispatch smoke failures when auto rollback is explicitly enabled."
          } >> "$GITHUB_STEP_SUMMARY"

  release-desktop:
    name: Publish desktop apps
    needs:
