    with:
      git_ref: ${{ github.sha }}
      skip_healthcheck: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_backend_healthcheck == 'true' || false }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  deploy-backend-noop:
