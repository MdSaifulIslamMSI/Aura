          github.event.inputs.auto_rollback_on_smoke_failure == 'true' &&
          needs.deploy-frontend-netlify.result == 'success' &&
          needs.smoke-tests.result == 'failure'
        )
      )
    uses: ./.github/workflows/rollback-netlify.yml
    permissions:
      contents: read
    with:
      rollback_ref: ${{ github.event.inputs.rollback_ref || '' }}
    secrets:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  rollback-frontend-aws:
    name: Roll back AWS storefront
    needs:
      - plan
      - production-approval
      - deploy-frontend-aws
      - smoke-tests
    if: |
      always() &&
      needs.production-approval.result == 'success' &&
