              echo "Desktop release was requested but no-opped because confirm_production was not PRODUCTION."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Desktop release was not requested for this run."
            elif [ "${QUALITY_GATES_RESULT}" != "success" ] || [ "${SECURITY_GATES_RESULT}" != "success" ]; then
