            echo "| Quality gates | ${QUALITY_GATES_RESULT} |"
            echo "| Security gates | ${SECURITY_GATES_RESULT} |"
            echo "| Approval | ${APPROVAL_RESULT} |"
            echo "| Smoke tests | ${SMOKE_TESTS_RESULT} |"
            echo
            if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${MANUAL_REQUESTED}" = "true" ] && [ "${MANUAL_CONFIRMED}" != "true" ]; then
              echo "Mobile release was requested but no-opped because confirm_production was not PRODUCTION."
            elif [ "${SHOULD}" != "true" ]; then
              echo "Mobile release was not requested for this run."
            elif [ "${QUALITY_GATES_RESULT}" != "success" ] || [ "${SECURITY_GATES_RESULT}" != "success" ]; then
              echo "Mobile release was blocked because CI or security gates did not pass."
            elif [ "${SMOKE_TESTS_RESULT}" = "failure" ]; then
              echo "Mobile release was blocked because smoke tests failed."
            else
              echo "Mobile release did not run because approval or a dependent production job was not safe."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  production-tag:
    name: Create production traceability tag
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend-netlify
      - deploy-frontend-aws
      - deploy-gateway
      - smoke-tests
      - release-desktop
      - release-mobile
    if: |
      always() &&
      (
        needs.deploy-backend.result == 'success' ||
        needs.deploy-frontend-netlify.result == 'success' ||
        needs.deploy-frontend-aws.result == 'success' ||
        needs.deploy-gateway.result == 'success' ||
        needs.release-desktop.result == 'success' ||
        needs.release-mobile.result == 'success'
      ) &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped')
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push production tag
        id: tag
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          tag="production-${timestamp}-${short_sha}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${tag}" -m "Production release ${tag} from ${GITHUB_SHA}"
          git push origin "${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Created production tag: ${tag}"

  production-summary:
    name: Production release summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - plan
      - quality-gates
      - security-gates
      - production-approval
      - production-approval-noop
      - release-manifest
      - deploy-backend
      - deploy-backend-noop
      - deploy-frontend-netlify
      - deploy-frontend-netlify-noop
      - deploy-frontend-aws
      - deploy-frontend-aws-noop
      - deploy-gateway
      - deploy-gateway-noop
      - smoke-tests
      - smoke-tests-noop
      - rollback-backend
      - rollback-frontend-netlify
      - rollback-frontend-aws
      - rollback-gateway
      - rollback-decisions
      - release-desktop
      - release-desktop-noop
      - release-mobile
      - release-mobile-noop
      - production-tag

    steps:
      - name: Write production summary
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR_NAME: ${{ github.actor }}
          REF_NAME: ${{ github.ref }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REQUESTED_PRODUCTION_ACTION: ${{ needs.plan.outputs.requested_production_action }}
          PLANNED_PRODUCTION_ACTION: ${{ needs.plan.outputs.planned_production_action }}
          MANUAL_CONFIRMED: ${{ needs.plan.outputs.manual_confirmed }}
          SHOULD_RUN_SMOKE_TESTS: ${{ needs.plan.outputs.should_run_smoke_tests }}
          BACKEND_READY: ${{ needs.plan.outputs.backend_ready }}
          BACKEND_MISSING: ${{ needs.plan.outputs.backend_missing }}
          FRONTEND_NETLIFY_READY: ${{ needs.plan.outputs.frontend_netlify_ready }}
          FRONTEND_NETLIFY_MISSING: ${{ needs.plan.outputs.frontend_netlify_missing }}
          FRONTEND_AWS_READY: ${{ needs.plan.outputs.frontend_aws_ready }}
          FRONTEND_AWS_MISSING: ${{ needs.plan.outputs.frontend_aws_missing }}
          GATEWAY_READY: ${{ needs.plan.outputs.gateway_ready }}
          GATEWAY_MISSING: ${{ needs.plan.outputs.gateway_missing }}
          QUALITY_GATES_RESULT: ${{ needs.quality-gates.result }}
          SECURITY_GATES_RESULT: ${{ needs.security-gates.result }}
          PRODUCTION_APPROVAL_RESULT: ${{ needs.production-approval.result }}
          RELEASE_MANIFEST_RESULT: ${{ needs.release-manifest.result }}
          SHOULD_DEPLOY_BACKEND: ${{ needs.plan.outputs.should_deploy_backend }}
          DEPLOY_BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          DEPLOY_BACKEND_NOOP_RESULT: ${{ needs.deploy-backend-noop.result }}
          SHOULD_DEPLOY_FRONTEND_NETLIFY: ${{ needs.plan.outputs.should_deploy_frontend_netlify }}
          DEPLOY_FRONTEND_NETLIFY_RESULT: ${{ needs.deploy-frontend-netlify.result }}
          DEPLOY_FRONTEND_NETLIFY_NOOP_RESULT: ${{ needs.deploy-frontend-netlify-noop.result }}
          SHOULD_DEPLOY_FRONTEND_AWS: ${{ needs.plan.outputs.should_deploy_frontend_aws }}
          DEPLOY_FRONTEND_AWS_RESULT: ${{ needs.deploy-frontend-aws.result }}
          DEPLOY_FRONTEND_AWS_NOOP_RESULT: ${{ needs.deploy-frontend-aws-noop.result }}
          SHOULD_DEPLOY_GATEWAY: ${{ needs.plan.outputs.should_deploy_gateway }}
          DEPLOY_GATEWAY_RESULT: ${{ needs.deploy-gateway.result }}
          DEPLOY_GATEWAY_NOOP_RESULT: ${{ needs.deploy-gateway-noop.result }}
          SMOKE_TESTS_RESULT: ${{ needs.smoke-tests.result }}
          SMOKE_TESTS_NOOP_RESULT: ${{ needs.smoke-tests-noop.result }}
          SHOULD_ROLLBACK_BACKEND: ${{ needs.plan.outputs.should_rollback_backend }}
          ROLLBACK_BACKEND_RESULT: ${{ needs.rollback-backend.result }}
          SHOULD_ROLLBACK_FRONTEND_NETLIFY: ${{ needs.plan.outputs.should_rollback_frontend_netlify }}
          ROLLBACK_FRONTEND_NETLIFY_RESULT: ${{ needs.rollback-frontend-netlify.result }}
          SHOULD_ROLLBACK_FRONTEND_AWS: ${{ needs.plan.outputs.should_rollback_frontend_aws }}
          ROLLBACK_FRONTEND_AWS_RESULT: ${{ needs.rollback-frontend-aws.result }}
          SHOULD_ROLLBACK_GATEWAY: ${{ needs.plan.outputs.should_rollback_gateway }}
          ROLLBACK_GATEWAY_RESULT: ${{ needs.rollback-gateway.result }}
          SHOULD_RELEASE_DESKTOP: ${{ needs.plan.outputs.should_release_desktop }}
          RELEASE_DESKTOP_RESULT: ${{ needs.release-desktop.result }}
          RELEASE_DESKTOP_NOOP_RESULT: ${{ needs.release-desktop-noop.result }}
          SHOULD_RELEASE_MOBILE: ${{ needs.plan.outputs.should_release_mobile }}
          RELEASE_MOBILE_RESULT: ${{ needs.release-mobile.result }}
          RELEASE_MOBILE_NOOP_RESULT: ${{ needs.release-mobile-noop.result }}
          SIGNING_ENABLED: ${{ needs.plan.outputs.signing_enabled }}
          STORE_PUBLISH_ENABLED: ${{ needs.plan.outputs.store_publish_enabled }}
          PRODUCTION_TAG_RESULT: ${{ needs.production-tag.result }}
          PRODUCTION_TAG: ${{ needs.production-tag.outputs.tag }}
        run: |
          {
            echo "## Aura Production Release Summary"
            echo
            echo "### A. Run metadata"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Event | ${EVENT_NAME} |"
            echo "| Actor | ${ACTOR_NAME} |"
            echo "| Ref | ${REF_NAME} |"
            echo "| SHA | ${COMMIT_SHA} |"
            echo "| Run | ${RUN_ID} |"
            echo
            echo "### B. Plan decisions"
            echo
            echo "| Decision | Value |"
            echo "|---|---|"
            echo "| Requested production action | ${REQUESTED_PRODUCTION_ACTION} |"
            echo "| Planned production action | ${PLANNED_PRODUCTION_ACTION} |"
            echo "| Manual confirmed | ${MANUAL_CONFIRMED} |"
            echo "| Should run smoke tests | ${SHOULD_RUN_SMOKE_TESTS} |"
            echo
            echo "### C. Provider readiness"
            echo
            echo "| Provider | Ready | Missing config names |"
            echo "|---|---:|---|"
            echo "| Backend AWS | ${BACKEND_READY} | ${BACKEND_MISSING} |"
            echo "| Frontend Netlify | ${FRONTEND_NETLIFY_READY} | ${FRONTEND_NETLIFY_MISSING} |"
            echo "| Frontend AWS | ${FRONTEND_AWS_READY} | ${FRONTEND_AWS_MISSING} |"
            echo "| Gateway Vercel | ${GATEWAY_READY} | ${GATEWAY_MISSING} |"
            echo
            echo "### D. CI/security/approval results"
            echo
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| Quality gates | ${QUALITY_GATES_RESULT} |"
            echo "| Security gates | ${SECURITY_GATES_RESULT} |"
            echo "| Production approval | ${PRODUCTION_APPROVAL_RESULT} |"
            echo "| Release manifest | ${RELEASE_MANIFEST_RESULT} |"
            echo
            echo "### E. Deploy decisions/results"
            echo
            echo "| Deploy | Planned | Result | No-op job |"
            echo "|---|---:|---|---|"
            echo "| Backend AWS | ${SHOULD_DEPLOY_BACKEND} | ${DEPLOY_BACKEND_RESULT} | ${DEPLOY_BACKEND_NOOP_RESULT} |"
            echo "| Frontend Netlify | ${SHOULD_DEPLOY_FRONTEND_NETLIFY} | ${DEPLOY_FRONTEND_NETLIFY_RESULT} | ${DEPLOY_FRONTEND_NETLIFY_NOOP_RESULT} |"
            echo "| Frontend AWS | ${SHOULD_DEPLOY_FRONTEND_AWS} | ${DEPLOY_FRONTEND_AWS_RESULT} | ${DEPLOY_FRONTEND_AWS_NOOP_RESULT} |"
            echo "| Gateway Vercel | ${SHOULD_DEPLOY_GATEWAY} | ${DEPLOY_GATEWAY_RESULT} | ${DEPLOY_GATEWAY_NOOP_RESULT} |"
            echo
            echo "### F. Smoke test result"
            echo
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Smoke tests | ${SMOKE_TESTS_RESULT} |"
            echo "| Smoke tests no-op | ${SMOKE_TESTS_NOOP_RESULT} |"
            echo
            echo "### G. Rollback decisions/results"
            echo
            echo "| Rollback | Planned | Result |"
            echo "|---|---:|---|"
            echo "| Backend | ${SHOULD_ROLLBACK_BACKEND} | ${ROLLBACK_BACKEND_RESULT} |"
            echo "| Frontend Netlify | ${SHOULD_ROLLBACK_FRONTEND_NETLIFY} | ${ROLLBACK_FRONTEND_NETLIFY_RESULT} |"
            echo "| Frontend AWS | ${SHOULD_ROLLBACK_FRONTEND_AWS} | ${ROLLBACK_FRONTEND_AWS_RESULT} |"
            echo "| Gateway | ${SHOULD_ROLLBACK_GATEWAY} | ${ROLLBACK_GATEWAY_RESULT} |"
            echo
            echo "### H. Desktop/mobile release result"
            echo
            echo "| Release | Planned | Result | No-op job |"
            echo "|---|---:|---|---|"
            echo "| Desktop | ${SHOULD_RELEASE_DESKTOP} | ${RELEASE_DESKTOP_RESULT} | ${RELEASE_DESKTOP_NOOP_RESULT} |"
            echo "| Mobile | ${SHOULD_RELEASE_MOBILE} | ${RELEASE_MOBILE_RESULT} | ${RELEASE_MOBILE_NOOP_RESULT} |"
            echo
            echo "### I. Signing status"
            echo
            echo "| Platform | Required | Enabled |"
            echo "|---|---:|---:|"
            echo "| Windows | false | ${SIGNING_ENABLED} |"
            echo "| macOS | false | ${SIGNING_ENABLED} |"
            echo "| Android | false | ${SIGNING_ENABLED} |"
            echo "| iOS | false | ${SIGNING_ENABLED} |"
            echo
            echo "### J. Store publishing status"
            echo
            echo "| Store publishing | Enabled |"
            echo "|---|---:|"
            echo "| Microsoft Store / Mac App Store / Google Play / App Store | ${STORE_PUBLISH_ENABLED} |"
            echo
            echo "### K. Production tag"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag job result | ${PRODUCTION_TAG_RESULT} |"
            echo "| Tag | ${PRODUCTION_TAG} |"
          } >> "$GITHUB_STEP_SUMMARY"
