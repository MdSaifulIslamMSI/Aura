name: Deploy Frontend To Netlify, Vercel, And AWS

on:
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "netlify.toml"
      - ".netlifyignore"
      - "vercel.json"
      - ".vercelignore"
      - "infra/aws/bootstrap-frontend-s3.ps1"
      - "infra/aws/bootstrap-frontend-github-oidc.ps1"
      - "infra/aws/bootstrap-frontend-cloudfront.ps1"
      - "infra/aws/deploy-frontend-s3.ps1"
      - ".github/workflows/deploy-netlify.yml"
      - ".github/workflows/deploy-frontend-aws.yml"
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: false
        default: production
        type: choice
        options:
          - preview
          - production
  workflow_call:
    inputs:
      target:
        description: Deployment target
        required: false
        default: production
        type: string
      auto_rollback_on_failure:
        description: Restore every mutated storefront host if the multi-host release fails
        required: false
        default: false
        type: boolean
      parent_holds_production_lock:
        description: Internal only; the reusable-workflow caller already owns the shared production mutation lock
        required: false
        default: false
        type: boolean
    outputs:
      netlify_rollback_ref:
        description: Netlify deploy id that was live before this release
        value: ${{ jobs.build-frontend.outputs.netlify_rollback_ref }}
      vercel_storefront_rollback_ref:
        description: Vercel storefront deployment that was live before this release
        value: ${{ jobs.build-frontend.outputs.vercel_storefront_rollback_ref }}
      aws_frontend_rollback_ref:
        description: AWS snapshot key created for this release
        value: ${{ jobs.deploy-aws-production.outputs.rollback_ref }}
      netlify_production_url:
        description: Netlify production URL published by this release
        value: ${{ jobs.deploy-production.outputs.site_url }}
      vercel_storefront_production_url:
        description: Vercel storefront production URL published by this release
        value: ${{ jobs.deploy-vercel-production.outputs.site_url }}
      aws_frontend_production_url:
        description: AWS CloudFront production URL published by this release
        value: ${{ jobs.deploy-aws-production.outputs.site_url }}
    secrets:
      AWS_FRONTEND_DEPLOY_ROLE_ARN:
        required: false
      NETLIFY_AUTH_TOKEN:
        required: false
      NETLIFY_SITE_ID:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false
      VERCEL_TOKEN:
        required: false
      VITE_FIREBASE_API_KEY:
        required: false
      VITE_FIREBASE_APP_ID:
        required: false
      VITE_FIREBASE_AUTH_DOMAIN:
        required: false
      VITE_FIREBASE_CONFIG:
        required: false
      VITE_FIREBASE_MEASUREMENT_ID:
        required: false
      VITE_FIREBASE_MESSAGING_SENDER_ID:
        required: false
      VITE_FIREBASE_PROJECT_ID:
        required: false
      VITE_FIREBASE_STORAGE_BUCKET:
        required: false
      VITE_FIREBASE_WEB_CONFIG:
        required: false

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ inputs.target == 'production' && inputs.parent_holds_production_lock == true && format('aura-production-parent-{0}-frontend-multihost', github.run_id) || inputs.target == 'production' && 'aura-production-mutation' || format('frontend-{0}', github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref) }}
  cancel-in-progress: ${{ inputs.target != 'production' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x
  NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID || secrets.NETLIFY_SITE_ID }}
  NETLIFY_SITE_NAME: ${{ vars.NETLIFY_SITE_NAME || 'aurapilot' }}
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
  VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME || 'app' }}
  VERCEL_PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL || 'https://aurapilot.vercel.app' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  AWS_FRONTEND_BUCKET: ${{ vars.AWS_FRONTEND_BUCKET || '' }}
  AWS_FRONTEND_DISTRIBUTION_ID: ${{ vars.AWS_FRONTEND_DISTRIBUTION_ID || '' }}
  AWS_FRONTEND_PUBLIC_URL: ${{ vars.AWS_FRONTEND_PUBLIC_URL || '' }}
  AWS_FRONTEND_DEPLOY_ROLE_ARN: ${{ vars.AWS_FRONTEND_DEPLOY_ROLE_ARN || secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN || '' }}
  AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY || secrets.VITE_FIREBASE_API_KEY || '' }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN || secrets.VITE_FIREBASE_AUTH_DOMAIN || '' }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID || secrets.VITE_FIREBASE_PROJECT_ID || '' }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET || secrets.VITE_FIREBASE_STORAGE_BUCKET || '' }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID || secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
  VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID || secrets.VITE_FIREBASE_APP_ID || '' }}
  VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID || secrets.VITE_FIREBASE_MEASUREMENT_ID || '' }}
  VITE_FIREBASE_CONFIG: ${{ vars.VITE_FIREBASE_CONFIG || secrets.VITE_FIREBASE_CONFIG || vars.VITE_FIREBASE_WEB_CONFIG || secrets.VITE_FIREBASE_WEB_CONFIG || '' }}
  VITE_FIREBASE_DISABLE_SOCIAL_AUTH: ${{ vars.VITE_FIREBASE_DISABLE_SOCIAL_AUTH || 'false' }}
  VITE_FIREBASE_ENABLE_MICROSOFT_AUTH: ${{ vars.VITE_FIREBASE_ENABLE_MICROSOFT_AUTH || 'false' }}
  VITE_FIREBASE_ENABLE_APPLE_AUTH: ${{ vars.VITE_FIREBASE_ENABLE_APPLE_AUTH || 'false' }}
  VITE_DUO_LOGIN_ENABLED: ${{ vars.VITE_DUO_LOGIN_ENABLED || 'false' }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      backend_origin: ${{ steps.backend.outputs.origin }}
      built_at: ${{ steps.release.outputs.built_at }}
      netlify_rollback_ref: ${{ steps.rollback_targets.outputs.netlify_ref }}
      vercel_storefront_rollback_ref: ${{ steps.rollback_targets.outputs.vercel_ref }}
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Validate Netlify deployment configuration
        working-directory: .
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
        run: |
          if [ "${DEPENDABOT_PR}" = "true" ]; then
            echo "Dependabot pull requests do not receive deployment secrets; running build-only validation."
            exit 0
          fi
          test -n "${NETLIFY_AUTH_TOKEN}" || { echo "Missing GitHub secret NETLIFY_AUTH_TOKEN"; exit 1; }
          test -n "${NETLIFY_SITE_ID}" || { echo "Missing GitHub variable or secret NETLIFY_SITE_ID"; exit 1; }
          test -n "${VERCEL_TOKEN}" || { echo "Missing GitHub secret VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_ORG_ID}" || { echo "Missing GitHub variable or secret VERCEL_ORG_ID"; exit 1; }
          test -n "${VERCEL_PROJECT_ID}" || { echo "Missing GitHub variable or secret VERCEL_PROJECT_ID"; exit 1; }

      - name: Capture provider-specific production rollback targets
        if: inputs.target == 'production'
        id: rollback_targets
        working-directory: .
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          netlify_site="$(mktemp)"
          vercel_alias_state="$(mktemp)"

          curl --fail --show-error --silent --location \
            --header "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}" \
            > "${netlify_site}"

          netlify_ref="$(jq -r '.published_deploy.id // empty' "${netlify_site}")"
          test -n "${netlify_ref}" || { echo "Netlify has no published production deploy to restore." >&2; exit 1; }

          sanitized_vercel_token="$(printf '%s' "${VERCEL_TOKEN}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          test -n "${sanitized_vercel_token}" || { echo "Vercel token is empty after trimming whitespace." >&2; exit 1; }
          echo "::add-mask::${sanitized_vercel_token}"

          vercel_production_host="$(VERCEL_PRODUCTION_URL="${VERCEL_PRODUCTION_URL}" node <<'NODE'
          const value = String(process.env.VERCEL_PRODUCTION_URL || '').trim();
          const url = new URL(value);
          if (url.protocol !== 'https:' || !url.hostname) {
            throw new Error('VERCEL_PRODUCTION_URL must be an absolute HTTPS URL.');
          }
          process.stdout.write(url.hostname);
          NODE
          )"

          curl --fail --show-error --silent --location --get \
            --header "Authorization: Bearer ${sanitized_vercel_token}" \
            --data-urlencode "projectId=${VERCEL_PROJECT_ID}" \
            --data-urlencode "teamId=${VERCEL_ORG_ID}" \
            "https://api.vercel.com/v4/aliases/${vercel_production_host}" \
            > "${vercel_alias_state}"

          vercel_ref="$(jq -r '.deploymentId // .deployment.id // empty' "${vercel_alias_state}")"
          vercel_project_id="$(jq -r '.projectId // empty' "${vercel_alias_state}")"
          test -n "${vercel_ref}" || { echo "Vercel production alias has no deployment to restore." >&2; exit 1; }
          test "${vercel_project_id}" = "${VERCEL_PROJECT_ID}" || {
            echo "Vercel production alias belongs to project '${vercel_project_id}', expected '${VERCEL_PROJECT_ID}'." >&2
            exit 1
          }

          echo "netlify_ref=${netlify_ref}" >> "$GITHUB_OUTPUT"
          echo "vercel_ref=${vercel_ref}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: npm ci

      - name: Resolve hosted backend origin
        working-directory: .
        id: backend
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_TARGET_INPUT: ${{ inputs.target || '' }}
        run: |
          set -euo pipefail
          ERROR_LOG="${RUNNER_TEMP}/hosted-backend-origin.err"
          if ORIGIN="$(node ./app/scripts/print_hosted_backend_origin.mjs 2>"${ERROR_LOG}")"; then
            echo "origin=${ORIGIN}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${EVENT_NAME}" = "pull_request" ] || [ "${DEPLOY_TARGET_INPUT}" = "preview" ]; then
            echo "Hosted backend origin is not configured. The shared preview build will use same-origin /api, and the Vercel prebuilt proxy artifact will be skipped."
            cat "${ERROR_LOG}" >&2 || true
            echo "origin=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat "${ERROR_LOG}" >&2 || true
          exit 1

      - name: Capture shared release timestamp
        id: release
        run: echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build shared frontend artifact
        env:
          VITE_DEPLOY_TARGET: multi-host
          VITE_API_URL: ${{ steps.backend.outputs.origin }}/api
          VITE_RELEASE_ID: ${{ github.sha }}
          VITE_RELEASE_SHA: ${{ github.sha }}
          VITE_RELEASE_CHANNEL: ${{ inputs.target == 'production' && 'production' || 'preview' }}
          VITE_RELEASE_SOURCE: github-actions
          VITE_RELEASE_TIME: ${{ steps.release.outputs.built_at }}
        run: npm run build

      - name: Upload frontend dist bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: app/dist
          retention-days: 7

  package-vercel-prebuilt:
    needs: build-frontend
    if: needs.build-frontend.outputs.backend_origin != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download shared frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: app/dist

      - name: Create Vercel prebuilt output from shared artifact
        env:
          AURA_BACKEND_ORIGIN: ${{ needs.build-frontend.outputs.backend_origin }}
        run: node app/scripts/create_vercel_static_output.mjs

      - name: Verify Vercel output mirrors shared artifact
        run: diff -qr app/dist .vercel/output/static

      - name: Create Vercel project metadata
        run: |
          set -euo pipefail
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "${VERCEL_ORG_ID}" "${VERCEL_PROJECT_ID}" > .vercel/project.json

      - name: Upload Vercel prebuilt output
        uses: actions/upload-artifact@v7
        with:
          name: vercel-prebuilt-output
          include-hidden-files: true
          path: |
            .vercel/output
            .vercel/project.json
          retention-days: 7

  deploy-preview:
    needs: build-frontend
    if: (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') || inputs.target == 'preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      site_url: ${{ steps.deploy.outputs.site_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: app/dist

      - name: Publish preview deploy
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_JSON="${RUNNER_TEMP}/netlify-preview.json"
          npx netlify-cli deploy \
            --dir app/dist \
            --site "${NETLIFY_SITE_ID}" \
            --auth "${NETLIFY_AUTH_TOKEN}" \
            --no-build \
            --json \
            --message "GitHub Actions preview for ${GITHUB_REF_NAME} @ ${GITHUB_SHA}" \
            > "${DEPLOY_JSON}"
          DEPLOY_JSON="${DEPLOY_JSON}" node <<'EOF'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync(process.env.DEPLOY_JSON, 'utf8'));
          const deployUrl = payload.deploy_ssl_url || payload.deploy_url || '';
          const siteUrl = payload.ssl_url || payload.url || '';
          if (!deployUrl) {
            throw new Error('Netlify CLI did not return a preview deploy URL.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_url=${deployUrl}\n`);
          if (siteUrl) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `site_url=${siteUrl}\n`);
          }
          EOF

      - name: Add preview to job summary
        run: |
          {
            echo "### Netlify Preview"
            echo
            echo "- Site: ${NETLIFY_SITE_NAME}"
            echo "- Preview: ${{ steps.deploy.outputs.deploy_url }}"
            if [ -n "${{ steps.deploy.outputs.site_url }}" ]; then
              echo "- Site URL: ${{ steps.deploy.outputs.site_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          SITE_URL: ${{ steps.deploy.outputs.site_url }}
          SITE_NAME: ${{ env.NETLIFY_SITE_NAME }}
        with:
          script: |
            const marker = '<!-- aura-netlify-preview -->';
            const body = [
              marker,
              `Netlify preview for \`${process.env.SITE_NAME}\` is ready.`,
              `Preview URL: ${process.env.DEPLOY_URL}`,
              process.env.SITE_URL ? `Site URL: ${process.env.SITE_URL}` : '',
            ].filter(Boolean).join('\n\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  validate-aws-production-access:
    needs: build-frontend
    if: inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: aws-frontend-production

    steps:
      - name: Validate AWS frontend deployment configuration
        run: |
          set -euo pipefail
          test -n "${AWS_REGION}" || { echo "Missing AWS_REGION"; exit 1; }
          test -n "${AWS_FRONTEND_BUCKET}" || { echo "Missing AWS_FRONTEND_BUCKET"; exit 1; }
          test -n "${AWS_FRONTEND_DISTRIBUTION_ID}" || { echo "Missing AWS_FRONTEND_DISTRIBUTION_ID"; exit 1; }
          test -n "${AWS_FRONTEND_PUBLIC_URL}" || { echo "Missing AWS_FRONTEND_PUBLIC_URL"; exit 1; }
          test -n "${AWS_FRONTEND_DEPLOY_ROLE_ARN}" || { echo "Missing AWS_FRONTEND_DEPLOY_ROLE_ARN"; exit 1; }
          echo "Bucket: ${AWS_FRONTEND_BUCKET}"
          echo "Region: ${AWS_REGION}"
          echo "Distribution: ${AWS_FRONTEND_DISTRIBUTION_ID}"
          echo "Public URL: ${AWS_FRONTEND_PUBLIC_URL}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          role-session-name: aura-github-frontend-s3-preflight
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Verify AWS frontend bucket access
        run: |
          set -euo pipefail
          aws s3api head-bucket \
            --bucket "${AWS_FRONTEND_BUCKET}" \
            --region "${AWS_REGION}"
          aws s3api get-bucket-website \
            --bucket "${AWS_FRONTEND_BUCKET}" \
            --region "${AWS_REGION}" \
            > /dev/null
          aws cloudfront get-distribution \
            --id "${AWS_FRONTEND_DISTRIBUTION_ID}" \
            > /dev/null

  deploy-production:
    needs:
      - build-frontend
      - validate-aws-production-access
    if: inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: netlify-production
      url: ${{ steps.deploy.outputs.site_url }}
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      site_url: ${{ steps.deploy.outputs.site_url }}
      deployment_attempted: ${{ steps.mutation.outputs.attempted }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: app/dist

      - name: Mark Netlify production mutation attempt
        id: mutation
        run: echo "attempted=true" >> "$GITHUB_OUTPUT"

      - name: Publish production deploy
        id: deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_JSON="${RUNNER_TEMP}/netlify-production.json"
          npx netlify-cli deploy \
            --dir app/dist \
            --site "${NETLIFY_SITE_ID}" \
            --auth "${NETLIFY_AUTH_TOKEN}" \
            --prod \
            --no-build \
            --json \
            --message "GitHub Actions production deploy @ ${GITHUB_SHA}" \
            > "${DEPLOY_JSON}"
          DEPLOY_JSON="${DEPLOY_JSON}" node <<'EOF'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync(process.env.DEPLOY_JSON, 'utf8'));
          const deployUrl = payload.deploy_ssl_url || payload.deploy_url || payload.ssl_url || payload.url || '';
          const siteUrl = payload.ssl_url || payload.url || deployUrl;
          if (!deployUrl) {
            throw new Error('Netlify CLI did not return a production deploy URL.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_url=${deployUrl}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `site_url=${siteUrl}\n`);
          EOF

      - name: Add production deploy to job summary
        run: |
          {
            echo "### Netlify Production"
            echo
            echo "- Site: ${NETLIFY_SITE_NAME}"
            echo "- Production URL: ${{ steps.deploy.outputs.site_url }}"
            echo "- Deploy URL: ${{ steps.deploy.outputs.deploy_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-vercel-preview:
    needs:
      - build-frontend
      - package-vercel-prebuilt
    if: needs.build-frontend.outputs.backend_origin != '' && ((github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') || inputs.target == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Vercel prebuilt output
        uses: actions/download-artifact@v8
        with:
          name: vercel-prebuilt-output
          path: .vercel

      - name: Publish Vercel preview deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          SANITIZED_VERCEL_TOKEN="$(printf '%s' "${VERCEL_TOKEN}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${SANITIZED_VERCEL_TOKEN}" ]; then
            echo "GitHub secret VERCEL_TOKEN is empty after trimming whitespace." >&2
            exit 1
          fi
          echo "::add-mask::${SANITIZED_VERCEL_TOKEN}"
          for attempt in 1 2 3; do
            if DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --token "${SANITIZED_VERCEL_TOKEN}" --yes 2>&1)"; then
              break
            fi
            printf '%s\n' "${DEPLOY_OUTPUT}" >&2
            if [ "${attempt}" -eq 3 ]; then
              echo "Vercel preview deploy failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Retrying Vercel preview deploy (attempt $((attempt + 1))/3) after upload failure..." >&2
            sleep "$((attempt * 15))"
          done
          DEPLOY_URL="$(printf '%s\n' "${DEPLOY_OUTPUT}" | grep -Eo 'https://[-A-Za-z0-9.]+\.vercel\.app' | head -n 1 | tr -d '\r')"
          if [ -z "${DEPLOY_URL}" ]; then
            echo "Vercel CLI did not return a preview deployment URL." >&2
            printf '%s\n' "${DEPLOY_OUTPUT}" >&2
            exit 1
          fi
          printf 'deploy_url=%s\n' "${DEPLOY_URL}" >> "$GITHUB_OUTPUT"

      - name: Add Vercel preview to job summary
        run: |
          {
            echo "### Vercel Preview"
            echo
            echo "- Project: ${VERCEL_PROJECT_NAME}"
            echo "- Preview: ${{ steps.deploy.outputs.deploy_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment Vercel preview URL on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          PROJECT_NAME: ${{ env.VERCEL_PROJECT_NAME }}
        with:
          script: |
            const marker = '<!-- aura-vercel-preview -->';
            const body = [
              marker,
              `Vercel preview for \`${process.env.PROJECT_NAME}\` is ready.`,
              `Preview URL: ${process.env.DEPLOY_URL}`,
            ].filter(Boolean).join('\n\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy-vercel-production:
    needs:
      - build-frontend
      - package-vercel-prebuilt
      - validate-aws-production-access
    if: needs.build-frontend.outputs.backend_origin != '' && inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: vercel-production
      url: ${{ steps.deploy.outputs.site_url }}
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      site_url: ${{ steps.deploy.outputs.site_url }}
      deployment_attempted: ${{ steps.mutation.outputs.attempted }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download Vercel prebuilt output
        uses: actions/download-artifact@v8
        with:
          name: vercel-prebuilt-output
          path: .vercel

      - name: Mark Vercel production mutation attempt
        id: mutation
        run: echo "attempted=true" >> "$GITHUB_OUTPUT"

      - name: Publish Vercel production deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          SANITIZED_VERCEL_TOKEN="$(printf '%s' "${VERCEL_TOKEN}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${SANITIZED_VERCEL_TOKEN}" ]; then
            echo "GitHub secret VERCEL_TOKEN is empty after trimming whitespace." >&2
            exit 1
          fi
          echo "::add-mask::${SANITIZED_VERCEL_TOKEN}"
          for attempt in 1 2 3; do
            if DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --prod --token "${SANITIZED_VERCEL_TOKEN}" --yes 2>&1)"; then
              break
            fi
            printf '%s\n' "${DEPLOY_OUTPUT}" >&2
            if [ "${attempt}" -eq 3 ]; then
              echo "Vercel production deploy failed after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Retrying Vercel production deploy (attempt $((attempt + 1))/3) after upload failure..." >&2
            sleep "$((attempt * 15))"
          done
          DEPLOY_URL="$(printf '%s\n' "${DEPLOY_OUTPUT}" | grep -Eo 'https://[-A-Za-z0-9.]+\.vercel\.app' | head -n 1 | tr -d '\r')"
          if [ -z "${DEPLOY_URL}" ]; then
            echo "Vercel CLI did not return a production deployment URL." >&2
            printf '%s\n' "${DEPLOY_OUTPUT}" >&2
            exit 1
          fi
          INSPECT_TEXT="$(npx vercel inspect "${DEPLOY_URL}" --token "${SANITIZED_VERCEL_TOKEN}" || true)"
          SITE_URL="$(INSPECT_TEXT="${INSPECT_TEXT}" DEPLOY_URL="${DEPLOY_URL}" node <<'EOF'
          const inspectText = process.env.INSPECT_TEXT ?? '';
          const deployUrl = process.env.DEPLOY_URL ?? '';
          const urls = [...inspectText.matchAll(/https:\/\/\S+/g)].map((match) => match[0]);
          const aliasUrl = urls.find((url) => url !== deployUrl);
          process.stdout.write((aliasUrl || deployUrl).trim());
          EOF
          )"
          printf 'deploy_url=%s\n' "${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          printf 'site_url=%s\n' "${SITE_URL}" >> "$GITHUB_OUTPUT"

      - name: Add Vercel production deploy to job summary
        run: |
          {
            echo "### Vercel Production"
            echo
            echo "- Project: ${VERCEL_PROJECT_NAME}"
            echo "- Production URL: ${{ steps.deploy.outputs.site_url }}"
            echo "- Deploy URL: ${{ steps.deploy.outputs.deploy_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-aws-production:
    needs:
      - build-frontend
      - validate-aws-production-access
    if: inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: aws-frontend-production
      url: ${{ steps.publish.outputs.site_url }}
    outputs:
      site_url: ${{ steps.publish.outputs.site_url }}
      deployment_attempted: ${{ steps.mutation.outputs.attempted }}
      rollback_ref: ${{ steps.snapshot.outputs.rollback_ref }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate AWS frontend deployment configuration
        run: |
          set -euo pipefail
          test -n "${AWS_REGION}" || { echo "Missing AWS_REGION"; exit 1; }
          test -n "${AWS_FRONTEND_BUCKET}" || { echo "Missing AWS_FRONTEND_BUCKET"; exit 1; }
          test -n "${AWS_FRONTEND_DISTRIBUTION_ID}" || { echo "Missing AWS_FRONTEND_DISTRIBUTION_ID"; exit 1; }
          test -n "${AWS_FRONTEND_PUBLIC_URL}" || { echo "Missing AWS_FRONTEND_PUBLIC_URL"; exit 1; }
          test -n "${AWS_FRONTEND_DEPLOY_ROLE_ARN}" || { echo "Missing AWS_FRONTEND_DEPLOY_ROLE_ARN"; exit 1; }
          echo "Bucket: ${AWS_FRONTEND_BUCKET}"
          echo "Region: ${AWS_REGION}"
          echo "Distribution: ${AWS_FRONTEND_DISTRIBUTION_ID}"
          echo "Public URL: ${AWS_FRONTEND_PUBLIC_URL}"

      - name: Download shared frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: app/dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          role-session-name: aura-github-frontend-s3
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Snapshot current AWS frontend for rollback
        id: snapshot
        run: |
          set -euo pipefail
          BACKUP_PREFIX="_aura-rollback/${GITHUB_SHA}"

          cleanup_partial_snapshot() {
            local status="$?"
            trap - EXIT
            if [ "${status}" -ne 0 ]; then
              echo "AWS frontend rollback snapshot failed; removing the partial snapshot." >&2
              aws s3 rm "s3://${AWS_FRONTEND_BUCKET}/${BACKUP_PREFIX}" \
                --region "${AWS_REGION}" \
                --recursive >/dev/null || true
            fi
            exit "${status}"
          }
          trap cleanup_partial_snapshot EXIT

          aws s3 rm "s3://${AWS_FRONTEND_BUCKET}/${BACKUP_PREFIX}" \
            --region "${AWS_REGION}" \
            --recursive >/dev/null

          aws s3 sync "s3://${AWS_FRONTEND_BUCKET}" "s3://${AWS_FRONTEND_BUCKET}/${BACKUP_PREFIX}" \
            --region "${AWS_REGION}" \
            --exclude "_aura-rollback/*"

          cat > "${RUNNER_TEMP}/aura-rollback-manifest.json" <<EOF
          {
            "backupPrefix": "${BACKUP_PREFIX}",
            "createdFromSha": "${GITHUB_SHA}",
            "createdAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow": "${GITHUB_WORKFLOW}",
            "runId": "${GITHUB_RUN_ID}"
          }
          EOF

          aws s3 cp "${RUNNER_TEMP}/aura-rollback-manifest.json" "s3://${AWS_FRONTEND_BUCKET}/${BACKUP_PREFIX}/.aura-rollback-manifest.json" \
            --region "${AWS_REGION}" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "application/json"

          echo "rollback_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          trap - EXIT

      - name: Mark AWS production mutation attempt
        id: mutation
        run: echo "attempted=true" >> "$GITHUB_OUTPUT"

      - name: Publish shared frontend to S3 origin bucket
        id: publish
        run: |
          set -euo pipefail
          aws s3 sync app/dist "s3://${AWS_FRONTEND_BUCKET}" \
            --region "${AWS_REGION}" \
            --delete \
            --exclude "_aura-rollback/*" \
            --cache-control "public,max-age=300"

          if [ -d app/dist/assets ]; then
            aws s3 sync app/dist/assets "s3://${AWS_FRONTEND_BUCKET}/assets" \
              --region "${AWS_REGION}" \
              --delete \
              --cache-control "public,max-age=31536000,immutable"
          fi

          aws s3 cp app/dist/index.html "s3://${AWS_FRONTEND_BUCKET}/index.html" \
            --region "${AWS_REGION}" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

          INVALIDATION_ID="$(aws cloudfront create-invalidation \
            --distribution-id "${AWS_FRONTEND_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)"

          SITE_URL="${AWS_FRONTEND_PUBLIC_URL}"
          echo "site_url=${SITE_URL}" >> "$GITHUB_OUTPUT"
          echo "invalidation_id=${INVALIDATION_ID}" >> "$GITHUB_OUTPUT"

      - name: Verify CloudFront serves the app shell
        run: |
          set -euo pipefail
          if ! aws cloudfront wait invalidation-completed \
            --distribution-id "${AWS_FRONTEND_DISTRIBUTION_ID}" \
            --id "${{ steps.publish.outputs.invalidation_id }}"; then
            echo "CloudFront invalidation wait was unavailable; continuing with HTTP readiness polling." >&2
          fi

          READINESS_ATTEMPTS=30
          for attempt in $(seq 1 "${READINESS_ATTEMPTS}"); do
            if curl --fail --show-error --silent --location --max-time 10 "${{ steps.publish.outputs.site_url }}" > /dev/null; then
              exit 0
            fi
            echo "CloudFront app shell was not ready (attempt ${attempt}/${READINESS_ATTEMPTS})." >&2
            if [ "${attempt}" -lt "${READINESS_ATTEMPTS}" ]; then
              sleep 15
            fi
          done

          echo "CloudFront did not serve the app shell after invalidation and readiness polling." >&2
          exit 1

      - name: Add AWS production deploy to job summary
        run: |
          {
            echo "### AWS CloudFront Production"
            echo
            echo "- Bucket: ${AWS_FRONTEND_BUCKET}"
            echo "- Distribution: ${AWS_FRONTEND_DISTRIBUTION_ID}"
            echo "- Production URL: ${{ steps.publish.outputs.site_url }}"
            echo "- Backend origin: ${{ needs.build-frontend.outputs.backend_origin }}"
            echo "- Shared build time: ${{ needs.build-frontend.outputs.built_at }}"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-preview-coherence:
    needs:
      - build-frontend
      - deploy-preview
      - deploy-vercel-preview
    if: needs.build-frontend.outputs.backend_origin != '' && ((github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') || inputs.target == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch protected Vercel preview HTML
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_DEPLOY_URL: ${{ needs.deploy-vercel-preview.outputs.deploy_url }}
        run: |
          set -euo pipefail
          SANITIZED_VERCEL_TOKEN="$(printf '%s' "${VERCEL_TOKEN}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${SANITIZED_VERCEL_TOKEN}" ]; then
            echo "GitHub secret VERCEL_TOKEN is empty after trimming whitespace." >&2
            exit 1
          fi
          echo "::add-mask::${SANITIZED_VERCEL_TOKEN}"
          mkdir -p "${RUNNER_TEMP}/aura-release"
          VERCEL_TOKEN="${SANITIZED_VERCEL_TOKEN}" npx vercel curl / \
            --deployment "${VERCEL_DEPLOY_URL}" \
            -- --fail --silent --show-error --location \
            > "${RUNNER_TEMP}/aura-release/vercel-preview.html"

      - name: Verify Netlify and Vercel preview release coherence
        env:
          AURA_EXPECTED_RELEASE_ID: ${{ github.sha }}
          AURA_EXPECTED_COMMIT: ${{ github.sha }}
          AURA_EXPECTED_TARGET: multi-host
          AURA_RELEASE_URLS: >-
            [
              {"name":"netlify-preview","url":"${{ needs.deploy-preview.outputs.deploy_url }}"},
              {"name":"vercel-preview","url":"${{ needs.deploy-vercel-preview.outputs.deploy_url }}","htmlPath":"${{ runner.temp }}/aura-release/vercel-preview.html"}
            ]
        run: node app/scripts/verify_deployed_release_coherence.mjs

  verify-production-coherence:
    needs:
      - build-frontend
      - deploy-production
      - deploy-vercel-production
      - deploy-aws-production
    if: inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch protected Vercel production HTML
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_DEPLOY_URL: ${{ needs.deploy-vercel-production.outputs.deploy_url }}
        run: |
          set -euo pipefail
          SANITIZED_VERCEL_TOKEN="$(printf '%s' "${VERCEL_TOKEN}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${SANITIZED_VERCEL_TOKEN}" ]; then
            echo "GitHub secret VERCEL_TOKEN is empty after trimming whitespace." >&2
            exit 1
          fi
          echo "::add-mask::${SANITIZED_VERCEL_TOKEN}"
          mkdir -p "${RUNNER_TEMP}/aura-release"
          VERCEL_TOKEN="${SANITIZED_VERCEL_TOKEN}" npx vercel curl / \
            --deployment "${VERCEL_DEPLOY_URL}" \
            -- --fail --silent --show-error --location \
            > "${RUNNER_TEMP}/aura-release/vercel-production.html"

      - name: Verify Netlify, Vercel, and AWS production release coherence
        env:
          AURA_EXPECTED_RELEASE_ID: ${{ github.sha }}
          AURA_EXPECTED_COMMIT: ${{ github.sha }}
          AURA_EXPECTED_TARGET: multi-host
          AURA_RELEASE_URLS: >-
            [
              {"name":"netlify-production","url":"${{ needs.deploy-production.outputs.site_url }}"},
              {"name":"vercel-production","url":"${{ needs.deploy-vercel-production.outputs.site_url }}","htmlPath":"${{ runner.temp }}/aura-release/vercel-production.html"},
              {"name":"aws-cloudfront-production","url":"${{ needs.deploy-aws-production.outputs.site_url }}"}
            ]
        run: node app/scripts/verify_deployed_release_coherence.mjs

  rollback-netlify-on-production-failure:
    needs:
      - build-frontend
      - deploy-production
      - deploy-vercel-production
      - deploy-aws-production
      - verify-production-coherence
    if: >-
      always() &&
      inputs.target == 'production' &&
      inputs.auto_rollback_on_failure == true &&
      needs.deploy-production.outputs.deployment_attempted == 'true' &&
      needs.verify-production-coherence.result != 'success'
    uses: ./.github/workflows/rollback-netlify.yml
    permissions:
      contents: read
    with:
      rollback_ref: ${{ needs.build-frontend.outputs.netlify_rollback_ref }}
      parent_holds_production_lock: true
    secrets:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  rollback-vercel-storefront-on-production-failure:
    needs:
      - build-frontend
      - deploy-production
      - deploy-vercel-production
      - deploy-aws-production
      - verify-production-coherence
    if: >-
      always() &&
      inputs.target == 'production' &&
      inputs.auto_rollback_on_failure == true &&
      needs.deploy-vercel-production.outputs.deployment_attempted == 'true' &&
      needs.verify-production-coherence.result != 'success'
    uses: ./.github/workflows/rollback-storefront-vercel.yml
    permissions:
      contents: read
    with:
      rollback_ref: ${{ needs.build-frontend.outputs.vercel_storefront_rollback_ref }}
      parent_holds_production_lock: true
    secrets:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  rollback-aws-storefront-on-production-failure:
    needs:
      - build-frontend
      - deploy-production
      - deploy-vercel-production
      - deploy-aws-production
      - verify-production-coherence
    if: >-
      always() &&
      inputs.target == 'production' &&
      inputs.auto_rollback_on_failure == true &&
      needs.deploy-aws-production.outputs.deployment_attempted == 'true' &&
      needs.verify-production-coherence.result != 'success'
    uses: ./.github/workflows/rollback-frontend-aws.yml
    permissions:
      contents: read
      id-token: write
    with:
      rollback_ref: ${{ needs.deploy-aws-production.outputs.rollback_ref }}
      execute_rollback: true
      parent_holds_production_lock: true
    secrets:
      AWS_FRONTEND_DEPLOY_ROLE_ARN: ${{ secrets.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
