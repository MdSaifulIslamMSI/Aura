name: Performance Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  performance-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
            server/package-lock.json

      - name: Install
        run: npm ci

      - name: Install app dependencies
        run: npm --prefix app ci

      - name: Install server dependencies
        run: npm --prefix server install

      - name: Performance audit
        run: npm run perf:audit

      - name: Local performance services check
        run: npm run perf:local

      - name: Lint if present
        run: npm run lint --if-present

      - name: Typecheck if present
        run: npm run typecheck --if-present

      - name: Cache safety tests
        run: npm --prefix server test -- --runTestsByPath tests/performanceCache.test.js --forceExit

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build local frontend performance target
        if: ${{ (vars.PERF_BASE_URL || '') == '' || (vars.PERF_API_BASE_URL || '') == '' }}
        run: npm --prefix app run build

      - name: Start local performance targets
        if: ${{ (vars.PERF_BASE_URL || '') == '' || (vars.PERF_API_BASE_URL || '') == '' }}
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d --build mongo redis aura-api
          npm --prefix app run preview -- --host 0.0.0.0 --port 3000 > "${RUNNER_TEMP}/aura-vite-preview.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/aura-vite-preview.pid"

          for attempt in $(seq 1 45); do
            if curl --fail --silent --max-time 5 http://127.0.0.1:5000/health >/dev/null 2>&1 &&
               curl --fail --silent --max-time 5 http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "Local performance targets are ready."
              exit 0
            fi
            sleep 4
          done

          echo "Local performance targets did not become reachable." >&2
          docker compose ps >&2 || true
          docker compose logs --no-color aura-api >&2 || true
          cat "${RUNNER_TEMP}/aura-vite-preview.log" >&2 || true
          exit 1

      - name: Performance smoke
        run: npm run perf:smoke
        env:
          PERF_BASE_URL: ${{ vars.PERF_BASE_URL || 'http://127.0.0.1:3000' }}
          PERF_API_BASE_URL: ${{ vars.PERF_API_BASE_URL || 'http://127.0.0.1:5000' }}

      - name: k6 load
        run: npm run perf:load
        env:
          PERF_BASE_URL: ${{ vars.PERF_BASE_URL || 'http://127.0.0.1:3000' }}
          PERF_API_BASE_URL: ${{ vars.PERF_API_BASE_URL || 'http://127.0.0.1:5000' }}
          PERF_P95_MS: ${{ vars.PERF_P95_MS || '500' }}
          PERF_ERROR_RATE: ${{ vars.PERF_ERROR_RATE || '0.01' }}

      - name: Lighthouse if configured URL available
        if: ${{ (vars.PERF_BASE_URL || '') != '' }}
        run: npm run perf:lighthouse
        env:
          PERF_BASE_URL: ${{ vars.PERF_BASE_URL || 'http://127.0.0.1:3000' }}
          LIGHTHOUSE_MIN_PERFORMANCE: ${{ vars.LIGHTHOUSE_MIN_PERFORMANCE || '0.85' }}

      - name: Performance budget
        run: npm run perf:budget
        env:
          PERF_P95_MS: ${{ vars.PERF_P95_MS || '500' }}
          PERF_ERROR_RATE: ${{ vars.PERF_ERROR_RATE || '0.01' }}
          LIGHTHOUSE_MIN_PERFORMANCE: ${{ vars.LIGHTHOUSE_MIN_PERFORMANCE || '0.85' }}

      - name: Stop local performance targets
        if: always()
        shell: bash
        run: |
          if [ -f "${RUNNER_TEMP}/aura-vite-preview.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/aura-vite-preview.pid")" 2>/dev/null || true
          fi
          docker compose down -v --remove-orphans || true

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-artifacts
          path: |
            .run-logs/k6-*.json
            .run-logs/lighthouse
            summary.json
          if-no-files-found: ignore

      - name: Comment PR summary
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Performance Smoke completed with status: ${status}.\n\nChecks: perf:audit, lint/typecheck if present, cache safety tests, perf:smoke, perf:load, perf:lighthouse when reachable, perf:budget.`
            });
