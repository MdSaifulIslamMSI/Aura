name: staging-aws-deploy

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy to isolated AWS staging
        required: false
        default: main
      deploy_enabled:
        description: Type true to allow staging deployment
        required: true
        default: "false"

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'aura' }}
      STAGING_NAME: ${{ vars.STAGING_NAME || 'staging' }}
      STAGING_SSM_PREFIX: ${{ vars.STAGING_SSM_PREFIX }}
      STAGING_BUCKET_NAME: ${{ vars.STAGING_BUCKET_NAME }}
      STAGING_KEY_NAME: ${{ vars.STAGING_KEY_NAME }}
      STAGING_INSTANCE_TYPE: ${{ vars.STAGING_INSTANCE_TYPE || 't3.micro' }}
      STAGING_ROOT_VOLUME_GB: ${{ vars.STAGING_ROOT_VOLUME_GB || '20' }}
      STAGING_BUDGET_EMAIL: ${{ vars.STAGING_BUDGET_EMAIL }}
      STAGING_MONTHLY_BUDGET_USD: ${{ vars.STAGING_MONTHLY_BUDGET_USD || '30' }}
      STAGING_BACKEND_PORT: ${{ vars.STAGING_BACKEND_PORT || '3000' }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL || vars.STAGING_BASE_URL }}
      STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
      STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
      STAGING_DEPLOY_ENABLED: ${{ vars.STAGING_DEPLOY_ENABLED || 'false' }}
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN }}
      PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
      PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
      PROD_SSM_PREFIX: ${{ vars.PROD_SSM_PREFIX }}
      GH_REPO: ${{ github.repository }}
      VERCEL_PROJECT_DIR: .
      ENABLE_EIP: "false"
      ENABLE_ROUTE53: "false"
      ENABLE_STAGING_HTTPS: "false"
      SMOKE_TARGET_ENV: staging
      SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      SMOKE_REQUIRE_BACKEND_STAGING: "true"
      SMOKE_FORBID_PRODUCTION_ORIGINS: "true"
      SMOKE_REQUIRE_SCANNER_READY: ${{ vars.SMOKE_REQUIRE_SCANNER_READY || 'false' }}
      STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix app ci

      - name: Fail closed unless staging deploy is explicitly enabled
        env:
          DEPLOY_ENABLED_INPUT: ${{ inputs.deploy_enabled }}
        run: |
          set -euo pipefail
          test "${DEPLOY_ENABLED_INPUT}" = "true" || { echo "deploy_enabled input must be true."; exit 1; }
          test "${STAGING_DEPLOY_ENABLED}" = "true" || { echo "Set staging environment variable STAGING_DEPLOY_ENABLED=true to deploy."; exit 1; }
          test "${STAGING_SSM_PREFIX}" = "/aura/staging" || { echo "STAGING_SSM_PREFIX must be /aura/staging."; exit 1; }
          test "${PROD_SSM_PREFIX}" = "/aura/prod" || { echo "PROD_SSM_PREFIX must be /aura/prod."; exit 1; }
          test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
          test -n "${STAGING_SSH_PRIVATE_KEY}" || { echo "Missing STAGING_SSH_PRIVATE_KEY."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-staging-github-deploy
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Resolve isolated staging EC2
        run: |
          set -euo pipefail
          mkdir -p .staging
          INSTANCE_JSON="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --filters \
              "Name=tag:Project,Values=${PROJECT_NAME}" \
              "Name=tag:Environment,Values=staging" \
              "Name=tag:ManagedBy,Values=codex-staging-bootstrap" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[0] | [0]' \
            --output json)"
          test "${INSTANCE_JSON}" != "null" || { echo "No running staging EC2 instance found."; exit 1; }
          export INSTANCE_JSON
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const instance = JSON.parse(process.env.INSTANCE_JSON);
          const state = {
            instance_id: instance.InstanceId,
            public_dns: instance.PublicDnsName,
            public_ip: instance.PublicIpAddress,
            staging_base_url: process.env.STAGING_BASE_URL,
            staging_frontend_url: process.env.STAGING_FRONTEND_URL || process.env.STAGING_BASE_URL,
            staging_api_base_url: process.env.STAGING_API_BASE_URL,
            staging_health_url: process.env.STAGING_HEALTH_URL,
            bucket: process.env.STAGING_BUCKET_NAME
          };
          fs.writeFileSync('.staging/state.json', `${JSON.stringify(state, null, 2)}\n`);
          NODE

      - name: Lease runner SSH access
        id: lease-runner-ssh
        run: |
          set -euo pipefail
          INSTANCE_ID="$(node --input-type=module -e "import fs from 'node:fs'; const state = JSON.parse(fs.readFileSync('.staging/state.json', 'utf8')); process.stdout.write(String(state.instance_id || '')); ")"
          test -n "${INSTANCE_ID}" || { echo "Staging instance ID is missing."; exit 1; }

          SECURITY_GROUP_ID="$(aws ec2 describe-instances \
            --region "${AWS_REGION}" \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)"
          test -n "${SECURITY_GROUP_ID}" && test "${SECURITY_GROUP_ID}" != "None" || {
            echo "Staging security group could not be resolved."
            exit 1
          }

          SG_ENVIRONMENT="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --group-ids "${SECURITY_GROUP_ID}" \
            --query 'SecurityGroups[0].Tags[?Key==`Environment`].Value | [0]' \
            --output text)"
          SG_PROJECT="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --group-ids "${SECURITY_GROUP_ID}" \
            --query 'SecurityGroups[0].Tags[?Key==`Project`].Value | [0]' \
            --output text)"
          SG_MANAGED_BY="$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --group-ids "${SECURITY_GROUP_ID}" \
            --query 'SecurityGroups[0].Tags[?Key==`ManagedBy`].Value | [0]' \
            --output text)"
          test "${SG_ENVIRONMENT}" = "staging" || { echo "Refusing SSH access outside the staging security group."; exit 1; }
          test "${SG_PROJECT}" = "${PROJECT_NAME}" || { echo "Staging security group project tag mismatch."; exit 1; }
          test "${SG_MANAGED_BY}" = "codex-staging-bootstrap" || { echo "Staging security group ownership tag mismatch."; exit 1; }

          RUNNER_IP="$(curl --fail --silent --show-error --max-time 10 https://checkip.amazonaws.com | tr -d '[:space:]')"
          RUNNER_IP="${RUNNER_IP}" node --input-type=module <<'NODE'
          import net from 'node:net';
          if (!net.isIPv4(process.env.RUNNER_IP || '')) {
            throw new Error('GitHub runner did not resolve to one IPv4 address.');
          }
          NODE
          RUNNER_CIDR="${RUNNER_IP}/32"

          SECURITY_GROUP_RULE_ID="$(aws ec2 authorize-security-group-ingress \
            --region "${AWS_REGION}" \
            --group-id "${SECURITY_GROUP_ID}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_CIDR}" \
            --query 'SecurityGroupRules[0].SecurityGroupRuleId' \
            --output text)"
          if [ -z "${SECURITY_GROUP_RULE_ID}" ] || [ "${SECURITY_GROUP_RULE_ID}" = "None" ]; then
            aws ec2 revoke-security-group-ingress \
              --region "${AWS_REGION}" \
              --group-id "${SECURITY_GROUP_ID}" \
              --protocol tcp \
              --port 22 \
              --cidr "${RUNNER_CIDR}" >/dev/null || true
            echo "Temporary SSH rule was created without a rule ID and was revoked."
            exit 1
          fi

          {
            echo "security_group_id=${SECURITY_GROUP_ID}"
            echo "security_group_rule_id=${SECURITY_GROUP_RULE_ID}"
          } >> "${GITHUB_OUTPUT}"
          echo "Leased temporary /32 SSH access for this workflow run."

      - name: Render SSH config
        run: |
          set -euo pipefail
          printf '%s\n' "${STAGING_SSH_PRIVATE_KEY}" > .staging/staging-key.pem
          chmod 600 .staging/staging-key.pem
          node scripts/smoke/assert-staging-contract.mjs
          STAGING_KEY_PATH="$PWD/.staging/staging-key.pem" node scripts/run-bash.mjs scripts/staging/06-render-ssh-config.sh

      - name: Deploy and verify isolated staging
        run: STAGING_KEY_PATH="$PWD/.staging/staging-key.pem" npm run staging:deploy

      - name: Revoke runner SSH access
        if: ${{ always() && steps.lease-runner-ssh.outputs.security_group_rule_id != '' }}
        env:
          LEASED_SECURITY_GROUP_ID: ${{ steps.lease-runner-ssh.outputs.security_group_id }}
          LEASED_SECURITY_GROUP_RULE_ID: ${{ steps.lease-runner-ssh.outputs.security_group_rule_id }}
        run: |
          set -euo pipefail
          test -n "${LEASED_SECURITY_GROUP_ID}"
          test -n "${LEASED_SECURITY_GROUP_RULE_ID}"
          aws ec2 revoke-security-group-ingress \
            --region "${AWS_REGION}" \
            --group-id "${LEASED_SECURITY_GROUP_ID}" \
            --security-group-rule-ids "${LEASED_SECURITY_GROUP_RULE_ID}" >/dev/null
          echo "Revoked temporary runner SSH access."
