name: Status Watch

on:
  workflow_run:
    workflows:
      - Automatic Production Release On Main Push
      - CI
      - Quality Foundation
      - Security Gate
      - Security Gates
      - CodeQL
      - Payment Architecture
      - Docker
      - staging-frontend-smoke
      - Deploy Backend To AWS
      - Deploy Frontend To Netlify, Vercel, And AWS
      - Deploy Gateway To Vercel
      - Desktop Release
      - Mobile Release
    types:
      - completed

permissions: {}

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Aura status system
        run: |
          if [ -z "$STATUS_WEBHOOK_URL" ] || [ -z "$STATUS_WEBHOOK_TOKEN" ]; then
            echo "Status webhook secrets are not configured; skipping status notification."
            exit 0
          fi

          curl -X POST "$STATUS_WEBHOOK_URL" \
            -H "Authorization: Bearer $STATUS_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "source": "github_actions",
              "workflow": "${{ github.event.workflow_run.name }}",
              "conclusion": "${{ github.event.workflow_run.conclusion }}",
              "sha": "${{ github.event.workflow_run.head_sha }}",
              "url": "${{ github.event.workflow_run.html_url }}"
            }'
        env:
          STATUS_WEBHOOK_URL: ${{ secrets.STATUS_WEBHOOK_URL }}
          STATUS_WEBHOOK_TOKEN: ${{ secrets.STATUS_WEBHOOK_TOKEN }}
