name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional mobile version, for example 1.0.42
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: Optional mobile version, for example 1.0.42
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.x

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Resolve mobile version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${VERSION_INPUT}" ]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION="1.0.${GITHUB_RUN_NUMBER}"
          fi

          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Invalid mobile version: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=mobile-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  preflight:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      can_build_android: ${{ steps.flags.outputs.can_build_android }}
      can_sign_android: ${{ steps.flags.outputs.can_sign_android }}
      can_build_ios: ${{ steps.flags.outputs.can_build_ios }}
      can_sign_ios: ${{ steps.flags.outputs.can_sign_ios }}

    steps:
      - name: Evaluate mobile signing and Firebase config
        id: flags
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          IOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail

          has_android_config=false
          has_ios_config=false
          can_sign_android=false
          can_sign_ios=false

          if [ -n "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" ]; then
            has_android_config=true
          else
            echo "::warning::FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 is missing, so Android release artifacts will be skipped."
          fi

          if [ -n "${ANDROID_RELEASE_KEYSTORE_BASE64}" ] \
            && [ -n "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" ] \
            && [ -n "${ANDROID_RELEASE_KEY_ALIAS}" ] \
            && [ -n "${ANDROID_RELEASE_KEY_PASSWORD}" ]; then
            can_sign_android=true
          else
            echo "::warning::Android signing secrets are incomplete. Android release builds will fall back to the debug keystore."
          fi

          if [ -n "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" ]; then
            has_ios_config=true
          else
            echo "::warning::FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 is missing, so iOS builds will be skipped."
          fi

          if [ -n "${IOS_SIGNING_CERTIFICATE_P12_BASE64}" ] \
            && [ -n "${IOS_SIGNING_CERTIFICATE_PASSWORD}" ] \
            && [ -n "${IOS_PROVISIONING_PROFILE_BASE64}" ] \
            && [ -n "${IOS_TEAM_ID}" ] \
            && [ -n "${IOS_PROVISIONING_PROFILE_SPECIFIER}" ]; then
            can_sign_ios=true
          else
            echo "::warning::iOS signing secrets are incomplete. CI will validate the iOS simulator build only."
          fi

          echo "can_build_android=${has_android_config}" >> "$GITHUB_OUTPUT"
          echo "can_sign_android=${can_sign_android}" >> "$GITHUB_OUTPUT"
          echo "can_build_ios=${has_ios_config}" >> "$GITHUB_OUTPUT"
          echo "can_sign_ios=${can_sign_ios}" >> "$GITHUB_OUTPUT"

  build-android:
    needs:
      - prepare
      - preflight
    if: needs.preflight.outputs.can_build_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Use Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install frontend and mobile dependencies
        run: npm --prefix app ci

      - name: Materialize Android Firebase config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" | base64 --decode > app/android/app/google-services.json

      - name: Materialize Android signing keystore
        if: needs.preflight.outputs.can_sign_android == 'true'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/aura-android-release.keystore"

      - name: Sync Capacitor Android shell
        run: npm --prefix app run mobile:sync:android

      - name: Build Android release artifacts
        working-directory: app/android
        env:
          AURA_ANDROID_VERSION_CODE: ${{ needs.prepare.outputs.build_number }}
          AURA_ANDROID_VERSION_NAME: ${{ needs.prepare.outputs.version }}
          AURA_ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/aura-android-release.keystore
          AURA_ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          AURA_ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          AURA_ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Stage Android artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/android
          cp app/android/app/build/outputs/apk/release/app-release.apk "release-artifacts/android/Aura-Marketplace-Android-${VERSION}.apk"
          cp app/android/app/build/outputs/bundle/release/app-release.aab "release-artifacts/android/Aura-Marketplace-Android-${VERSION}.aab"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: release-artifacts/android/*
          if-no-files-found: error
          retention-days: 14

  build-ios:
    needs:
      - prepare
      - preflight
    if: needs.preflight.outputs.can_build_ios == 'true'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend and mobile dependencies
        run: npm --prefix app ci

      - name: Materialize iOS Firebase config
        env:
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" | base64 --decode > app/ios/App/App/GoogleService-Info.plist

      - name: Configure iOS URL schemes from Firebase
        run: |
          set -euo pipefail
          GOOGLE_PLIST="app/ios/App/App/GoogleService-Info.plist"
          IOS_INFO_PLIST="app/ios/App/App/Info.plist"
          REVERSED_CLIENT_ID="$(/usr/libexec/PlistBuddy -c 'Print :REVERSED_CLIENT_ID' "${GOOGLE_PLIST}")"

          /usr/libexec/PlistBuddy -c 'Delete :CFBundleURLTypes' "${IOS_INFO_PLIST}" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes array' "${IOS_INFO_PLIST}"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0 dict' "${IOS_INFO_PLIST}"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0:CFBundleURLSchemes array' "${IOS_INFO_PLIST}"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string ${REVERSED_CLIENT_ID}" "${IOS_INFO_PLIST}"

      - name: Sync Capacitor iOS shell
        run: npm --prefix app run mobile:sync:ios

      - name: Build iOS simulator app
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project app/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${RUNNER_TEMP}/ios-simulator" \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            build

          mkdir -p release-artifacts/ios
          ditto -c -k --sequesterRsrc --keepParent \
            "${RUNNER_TEMP}/ios-simulator/Build/Products/Debug-iphonesimulator/App.app" \
            "release-artifacts/ios/Aura-Marketplace-iOS-Simulator-${VERSION}.zip"

      - name: Import iOS signing assets
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          IOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          CERT_PATH="${RUNNER_TEMP}/ios-signing-cert.p12"
          PROFILE_PATH="${HOME}/Library/MobileDevice/Provisioning Profiles/aura-mobile-release.mobileprovision"
          mkdir -p "$(dirname "${PROFILE_PATH}")"
          printf '%s' "${IOS_SIGNING_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERT_PATH}"
          printf '%s' "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${PROFILE_PATH}"

          security create-keychain -p '' build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p '' build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "${CERT_PATH}" -k build.keychain -P "${IOS_SIGNING_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k '' build.keychain

      - name: Archive signed iOS app
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project app/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/AuraMarketplace.xcarchive" \
            DEVELOPMENT_TEAM="${IOS_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="com.aura.marketplace.mobile" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROVISIONING_PROFILE_SPECIFIER}" \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            archive

      - name: Export signed iOS IPA
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aura.marketplace.mobile</key>
              <string>${IOS_PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "${RUNNER_TEMP}/AuraMarketplace.xcarchive" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath release-artifacts/ios

      - name: Rename signed iOS IPA
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mv release-artifacts/ios/App.ipa "release-artifacts/ios/Aura-Marketplace-iOS-${VERSION}.ipa"

      - name: Upload iOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: release-artifacts/ios/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs:
      - prepare
      - preflight
      - build-android
      - build-ios
    if: |
      always() &&
      (needs.build-android.result == 'success' || needs.build-ios.result == 'success') &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mobile release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mobile-*
          path: release-artifacts
          merge-multiple: true

      - name: Build release context
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_SHA: ${{ github.sha }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CAN_SIGN_ANDROID: ${{ needs.preflight.outputs.can_sign_android }}
          CAN_SIGN_IOS: ${{ needs.preflight.outputs.can_sign_ios }}
          IOS_BUILD_RESULT: ${{ needs.build-ios.result }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git tag --list 'mobile-v*' --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            COMMIT_RANGE="${PREVIOUS_TAG}..${RELEASE_SHA}"
            RANGE_LABEL="Changes since ${PREVIOUS_TAG}"
          else
            COMMIT_RANGE="${RELEASE_SHA}"
            RANGE_LABEL="Recent release context"
          fi

          {
            echo "## What shipped"
            echo
            echo "Aura Marketplace Mobile ${VERSION} was generated from commit \`${RELEASE_SHA}\` after the production CI/CD gates cleared."
            echo
            echo "This release packages the Android shell, the iOS shell validation artifacts, and the native auth/runtime bridge that lets installed apps load the hosted Aura storefront with native Firebase sign-in support."
            echo
            echo "## Why this release exists"
            echo
            echo "- Make Aura installable on Android and iPhone without forking the product into a separate mobile frontend."
            echo "- Keep mobile runtime, trusted-device flows, and social login aligned with the production Aura web deployment."
            echo "- Publish only after the main production pipeline succeeds, so mobile versions do not move forward when the core release is red."
            echo
            echo "## How mobile updates work"
            echo
            echo "- The mobile shells load the hosted Aura storefront at \`https://aurapilot.vercel.app\`, so normal frontend deployments reach installed mobile apps without rebuilding the native binaries."
            echo "- New APK, AAB, or IPA releases are only needed when the native shell, mobile auth bridge, or mobile delivery pipeline changes."
            echo "- This keeps the production pipeline faster than rebuilding mobile binaries for every single web-only change."
            echo
            echo "## Release details"
            echo
            if [ "${CAN_SIGN_ANDROID}" = "true" ]; then
              echo "- Android artifacts were built with the configured release keystore."
            else
              echo "- Android artifacts were built without the production keystore, so they are signed with the debug keystore for internal distribution only."
            fi

            if [ "${IOS_BUILD_RESULT}" = "success" ] && [ "${CAN_SIGN_IOS}" = "true" ]; then
              echo "- A signed iOS IPA is included when Apple signing assets are configured."
            elif [ "${IOS_BUILD_RESULT}" = "success" ]; then
              echo "- The iOS simulator build is included. A real-device IPA requires Apple signing assets and provisioning."
            else
              echo "- iOS artifacts were skipped because the Firebase iOS configuration secret was not available."
            fi

            echo
            echo "## Build context"
            echo
            echo "- Workflow run: ${WORKFLOW_URL}"
            echo "- Source commit: \`${RELEASE_SHA}\`"
            echo "- ${RANGE_LABEL}:"
            git log --no-merges --pretty='  - `%h` %s' -n 18 "${COMMIT_RANGE}" || true
          } > release-notes.md

      - name: Publish GitHub mobile release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Aura Marketplace Mobile ${{ needs.prepare.outputs.version }}
          make_latest: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body_path: release-notes.md
          files: release-artifacts/*
