name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional mobile version, for example 1.0.42
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: Optional mobile version, for example 1.0.42
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.x

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Resolve mobile version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${VERSION_INPUT}" ]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION="1.0.${GITHUB_RUN_NUMBER}"
          fi

          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Invalid mobile version: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=mobile-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

  preflight:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      can_build_android: ${{ steps.flags.outputs.can_build_android }}
      can_sign_android: ${{ steps.flags.outputs.can_sign_android }}
      can_build_ios: ${{ steps.flags.outputs.can_build_ios }}
      can_sign_ios: ${{ steps.flags.outputs.can_sign_ios }}
      can_publish_android_play: ${{ steps.flags.outputs.can_publish_android_play }}
      can_publish_ios_testflight: ${{ steps.flags.outputs.can_publish_ios_testflight }}

    steps:
      - name: Evaluate mobile signing and Firebase config
        id: flags
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          IOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          has_android_config=false
          has_ios_config=false
          can_sign_android=false
          can_sign_ios=false
          can_publish_android_play=false
          can_publish_ios_testflight=false

          if [ -n "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" ]; then
            has_android_config=true
          else
            echo "::warning::FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 is missing. Android artifacts will still build, but native Firebase social sign-in may be limited until this secret is configured."
          fi

          if [ -n "${ANDROID_RELEASE_KEYSTORE_BASE64}" ] \
            && [ -n "${ANDROID_RELEASE_KEYSTORE_PASSWORD}" ] \
            && [ -n "${ANDROID_RELEASE_KEY_ALIAS}" ] \
            && [ -n "${ANDROID_RELEASE_KEY_PASSWORD}" ]; then
            can_sign_android=true
          else
            echo "::warning::Android signing secrets are incomplete. Android release builds will fall back to the debug keystore."
          fi

          if [ -n "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" ]; then
            has_ios_config=true
          else
            echo "::warning::FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 is missing. iOS simulator validation will still run, but native Firebase social sign-in may be limited until this secret is configured."
          fi

          if [ -n "${IOS_SIGNING_CERTIFICATE_P12_BASE64}" ] \
            && [ -n "${IOS_SIGNING_CERTIFICATE_PASSWORD}" ] \
            && [ -n "${IOS_PROVISIONING_PROFILE_BASE64}" ] \
            && [ -n "${IOS_TEAM_ID}" ] \
            && [ -n "${IOS_PROVISIONING_PROFILE_SPECIFIER}" ] \
            && [ "${has_ios_config}" = "true" ]; then
            can_sign_ios=true
          else
            echo "::warning::iOS signing secrets are incomplete. CI will validate the iOS simulator build only."
          fi

          if [ "${can_sign_android}" = "true" ] && [ -n "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" ]; then
            can_publish_android_play=true
          else
            echo "::notice::Google Play publication is skipped until GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 and Android signing secrets are configured."
          fi

          if [ "${can_sign_ios}" = "true" ] \
            && [ -n "${APP_STORE_CONNECT_KEY_ID}" ] \
            && [ -n "${APP_STORE_CONNECT_ISSUER_ID}" ] \
            && [ -n "${APP_STORE_CONNECT_API_KEY_P8_BASE64}" ]; then
            can_publish_ios_testflight=true
          else
            echo "::notice::TestFlight publication is skipped until App Store Connect API key and iOS signing secrets are configured."
          fi

          echo "can_build_android=true" >> "$GITHUB_OUTPUT"
          echo "can_sign_android=${can_sign_android}" >> "$GITHUB_OUTPUT"
          echo "can_build_ios=true" >> "$GITHUB_OUTPUT"
          echo "can_sign_ios=${can_sign_ios}" >> "$GITHUB_OUTPUT"
          echo "can_publish_android_play=${can_publish_android_play}" >> "$GITHUB_OUTPUT"
          echo "can_publish_ios_testflight=${can_publish_ios_testflight}" >> "$GITHUB_OUTPUT"

  build-android:
    needs:
      - prepare
      - preflight
    if: needs.preflight.outputs.can_build_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Use Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Use Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install frontend and mobile dependencies
        run: npm --prefix app ci

      - name: Materialize Android Firebase config
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" ]; then
            printf '%s' "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64}" | base64 --decode > app/android/app/google-services.json
          else
            echo "::warning::Building Android without google-services.json. Configure FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_BASE64 before public store distribution."
          fi

      - name: Materialize Android signing keystore
        if: needs.preflight.outputs.can_sign_android == 'true'
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/aura-android-release.keystore"

      - name: Sync Capacitor Android shell
        run: npm --prefix app run mobile:sync:android

      - name: Build Android release artifacts
        working-directory: app/android
        env:
          AURA_ANDROID_VERSION_CODE: ${{ needs.prepare.outputs.build_number }}
          AURA_ANDROID_VERSION_NAME: ${{ needs.prepare.outputs.version }}
          AURA_ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/aura-android-release.keystore
          AURA_ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          AURA_ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          AURA_ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Stage Android artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/android
          cp app/android/app/build/outputs/apk/release/app-release.apk "release-artifacts/android/Aura-Marketplace-Android-${VERSION}.apk"
          cp app/android/app/build/outputs/bundle/release/app-release.aab "release-artifacts/android/Aura-Marketplace-Android-${VERSION}.aab"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          path: release-artifacts/android/*
          if-no-files-found: error
          retention-days: 14

  build-ios:
    needs:
      - prepare
      - preflight
    if: needs.preflight.outputs.can_build_ios == 'true'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend and mobile dependencies
        run: npm --prefix app ci

      - name: Materialize iOS Firebase config
        env:
          FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" ]; then
            printf '%s' "${FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64}" | base64 --decode > app/ios/App/App/GoogleService-Info.plist
          else
            echo "::warning::Building iOS simulator validation without GoogleService-Info.plist. Configure FIREBASE_IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 before public store distribution."
          fi

      - name: Configure iOS URL schemes from Firebase
        run: |
          set -euo pipefail
          GOOGLE_PLIST="app/ios/App/App/GoogleService-Info.plist"
          IOS_INFO_PLIST="app/ios/App/App/Info.plist"
          if [ ! -s "${GOOGLE_PLIST}" ]; then
            echo "::warning::Skipping iOS Firebase URL scheme injection because GoogleService-Info.plist is unavailable."
            exit 0
          fi

          REVERSED_CLIENT_ID="$(/usr/libexec/PlistBuddy -c 'Print :REVERSED_CLIENT_ID' "${GOOGLE_PLIST}")"

          /usr/libexec/PlistBuddy -c 'Delete :CFBundleURLTypes' "${IOS_INFO_PLIST}" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes array' "${IOS_INFO_PLIST}"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0 dict' "${IOS_INFO_PLIST}"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0:CFBundleURLSchemes array' "${IOS_INFO_PLIST}"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string ${REVERSED_CLIENT_ID}" "${IOS_INFO_PLIST}"

      - name: Sync Capacitor iOS shell
        run: npm --prefix app run mobile:sync:ios

      - name: Build iOS simulator app
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project app/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${RUNNER_TEMP}/ios-simulator" \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            build

          mkdir -p release-artifacts/ios
          ditto -c -k --sequesterRsrc --keepParent \
            "${RUNNER_TEMP}/ios-simulator/Build/Products/Debug-iphonesimulator/App.app" \
            "release-artifacts/ios/Aura-Marketplace-iOS-Simulator-${VERSION}.zip"

      - name: Import iOS signing assets
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          IOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          CERT_PATH="${RUNNER_TEMP}/ios-signing-cert.p12"
          PROFILE_PATH="${HOME}/Library/MobileDevice/Provisioning Profiles/aura-mobile-release.mobileprovision"
          mkdir -p "$(dirname "${PROFILE_PATH}")"
          printf '%s' "${IOS_SIGNING_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERT_PATH}"
          printf '%s' "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${PROFILE_PATH}"

          security create-keychain -p '' build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p '' build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "${CERT_PATH}" -k build.keychain -P "${IOS_SIGNING_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k '' build.keychain

      - name: Archive signed iOS app
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project app/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath "${RUNNER_TEMP}/AuraMarketplace.xcarchive" \
            DEVELOPMENT_TEAM="${IOS_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="com.aura.marketplace.mobile" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROVISIONING_PROFILE_SPECIFIER}" \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            archive

      - name: Export signed iOS IPA
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
        run: |
          set -euo pipefail
          EXPORT_METHOD="${IOS_EXPORT_METHOD:-}"
          if [ -z "${EXPORT_METHOD}" ]; then
            if [ -n "${APP_STORE_CONNECT_KEY_ID}" ] && [ -n "${APP_STORE_CONNECT_ISSUER_ID}" ] && [ -n "${APP_STORE_CONNECT_API_KEY_P8_BASE64}" ]; then
              EXPORT_METHOD="app-store-connect"
            else
              EXPORT_METHOD="ad-hoc"
            fi
          fi

          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.aura.marketplace.mobile</key>
              <string>${IOS_PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "${RUNNER_TEMP}/AuraMarketplace.xcarchive" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath release-artifacts/ios

      - name: Rename signed iOS IPA
        if: needs.preflight.outputs.can_sign_ios == 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mv release-artifacts/ios/App.ipa "release-artifacts/ios/Aura-Marketplace-iOS-${VERSION}.ipa"

      - name: Upload iOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios
          path: release-artifacts/ios/*
          if-no-files-found: error
          retention-days: 14

  publish-android-play:
    needs:
      - prepare
      - preflight
      - build-android
    if: needs.preflight.outputs.can_publish_android_play == 'true' && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Use Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Download Android release artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: release-artifacts/android

      - name: Materialize Google Play service account
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64}" | base64 --decode > "${RUNNER_TEMP}/google-play-service-account.json"

      - name: Publish Android bundle to Google Play
        env:
          ANDROID_PACKAGE_NAME: com.aura.marketplace.mobile
          ANDROID_PLAY_TRACK: ${{ vars.ANDROID_PLAY_TRACK }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ runner.temp }}/google-play-service-account.json
        run: |
          set -euo pipefail
          AAB_PATH="$(find release-artifacts/android -name '*.aab' -print -quit)"
          test -n "${AAB_PATH}" || { echo "No Android App Bundle found"; exit 1; }
          ANDROID_AAB_PATH="${AAB_PATH}" bundle exec fastlane android play_internal

  publish-ios-testflight:
    needs:
      - prepare
      - preflight
      - build-ios
    if: needs.preflight.outputs.can_publish_ios_testflight == 'true' && needs.build-ios.result == 'success'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Use Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Download iOS release artifact
        uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: release-artifacts/ios

      - name: Materialize App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${APP_STORE_CONNECT_API_KEY_P8_BASE64}" | base64 --decode > "${RUNNER_TEMP}/app-store-connect-api-key.p8"

      - name: Publish iOS IPA to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ runner.temp }}/app-store-connect-api-key.p8
        run: |
          set -euo pipefail
          IPA_PATH="$(find release-artifacts/ios -name '*.ipa' -print -quit)"
          test -n "${IPA_PATH}" || { echo "No signed iOS IPA found"; exit 1; }
          IOS_IPA_PATH="${IPA_PATH}" bundle exec fastlane ios testflight

  publish:
    needs:
      - prepare
      - preflight
      - build-android
      - build-ios
      - publish-android-play
      - publish-ios-testflight
    if: |
      always() &&
      (needs.build-android.result == 'success' || needs.build-ios.result == 'success') &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped') &&
      (needs.publish-android-play.result == 'success' || needs.publish-android-play.result == 'skipped') &&
      (needs.publish-ios-testflight.result == 'success' || needs.publish-ios-testflight.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mobile release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mobile-*
          path: release-artifacts
          merge-multiple: true

      - name: Build release context
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_SHA: ${{ github.sha }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CAN_SIGN_ANDROID: ${{ needs.preflight.outputs.can_sign_android }}
          CAN_SIGN_IOS: ${{ needs.preflight.outputs.can_sign_ios }}
          CAN_PUBLISH_ANDROID_PLAY: ${{ needs.preflight.outputs.can_publish_android_play }}
          CAN_PUBLISH_IOS_TESTFLIGHT: ${{ needs.preflight.outputs.can_publish_ios_testflight }}
          IOS_BUILD_RESULT: ${{ needs.build-ios.result }}
          ANDROID_PLAY_RESULT: ${{ needs.publish-android-play.result }}
          IOS_TESTFLIGHT_RESULT: ${{ needs.publish-ios-testflight.result }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git tag --list 'mobile-v*' --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            COMMIT_RANGE="${PREVIOUS_TAG}..${RELEASE_SHA}"
            RANGE_LABEL="Changes since ${PREVIOUS_TAG}"
          else
            COMMIT_RANGE="${RELEASE_SHA}"
            RANGE_LABEL="Recent release context"
          fi

          {
            echo "## What shipped"
            echo
            echo "Aura Marketplace Mobile ${VERSION} was generated from commit \`${RELEASE_SHA}\` after the production CI/CD gates cleared."
            echo
            echo "This release packages the Android shell, the iOS shell validation artifacts, and the native auth/runtime bridge that lets installed apps load the hosted Aura storefront with native Firebase sign-in support."
            echo
            echo "## Why this release exists"
            echo
            echo "- Make Aura installable on Android and iPhone without forking the product into a separate mobile frontend."
            echo "- Keep mobile runtime, trusted-device flows, and social login aligned with the production Aura web deployment."
            echo "- Publish only after the main production pipeline succeeds, so mobile versions do not move forward when the core release is red."
            echo
            echo "## How mobile updates work"
            echo
            echo "- The mobile shells load the hosted Aura storefront at \`https://aurapilot.vercel.app\`, so normal frontend deployments reach installed mobile apps without rebuilding the native binaries."
            echo "- Installed Android and iPhone shells also check the Aura mobile release lane and surface a clear in-app update prompt when a newer native package is available."
            echo "- New APK, AAB, or IPA releases are only needed when the native shell, mobile auth bridge, or mobile delivery pipeline changes."
            echo "- This keeps the production pipeline faster than rebuilding mobile binaries for every single web-only change."
            echo
            echo "## Release details"
            echo
            if [ "${CAN_SIGN_ANDROID}" = "true" ]; then
              echo "- Android artifacts were built with the configured release keystore."
            else
              echo "- Android artifacts were built without the production keystore, so they are signed with the debug keystore for internal distribution only."
            fi

            if [ "${IOS_BUILD_RESULT}" = "success" ] && [ "${CAN_SIGN_IOS}" = "true" ]; then
              echo "- A signed iOS IPA is included when Apple signing assets are configured."
            elif [ "${IOS_BUILD_RESULT}" = "success" ]; then
              echo "- The iOS simulator build is included. A real-device IPA requires Apple signing assets and provisioning."
            else
              echo "- iOS artifacts were not published because the iOS build job did not complete successfully."
            fi

            if [ "${CAN_PUBLISH_ANDROID_PLAY}" = "true" ] && [ "${ANDROID_PLAY_RESULT}" = "success" ]; then
              echo "- The Android App Bundle was uploaded to the configured Google Play track."
            else
              echo "- Google Play upload was skipped because Play Console credentials/signing are not configured for this run."
            fi

            if [ "${CAN_PUBLISH_IOS_TESTFLIGHT}" = "true" ] && [ "${IOS_TESTFLIGHT_RESULT}" = "success" ]; then
              echo "- The signed iOS IPA was uploaded to TestFlight."
            else
              echo "- TestFlight upload was skipped because App Store Connect credentials/signing are not configured for this run."
            fi

            echo
            echo "## Build context"
            echo
            echo "- Workflow run: ${WORKFLOW_URL}"
            echo "- Source commit: \`${RELEASE_SHA}\`"
            echo "- ${RANGE_LABEL}:"
            git log --no-merges --pretty='  - `%h` %s' -n 18 "${COMMIT_RANGE}" || true
          } > release-notes.md

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const artifactsDir = 'release-artifacts';
          const version = process.env.VERSION;
          const tagName = process.env.TAG_NAME;
          const releaseBaseUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${tagName}`;
          const files = fs.readdirSync(artifactsDir)
            .filter((fileName) => fs.statSync(path.join(artifactsDir, fileName)).isFile())
            .sort();

          const manifest = {
            schemaVersion: 1,
            app: 'Aura Marketplace Mobile',
            version,
            tagName,
            sourceCommit: process.env.RELEASE_SHA,
            workflowUrl: process.env.WORKFLOW_URL,
            releaseNotesUrl: `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/tag/${tagName}`,
            generatedAt: new Date().toISOString(),
            updateModel: {
              hostedStorefront: 'https://aurapilot.vercel.app',
              webContent: 'automatic through hosted Aura deployments',
              nativeShell: 'GitHub mobile release lane, Google Play, or TestFlight when store credentials are configured',
            },
            stores: {
              googlePlay: process.env.ANDROID_PLAY_RESULT || 'skipped',
              testFlight: process.env.IOS_TESTFLIGHT_RESULT || 'skipped',
            },
            assets: files.map((fileName) => ({
              name: fileName,
              downloadUrl: `${releaseBaseUrl}/${encodeURIComponent(fileName)}`,
            })),
          };

          fs.writeFileSync(
            path.join(artifactsDir, `Aura-Mobile-Release-Manifest-${version}.json`),
            `${JSON.stringify(manifest, null, 2)}\n`
          );
          EOF

      - name: Publish GitHub mobile release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Aura Marketplace Mobile ${{ needs.prepare.outputs.version }}
          make_latest: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body_path: release-notes.md
          files: release-artifacts/*
