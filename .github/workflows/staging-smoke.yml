name: staging-smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
      STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
      STAGING_SSM_PREFIX: ${{ vars.STAGING_SSM_PREFIX }}
      SMOKE_TARGET_ENV: ${{ vars.SMOKE_TARGET_ENV }}
      SMOKE_REQUIRE_BACKEND_STAGING: ${{ vars.SMOKE_REQUIRE_BACKEND_STAGING }}
      SMOKE_FORBID_PRODUCTION_ORIGINS: ${{ vars.SMOKE_FORBID_PRODUCTION_ORIGINS }}
      PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
      PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
      PROD_SSM_PREFIX: ${{ vars.PROD_SSM_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check staging smoke target
        id: staging
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${STAGING_HEALTH_URL}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "STAGING_HEALTH_URL is not configured; skipping staging smoke."
            exit 0
          fi

          lower_health="$(printf '%s' "${STAGING_HEALTH_URL}" | tr '[:upper:]' '[:lower:]')"
          lower_prod_base="$(printf '%s' "${PROD_BASE_URL}" | sed 's#/*$##' | tr '[:upper:]' '[:lower:]')"
          lower_prod_api="$(printf '%s' "${PROD_API_BASE_URL}" | sed 's#/*$##' | tr '[:upper:]' '[:lower:]')"
          normalized_health="$(printf '%s' "${STAGING_HEALTH_URL}" | sed 's#/*$##' | tr '[:upper:]' '[:lower:]')"

          if [[ "${lower_health}" =~ (^|[./-])prod(uction)?([./-]|$) ]]; then
            echo "Refusing staging smoke: STAGING_HEALTH_URL looks production-like." >&2
            exit 1
          fi
          if [[ -n "${lower_prod_base}" && ( "${normalized_health}" == "${lower_prod_base}" || "${normalized_health}" == "${lower_prod_base}/health" ) ]]; then
            echo "Refusing staging smoke: STAGING_HEALTH_URL points at PROD_BASE_URL." >&2
            exit 1
          fi
          if [[ -n "${lower_prod_api}" && ( "${normalized_health}" == "${lower_prod_api}" || "${normalized_health}" == "${lower_prod_api}/health" ) ]]; then
            echo "Refusing staging smoke: STAGING_HEALTH_URL points at PROD_API_BASE_URL." >&2
            exit 1
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Validate staging environment contract
        if: steps.staging.outputs.configured == 'true'
        run: node scripts/env/validate-env.mjs --environment staging --env-file config/environments/staging.example.env

      - name: Curl staging health
        if: steps.staging.outputs.configured == 'true'
        run: curl --fail --show-error --silent --connect-timeout 5 --max-time 20 "${STAGING_HEALTH_URL}" > /dev/null

      - name: Run guarded staging smoke
        if: steps.staging.outputs.configured == 'true'
        run: npm run smoke:staging
