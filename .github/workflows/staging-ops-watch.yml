name: staging-ops-watch

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read
  id-token: write

jobs:
  watch-staging:
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 25
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL || vars.STAGING_BASE_URL }}
      STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
      STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
      STAGING_SSM_PREFIX: ${{ vars.STAGING_SSM_PREFIX }}
      STAGING_MONTHLY_BUDGET_USD: ${{ vars.STAGING_MONTHLY_BUDGET_USD || '5' }}
      PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
      PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
      PROD_SSM_PREFIX: ${{ vars.PROD_SSM_PREFIX }}
      SMOKE_TARGET_ENV: staging
      SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      SMOKE_REQUIRE_BACKEND_STAGING: "true"
      SMOKE_FORBID_PRODUCTION_ORIGINS: "true"
      SMOKE_REQUIRE_SCANNER_READY: ${{ vars.SMOKE_REQUIRE_SCANNER_READY || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate staging contract and prod fallback scan
        run: |
          npm run env:validate
          npm run scan:prod-fallbacks

      - name: Run backend and frontend staging smoke
        run: |
          npm run smoke:staging
          npm run smoke:staging:frontend

      - name: Run live staging DAST baseline
        env:
          STAGING_URL: ${{ vars.STAGING_FRONTEND_URL || vars.STAGING_BASE_URL }}
          FREE_SECURITY_SCANNERS_REQUIRED: "true"
          FREE_SECURITY_ZAP_BASELINE_REQUIRED: "true"
        run: npm run security:free-scanners -- --only=zap-baseline

      - name: Upload live staging DAST reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: staging-dast-security-reports
          path: |
            security-reports/free-security-scanners.json
            security-reports/zap-baseline.*
            security-reports/zap-baseline.stdout.txt
            security-reports/zap-baseline.stderr.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Configure AWS credentials for optional cost watch
        if: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-staging-ops-watch
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Run cost watch when AWS role is configured
        if: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN != '' }}
        run: npm run staging:cost-watch
