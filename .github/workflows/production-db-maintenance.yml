name: Production DB Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: Maintenance action to run
        required: true
        default: dry-run-demo-catalog-purge
        type: choice
        options:
          - storage-report
          - dry-run-status-check-retention
          - execute-status-check-retention
          - dry-run-demo-catalog-purge
          - execute-demo-catalog-purge
      retention_days:
        description: Retention window for status check telemetry cleanup
        required: false
        default: "7"
      git_ref:
        description: Git ref whose scripts are expected in the deployed backend image
        required: false
        default: main

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-db-maintenance
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  AWS_INSTANCE_TAG_KEY: ${{ vars.AWS_INSTANCE_TAG_KEY || 'Name' }}
  AWS_INSTANCE_TAG_VALUE: ${{ vars.AWS_INSTANCE_TAG_VALUE || '' }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN || '' }}
  MAINTENANCE_ACTION: ${{ inputs.action }}
  STATUS_CHECK_RETENTION_DAYS: ${{ inputs.retention_days || '7' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}

      - name: Validate maintenance request
        run: |
          set -euo pipefail
          test -n "${AWS_DEPLOY_ROLE_ARN}" || { echo "Missing secret AWS_DEPLOY_ROLE_ARN"; exit 1; }
          test -n "${AWS_INSTANCE_TAG_KEY}" || { echo "Missing variable AWS_INSTANCE_TAG_KEY"; exit 1; }
          test -n "${AWS_INSTANCE_TAG_VALUE}" || { echo "Missing variable AWS_INSTANCE_TAG_VALUE"; exit 1; }
          case "${MAINTENANCE_ACTION}" in
            storage-report|dry-run-status-check-retention|execute-status-check-retention|dry-run-demo-catalog-purge|execute-demo-catalog-purge)
              ;;
            *)
              echo "Unsupported production maintenance action: ${MAINTENANCE_ACTION}"
              exit 1
              ;;
          esac
          case "${STATUS_CHECK_RETENTION_DAYS}" in
            ''|*[!0-9]*)
              echo "retention_days must be a positive integer"
              exit 1
              ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-production-db-maintenance
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Resolve backend instance
        id: resolve_instance
        run: |
          set -euo pipefail
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:${AWS_INSTANCE_TAG_KEY},Values=${AWS_INSTANCE_TAG_VALUE}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)"
          test -n "${INSTANCE_ID}" && test "${INSTANCE_ID}" != "None" || { echo "No running EC2 instance matched ${AWS_INSTANCE_TAG_KEY}=${AWS_INSTANCE_TAG_VALUE}"; exit 1; }
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Run maintenance through SSM
        id: ssm
        run: |
          set -euo pipefail
          INJECT_SCRIPT_SOURCE=""
          INJECT_CONTAINER_PATH=""
          case "${MAINTENANCE_ACTION}" in
            storage-report)
              NODE_COMMAND="node scripts/audit_mongo_storage.js"
              INJECT_SCRIPT_SOURCE="server/scripts/audit_mongo_storage.js"
              INJECT_CONTAINER_PATH="/app/scripts/audit_mongo_storage.js"
              ;;
            dry-run-status-check-retention)
              NODE_COMMAND="node scripts/purge_status_checks.js --retention-days=${STATUS_CHECK_RETENTION_DAYS}"
              INJECT_SCRIPT_SOURCE="server/scripts/purge_status_checks.js"
              INJECT_CONTAINER_PATH="/app/scripts/purge_status_checks.js"
              ;;
            execute-status-check-retention)
              NODE_COMMAND="node scripts/purge_status_checks.js --execute --retention-days=${STATUS_CHECK_RETENTION_DAYS}"
              INJECT_SCRIPT_SOURCE="server/scripts/purge_status_checks.js"
              INJECT_CONTAINER_PATH="/app/scripts/purge_status_checks.js"
              ;;
            dry-run-demo-catalog-purge)
              NODE_COMMAND="node scripts/purge_demo_catalog.js"
              ;;
            execute-demo-catalog-purge)
              NODE_COMMAND="node scripts/purge_demo_catalog.js --execute"
              ;;
          esac

          INJECT_SCRIPT_B64=""
          if [ -n "${INJECT_SCRIPT_SOURCE}" ]; then
            INJECT_SCRIPT_B64="$(base64 -w 0 "${INJECT_SCRIPT_SOURCE}")"
          fi

          COMPOSE_PREFIX="docker compose --env-file /opt/aura/shared/base.env --env-file /opt/aura/shared/runtime-secrets.env --env-file /opt/aura/shared/release.env -f /opt/aura/current/infra/aws/docker-compose.ec2.yml"
          export INJECT_SCRIPT_B64
          export INJECT_CONTAINER_PATH
          export COMPOSE_PREFIX
          export NODE_COMMAND
          node <<'NODE' > "${RUNNER_TEMP}/ssm-commands.json"
          const commands = ['set -euo pipefail'];
          const compose = process.env.COMPOSE_PREFIX;

          if (process.env.INJECT_SCRIPT_B64) {
            commands.push(`printf '%s' '${process.env.INJECT_SCRIPT_B64}' | base64 -d > /tmp/aura_maintenance_script.js`);
            commands.push(`API_CONTAINER="$(${compose} ps -q api)"`);
            commands.push('test -n "${API_CONTAINER}" || { echo "API container not found"; exit 1; }');
            commands.push(`docker cp /tmp/aura_maintenance_script.js "\${API_CONTAINER}:${process.env.INJECT_CONTAINER_PATH}"`);
          }
          commands.push(`${compose} exec -T api ${process.env.NODE_COMMAND}`);

          console.log(JSON.stringify({ commands }, null, 2));
          NODE

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${{ steps.resolve_instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Aura production DB maintenance: ${MAINTENANCE_ACTION}" \
            --parameters "file://${RUNNER_TEMP}/ssm-commands.json" \
            --query "Command.CommandId" \
            --output text)"
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for maintenance completion
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ steps.resolve_instance.outputs.instance_id }}" \
              --query "Status" \
              --output text)"
            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${{ steps.ssm.outputs.command_id }}" \
                  --instance-id "${{ steps.resolve_instance.outputs.instance_id }}" \
                  --query "{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" \
                  --output json
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${{ steps.ssm.outputs.command_id }}" \
                  --instance-id "${{ steps.resolve_instance.outputs.instance_id }}" \
                  --query "{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" \
                  --output json
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for production DB maintenance command."
          exit 1
