name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional desktop version, for example 1.0.42
        required: false
        type: string
      require_windows_signing:
        description: Require Windows Authenticode signing before publishing
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      version:
        description: Optional desktop version, for example 1.0.42
        required: false
        default: ""
        type: string
      require_windows_signing:
        description: Require Windows Authenticode signing before publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.x
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Resolve desktop version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${VERSION_INPUT}" ]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION="1.0.${GITHUB_RUN_NUMBER}"
          fi

          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Invalid desktop version: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=desktop-v${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run desktop:dist:win:all -- --publish never
          - platform: macos
            os: macos-latest
            command: npm run desktop:dist:mac -- --publish never
          - platform: linux
            os: ubuntu-latest
            command: npm run desktop:dist:linux -- --publish never

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Stamp desktop version
        shell: bash
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Configure Windows code signing
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD }}
          REQUIRE_WINDOWS_SIGNING: ${{ inputs.require_windows_signing }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64)) {
            "AURA_WINDOWS_SIGNING_ENABLED=false" >> $env:GITHUB_ENV
            if ($env:REQUIRE_WINDOWS_SIGNING -eq "true") {
              throw "Windows code signing is required for release publishing. Add WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 and WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD repository secrets, or disable require_windows_signing only for internal test releases."
            }

            Write-Host "Windows code signing certificate secret is not configured; Windows installers will be unsigned because require_windows_signing is false."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD)) {
            throw "WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD is required when WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 is set."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "aura-windows-code-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64))
          "CSC_LINK=$certificatePath" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=$env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          "WIN_CSC_LINK=$certificatePath" >> $env:GITHUB_ENV
          "WIN_CSC_KEY_PASSWORD=$env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          "AURA_WINDOWS_SIGNING_ENABLED=true" >> $env:GITHUB_ENV

      - name: Build desktop artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ] && [ "${AURA_WINDOWS_SIGNING_ENABLED:-false}" = "true" ]; then
            npm run desktop:dist:win:all -- --publish never --config.win.signAndEditExecutable=true
          else
            ${{ matrix.command }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows signatures
        if: matrix.platform == 'windows' && env.AURA_WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $signatures = Get-ChildItem -Path desktop-release -Filter *.exe | Get-AuthenticodeSignature
          $signatures | Format-Table -AutoSize
          $invalid = $signatures | Where-Object { $_.Status -ne "Valid" }
          if ($invalid) {
            throw "One or more Windows desktop executables are not signed with a valid Authenticode signature."
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop-release/*.AppImage
            desktop-release/*.blockmap
            desktop-release/*.deb
            desktop-release/*.dmg
            desktop-release/*.exe
            desktop-release/*.rpm
            desktop-release/*.tar.gz
            desktop-release/*.yml
            desktop-release/*.zip
            !desktop-release/builder-debug.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Aura Marketplace Desktop ${{ needs.prepare.outputs.version }}
          make_latest: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            Aura Marketplace desktop release generated from `${{ github.sha }}`.

            Download the build that matches your device from the assets below. Installed apps check this latest release for automatic updates.
          files: release-artifacts/*
