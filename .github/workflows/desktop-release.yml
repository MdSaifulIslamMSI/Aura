name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional desktop version, for example 1.0.42
        required: false
        type: string
      require_windows_signing:
        description: Require Windows Authenticode signing before publishing
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      version:
        description: Optional desktop version, for example 1.0.42
        required: false
        default: ""
        type: string
      require_windows_signing:
        description: Require Windows Authenticode signing before publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.x
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Resolve desktop version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${VERSION_INPUT}" ]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION="1.0.${GITHUB_RUN_NUMBER}"
          fi

          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'; then
            echo "Invalid desktop version: ${VERSION}" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=desktop-v${VERSION}" >> "$GITHUB_OUTPUT"

  release-preflight:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check required release signing secrets
        env:
          WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_CODE_SIGNING_PUBLISHER_NAME: ${{ secrets.WINDOWS_CODE_SIGNING_PUBLISHER_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          REQUIRE_WINDOWS_SIGNING: ${{ inputs.require_windows_signing }}
        run: |
          set -euo pipefail

          if [ "${REQUIRE_WINDOWS_SIGNING}" != "true" ]; then
            echo "::warning::Windows signing is not required for this run. Use this only for internal test releases."
            exit 0
          fi

          has_pfx_signing=false
          has_trusted_signing=false

          if [ -n "${WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64}" ] && [ -n "${WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD}" ]; then
            has_pfx_signing=true
          fi

          if [ -n "${AZURE_CLIENT_ID}" ] \
            && [ -n "${AZURE_CLIENT_SECRET}" ] \
            && [ -n "${AZURE_TENANT_ID}" ] \
            && [ -n "${AZURE_TRUSTED_SIGNING_ACCOUNT_NAME}" ] \
            && [ -n "${AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME}" ] \
            && [ -n "${AZURE_TRUSTED_SIGNING_ENDPOINT}" ] \
            && [ -n "${WINDOWS_CODE_SIGNING_PUBLISHER_NAME}" ]; then
            has_trusted_signing=true
          fi

          if [ "${has_pfx_signing}" != "true" ] && [ "${has_trusted_signing}" != "true" ]; then
            echo "::error::Windows code signing is required before publishing a production desktop release. Add either PFX signing secrets or Microsoft Trusted Signing secrets."
            exit 1
          fi

  build:
    needs:
      - prepare
      - release-preflight
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run desktop:dist:win:all -- --publish never
          - platform: macos
            os: macos-latest
            command: npm run desktop:dist:mac -- --publish never
          - platform: linux
            os: ubuntu-latest
            command: npm run desktop:dist:linux -- --publish never

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Stamp desktop version
        shell: bash
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Configure Windows code signing
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD }}
          WINDOWS_CODE_SIGNING_PUBLISHER_NAME: ${{ secrets.WINDOWS_CODE_SIGNING_PUBLISHER_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          REQUIRE_WINDOWS_SIGNING: ${{ inputs.require_windows_signing }}
        run: |
          $hasPfxSigning = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64) `
            -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD)

          $hasTrustedSigning = -not [string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID) `
            -and -not [string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_SECRET) `
            -and -not [string]::IsNullOrWhiteSpace($env:AZURE_TENANT_ID) `
            -and -not [string]::IsNullOrWhiteSpace($env:AZURE_TRUSTED_SIGNING_ACCOUNT_NAME) `
            -and -not [string]::IsNullOrWhiteSpace($env:AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME) `
            -and -not [string]::IsNullOrWhiteSpace($env:AZURE_TRUSTED_SIGNING_ENDPOINT) `
            -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_PUBLISHER_NAME)

          if ($hasTrustedSigning -and -not $hasPfxSigning) {
            "AURA_WINDOWS_SIGNING_MODE=trusted-signing" >> $env:GITHUB_ENV
            "AZURE_CLIENT_ID=$env:AZURE_CLIENT_ID" >> $env:GITHUB_ENV
            "AZURE_CLIENT_SECRET=$env:AZURE_CLIENT_SECRET" >> $env:GITHUB_ENV
            "AZURE_TENANT_ID=$env:AZURE_TENANT_ID" >> $env:GITHUB_ENV
            "AZURE_TRUSTED_SIGNING_ACCOUNT_NAME=$env:AZURE_TRUSTED_SIGNING_ACCOUNT_NAME" >> $env:GITHUB_ENV
            "AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME=$env:AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" >> $env:GITHUB_ENV
            "AZURE_TRUSTED_SIGNING_ENDPOINT=$env:AZURE_TRUSTED_SIGNING_ENDPOINT" >> $env:GITHUB_ENV
            "WINDOWS_CODE_SIGNING_PUBLISHER_NAME=$env:WINDOWS_CODE_SIGNING_PUBLISHER_NAME" >> $env:GITHUB_ENV
            exit 0
          }

          if (-not $hasPfxSigning) {
            "AURA_WINDOWS_SIGNING_MODE=unsigned" >> $env:GITHUB_ENV
            if ($env:REQUIRE_WINDOWS_SIGNING -eq "true") {
              throw "Windows code signing is required for release publishing. Add PFX signing secrets or Microsoft Trusted Signing secrets, or disable require_windows_signing only for internal test releases."
            }

            Write-Host "Windows code signing secrets are not configured; Windows installers will be unsigned because require_windows_signing is false."
            exit 0
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "aura-windows-code-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CODE_SIGNING_CERTIFICATE_BASE64))
          "CSC_LINK=$certificatePath" >> $env:GITHUB_ENV
          "CSC_KEY_PASSWORD=$env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          "WIN_CSC_LINK=$certificatePath" >> $env:GITHUB_ENV
          "WIN_CSC_KEY_PASSWORD=$env:WINDOWS_CODE_SIGNING_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV
          "AURA_WINDOWS_SIGNING_MODE=pfx" >> $env:GITHUB_ENV

      - name: Build desktop artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ] && [ "${AURA_WINDOWS_SIGNING_MODE:-}" = "pfx" ]; then
            npm run desktop:dist:win:all -- --publish never --config.win.signAndEditExecutable=true
          elif [ "${{ matrix.platform }}" = "windows" ] && [ "${AURA_WINDOWS_SIGNING_MODE:-}" = "trusted-signing" ]; then
            npm run desktop:dist:win:all -- --publish never \
              --config.win.signAndEditExecutable=true \
              --config.win.azureSignOptions.endpoint="${AZURE_TRUSTED_SIGNING_ENDPOINT}" \
              --config.win.azureSignOptions.certificateProfileName="${AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME}" \
              --config.win.azureSignOptions.codeSigningAccountName="${AZURE_TRUSTED_SIGNING_ACCOUNT_NAME}" \
              --config.win.azureSignOptions.publisherName="${WINDOWS_CODE_SIGNING_PUBLISHER_NAME}"
          else
            ${{ matrix.command }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows signatures
        if: matrix.platform == 'windows' && env.AURA_WINDOWS_SIGNING_MODE != 'unsigned'
        shell: pwsh
        run: |
          $signatures = Get-ChildItem -Path desktop-release -Filter *.exe | Get-AuthenticodeSignature
          $signatures | Format-Table -AutoSize
          $invalid = $signatures | Where-Object { $_.Status -ne "Valid" }
          if ($invalid) {
            throw "One or more Windows desktop executables are not signed with a valid Authenticode signature."
          }

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            desktop-release/*.AppImage
            desktop-release/*.blockmap
            desktop-release/*.deb
            desktop-release/*.dmg
            desktop-release/*.exe
            desktop-release/*.rpm
            desktop-release/*.tar.gz
            desktop-release/*.yml
            desktop-release/*.zip
            !desktop-release/builder-debug.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-artifacts
          merge-multiple: true

      - name: Build release context
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_SHA: ${{ github.sha }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git tag --list 'desktop-v*' --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            COMMIT_RANGE="${PREVIOUS_TAG}..${RELEASE_SHA}"
            RANGE_LABEL="Changes since ${PREVIOUS_TAG}"
          else
            COMMIT_RANGE="${RELEASE_SHA}"
            RANGE_LABEL="Recent release context"
          fi

          {
            echo "## What shipped"
            echo
            echo "Aura Marketplace Desktop ${VERSION} was generated from commit \`${RELEASE_SHA}\` after the production CI/CD release gates completed."
            echo
            echo "This release includes the packaged desktop app, the bundled production web frontend, the local desktop runtime proxy, and updater metadata for installed apps."
            echo
            echo "## Why this release exists"
            echo
            echo "- Keep Windows, macOS, and Linux desktop builds aligned with the current Aura web app."
            echo "- Give installed users the newest trusted-device, login, marketplace, and runtime fixes without requiring a manual reinstall."
            echo "- Publish only from the automated release flow so failed CI/CD jobs do not move the latest desktop version forward."
            echo
            echo "## How updates work"
            echo
            echo "- Installed desktop apps check the GitHub latest release feed, download the matching update package, and install it on restart or app quit."
            echo "- Windows, macOS, and Linux updater metadata is uploaded next to the installers so auto-update clients can resolve the correct build."
            echo "- The production pipeline must succeed before this job publishes a latest release from the main CI/CD flow."
            echo
            echo "## Download guide"
            echo
            echo "- Windows users should choose the Setup installer for their CPU architecture, usually x64."
            echo "- macOS users should choose arm64 for Apple Silicon or x64 for Intel Macs."
            echo "- Linux users can choose AppImage for portable use, or deb/rpm/tar.gz for distro-specific installation."
            echo
            echo "## Build context"
            echo
            echo "- Workflow run: ${WORKFLOW_URL}"
            echo "- Source commit: \`${RELEASE_SHA}\`"
            echo "- ${RANGE_LABEL}:"
            git log --no-merges --pretty='  - `%h` %s' -n 18 "${COMMIT_RANGE}" || true
          } > release-notes.md

      - name: Publish GitHub desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Aura Marketplace Desktop ${{ needs.prepare.outputs.version }}
          make_latest: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body_path: release-notes.md
          files: release-artifacts/*
