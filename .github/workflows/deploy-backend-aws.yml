name: Deploy Backend To AWS

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main
      skip_healthcheck:
        description: Skip the final readiness probe
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: false
        default: main
        type: string
      skip_healthcheck:
        description: Skip the final readiness probe
        required: false
        default: false
        type: boolean
    outputs:
      release_sha:
        description: Immutable commit deployed by this workflow
        value: ${{ jobs.preflight.outputs.release_sha }}
      backend_rollback_ref:
        description: Backend release SHA that was active before this deployment
        value: ${{ jobs.deploy.outputs.rollback_ref }}
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-backend-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET || '' }}
  AWS_INSTANCE_TAG_KEY: ${{ vars.AWS_INSTANCE_TAG_KEY || 'Name' }}
  AWS_INSTANCE_TAG_VALUE: ${{ vars.AWS_INSTANCE_TAG_VALUE || '' }}
  AWS_PARAMETER_STORE_PATH_PREFIX: ${{ vars.AWS_PARAMETER_STORE_PATH_PREFIX || '' }}
  AWS_DOCKER_PLATFORM: ${{ vars.AWS_DOCKER_PLATFORM || 'linux/arm64' }}
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN || '' }}
  AURA_BACKEND_ORIGIN: ${{ vars.AURA_BACKEND_ORIGIN || vars.AWS_BACKEND_BASE_URL || '' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_sha: ${{ steps.release.outputs.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.git_ref || github.sha }}

      - name: Resolve immutable release commit
        id: release
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Resolve hosted backend origin
        run: |
          set -euo pipefail
          AWS_BACKEND_BASE_URL="$(node ./app/scripts/print_hosted_backend_origin.mjs)"
          echo "AWS_BACKEND_BASE_URL=${AWS_BACKEND_BASE_URL}" >> "$GITHUB_ENV"

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Run assistant query-quality eval
        run: npm --prefix server run assistant:eval:query-quality
        env:
          NODE_ENV: test

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          test -n "${AWS_DEPLOY_ROLE_ARN}" || { echo "Missing secret AWS_DEPLOY_ROLE_ARN"; exit 1; }
          test -n "${AWS_DEPLOY_BUCKET}" || { echo "Missing variable AWS_DEPLOY_BUCKET"; exit 1; }
          test -n "${AWS_INSTANCE_TAG_KEY}" || { echo "Missing variable AWS_INSTANCE_TAG_KEY"; exit 1; }
          test -n "${AWS_INSTANCE_TAG_VALUE}" || { echo "Missing variable AWS_INSTANCE_TAG_VALUE"; exit 1; }
          test -n "${AWS_PARAMETER_STORE_PATH_PREFIX}" || { echo "Missing variable AWS_PARAMETER_STORE_PATH_PREFIX"; exit 1; }
          test -n "${AWS_BACKEND_BASE_URL}" || { echo "Missing variable AWS_BACKEND_BASE_URL"; exit 1; }
          echo "Deploy role: ${AWS_DEPLOY_ROLE_ARN}"
          echo "Deploy bucket: ${AWS_DEPLOY_BUCKET}"
          echo "Instance selector: ${AWS_INSTANCE_TAG_KEY}=${AWS_INSTANCE_TAG_VALUE}"
          echo "Backend URL: ${AWS_BACKEND_BASE_URL}"

      - name: Audit AWS Parameter Store secret coverage
        run: node server/scripts/audit_parameter_store_secret_contract.js

      - name: Configure AWS credentials for preflight
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-github-preflight
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Validate AWS deploy access
        run: |
          set -euo pipefail
          aws sts get-caller-identity
          aws s3api head-bucket --bucket "${AWS_DEPLOY_BUCKET}"
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:${AWS_INSTANCE_TAG_KEY},Values=${AWS_INSTANCE_TAG_VALUE}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)"
          test -n "${INSTANCE_ID}" && test "${INSTANCE_ID}" != "None" || { echo "No running EC2 instance matched ${AWS_INSTANCE_TAG_KEY}=${AWS_INSTANCE_TAG_VALUE}"; exit 1; }
          echo "Resolved backend instance ${INSTANCE_ID}"

  deploy:
    needs: preflight
    runs-on: ubuntu-24.04-arm
    # The failure path may consume a full deploy SSM poll followed by a full
    # rollback SSM poll. Keep enough headroom for build and artifact transfer.
    timeout-minutes: 120
    env:
      AURA_RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
    outputs:
      rollback_ref: ${{ steps.current_release.outputs.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Resolve hosted backend origin
        run: |
          set -euo pipefail
          AWS_BACKEND_BASE_URL="$(node ./app/scripts/print_hosted_backend_origin.mjs)"
          echo "AWS_BACKEND_BASE_URL=${AWS_BACKEND_BASE_URL}" >> "$GITHUB_ENV"

      - name: Verify native backend build runner
        env:
          RUNNER_ARCH_NAME: ${{ runner.arch }}
        run: |
          set -euo pipefail
          echo "Backend build runner architecture: ${RUNNER_ARCH_NAME}"
          echo "Backend image platform: ${AWS_DOCKER_PLATFORM}"
          if [ "${AWS_DOCKER_PLATFORM}" = "linux/arm64" ] && [ "${RUNNER_ARCH_NAME}" != "ARM64" ]; then
            echo "linux/arm64 backend builds must run on an ARM64 GitHub runner."
            exit 1
          fi

      - name: Set up QEMU
        if: runner.arch != 'ARM64'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build backend container image
        run: |
          docker buildx build \
            --platform "${AWS_DOCKER_PLATFORM}" \
            --file server/Dockerfile \
            --tag aura-backend:${AURA_RELEASE_SHA} \
            --load \
            .

      - name: Package deployment artifacts
        id: package
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${AURA_RELEASE_SHA}" || { echo "Checked-out release SHA drifted." >&2; exit 1; }
          git archive --format=tar.gz --output "${RUNNER_TEMP}/aura-infra-${AURA_RELEASE_SHA}.tar.gz" HEAD infra/aws
          docker save aura-backend:${AURA_RELEASE_SHA} | gzip > "${RUNNER_TEMP}/aura-image-${AURA_RELEASE_SHA}.tar.gz"
          INFRA_SHA256="$(sha256sum "${RUNNER_TEMP}/aura-infra-${AURA_RELEASE_SHA}.tar.gz" | awk '{print $1}')"
          IMAGE_SHA256="$(sha256sum "${RUNNER_TEMP}/aura-image-${AURA_RELEASE_SHA}.tar.gz" | awk '{print $1}')"
          echo "infra_sha256=${INFRA_SHA256}" >> "$GITHUB_OUTPUT"
          echo "image_sha256=${IMAGE_SHA256}" >> "$GITHUB_OUTPUT"

      # Acquire the deploy session after the potentially long image build so
      # the full SSM polling window remains inside the OIDC role lifetime.
      - name: Configure fresh AWS credentials for deployment
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-github-deploy
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Resolve backend instance
        id: resolve_instance
        run: |
          set -euo pipefail
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:${AWS_INSTANCE_TAG_KEY},Values=${AWS_INSTANCE_TAG_VALUE}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)"
          test -n "${INSTANCE_ID}" && test "${INSTANCE_ID}" != "None" || { echo "No running EC2 instance matched ${AWS_INSTANCE_TAG_KEY}=${AWS_INSTANCE_TAG_VALUE}"; exit 1; }
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Capture current backend rollback release
        id: current_release
        env:
          INSTANCE_ID: ${{ steps.resolve_instance.outputs.instance_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > "${RUNNER_TEMP}/capture-current-release.json"
          import json

          print(json.dumps({"commands": [
              "set -euo pipefail",
              "awk -F= '$1 == \"AURA_APP_BUILD_SHA\" { print $2 }' /opt/aura/shared/release.env | tail -n 1",
          ]}))
          PY

          CAPTURE_COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Capture current Aura backend release before deploy" \
            --parameters "file://${RUNNER_TEMP}/capture-current-release.json" \
            --query "Command.CommandId" \
            --output text)"

          CAPTURE_STATUS=""
          CAPTURE_ERROR="${RUNNER_TEMP}/capture-current-release.err"
          for _ in $(seq 1 60); do
            if ! CAPTURE_STATUS="$(aws ssm get-command-invocation \
              --command-id "${CAPTURE_COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>"${CAPTURE_ERROR}")"; then
              if grep -q 'InvocationDoesNotExist' "${CAPTURE_ERROR}"; then
                sleep 2
                continue
              fi
              cat "${CAPTURE_ERROR}" >&2
              exit 1
            fi
            case "${CAPTURE_STATUS}" in
              Success) break ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${CAPTURE_COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "{Status:Status,StdErr:StandardErrorContent}" \
                  --output json
                exit 1
                ;;
            esac
            sleep 2
          done
          test "${CAPTURE_STATUS}" = "Success" || { echo "Timed out capturing current backend release." >&2; exit 1; }

          CURRENT_RELEASE_SHA="$(aws ssm get-command-invocation \
            --command-id "${CAPTURE_COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text | tr -d '\r\n')"
          [[ "${CURRENT_RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Current backend release metadata is missing or malformed; refusing mutation." >&2
            exit 1
          }
          if [[ "${CURRENT_RELEASE_SHA}" = "${AURA_RELEASE_SHA}" ]]; then
            echo "Requested backend release is already active; refusing a same-SHA redeploy that would overwrite rollback artifacts." >&2
            exit 1
          fi
          echo "sha=${CURRENT_RELEASE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload deployment artifacts to S3
        id: upload
        run: |
          set -euo pipefail
          INFRA_KEY="releases/${AURA_RELEASE_SHA}/infra.tar.gz"
          IMAGE_KEY="releases/${AURA_RELEASE_SHA}/image.tar.gz"
          aws s3 cp "${RUNNER_TEMP}/aura-infra-${AURA_RELEASE_SHA}.tar.gz" "s3://${AWS_DEPLOY_BUCKET}/${INFRA_KEY}"
          aws s3 cp "${RUNNER_TEMP}/aura-image-${AURA_RELEASE_SHA}.tar.gz" "s3://${AWS_DEPLOY_BUCKET}/${IMAGE_KEY}"
          echo "infra_key=${INFRA_KEY}" >> "$GITHUB_OUTPUT"
          echo "image_key=${IMAGE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Deploy release through SSM
        id: ssm
        env:
          INFRA_BUNDLE_KEY: ${{ steps.upload.outputs.infra_key }}
          IMAGE_BUNDLE_KEY: ${{ steps.upload.outputs.image_key }}
          INFRA_BUNDLE_SHA256: ${{ steps.package.outputs.infra_sha256 }}
          IMAGE_BUNDLE_SHA256: ${{ steps.package.outputs.image_sha256 }}
          INSTANCE_ID: ${{ steps.resolve_instance.outputs.instance_id }}
        run: |
          set -euo pipefail
          test -n "${INFRA_BUNDLE_SHA256}" || { echo "Missing infra bundle SHA-256"; exit 1; }
          test -n "${IMAGE_BUNDLE_SHA256}" || { echo "Missing image bundle SHA-256"; exit 1; }
          cat > "${RUNNER_TEMP}/ssm-commands.json" <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "rm -rf /opt/aura/bootstrap/current",
              "mkdir -p /opt/aura/bootstrap/current",
              "aws s3 cp s3://${AWS_DEPLOY_BUCKET}/${INFRA_BUNDLE_KEY} /opt/aura/bootstrap/infra.tar.gz",
              "echo '${INFRA_BUNDLE_SHA256}  /opt/aura/bootstrap/infra.tar.gz' | sha256sum --check --status",
              "tar -xzf /opt/aura/bootstrap/infra.tar.gz -C /opt/aura/bootstrap/current",
              "export AWS_REGION='${AWS_REGION}'",
              "export AWS_PARAMETER_STORE_PATH_PREFIX='${AWS_PARAMETER_STORE_PATH_PREFIX}'",
              "export AURA_DEPLOY_BUCKET='${AWS_DEPLOY_BUCKET}'",
              "export AURA_RELEASE_SHA='${AURA_RELEASE_SHA}'",
              "export AURA_INFRA_BUNDLE_KEY='${INFRA_BUNDLE_KEY}'",
              "export AURA_IMAGE_BUNDLE_KEY='${IMAGE_BUNDLE_KEY}'",
              "export AURA_INFRA_BUNDLE_SHA256='${INFRA_BUNDLE_SHA256}'",
              "export AURA_IMAGE_BUNDLE_SHA256='${IMAGE_BUNDLE_SHA256}'",
              "bash /opt/aura/bootstrap/current/infra/aws/deploy-release.sh"
            ]
          }
          EOF

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Aura backend ${AURA_RELEASE_SHA}" \
            --parameters "file://${RUNNER_TEMP}/ssm-commands.json" \
            --query "Command.CommandId" \
            --output text)"
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM completion
        id: wait_ssm
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          INSTANCE_ID: ${{ steps.resolve_instance.outputs.instance_id }}
        run: |
          set -euo pipefail
          STATUS_ERROR="${RUNNER_TEMP}/wait-backend-deploy.err"
          for _ in $(seq 1 240); do
            if ! STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>"${STATUS_ERROR}")"; then
              if grep -q 'InvocationDoesNotExist' "${STATUS_ERROR}"; then
                sleep 10
                continue
              fi
              cat "${STATUS_ERROR}" >&2
              exit 1
            fi
            case "${STATUS}" in
              Success)
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" \
                  --output json
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM deployment command."
          exit 1

      - name: Verify backend health
        if: inputs.skip_healthcheck != true
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --connect-timeout 5 --max-time 20 "${AWS_BACKEND_BASE_URL%/}/health" > /dev/null

      - name: Refresh AWS credentials for failure restoration
        id: rollback_credentials
        if: failure() && steps.wait_ssm.outcome == 'success' && steps.current_release.outputs.sha != ''
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-github-rollback-recovery
          mask-aws-account-id: true
          unset-current-credentials: true

      - name: Restore previous backend after post-activation verification failure
        if: failure() && steps.rollback_credentials.outcome == 'success' && steps.current_release.outputs.sha != ''
        env:
          ROLLBACK_REF: ${{ steps.current_release.outputs.sha }}
        run: bash infra/aws/rollback-backend.sh
