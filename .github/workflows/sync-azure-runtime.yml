name: Sync Azure Runtime

on:
  workflow_dispatch:
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  CONTAINER_ENV_NAME: ${{ vars.CONTAINER_ENV_NAME }}
  BACKEND_IDENTITY_NAME: ${{ vars.BACKEND_IDENTITY_NAME }}
  API_APP_NAME: ${{ vars.API_APP_NAME }}
  WORKER_APP_NAME: ${{ vars.WORKER_APP_NAME }}

jobs:
  sync-runtime:
    if: vars.AZURE_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Materialize Azure runtime env file
        id: runtime_env
        shell: bash
        env:
          AZURE_RUNTIME_ENV_FILE: ${{ secrets.AZURE_RUNTIME_ENV_FILE }}
        run: |
          set -euo pipefail
          if [[ -z "${AZURE_RUNTIME_ENV_FILE:-}" ]]; then
            echo "AZURE_RUNTIME_ENV_FILE GitHub secret is required for runtime sync." >&2
            exit 1
          fi
          env_file="${RUNNER_TEMP}/azure-runtime.env"
          printf '%s' "${AZURE_RUNTIME_ENV_FILE}" > "${env_file}"
          echo "path=${env_file}" >> "${GITHUB_OUTPUT}"

      - name: Sync Azure runtime
        shell: pwsh
        env:
          APP_BUILD_SHA: ${{ github.sha }}
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || '' }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL || '' }}
        run: |
          & ".\\infra\\azure\\sync-containerapps-runtime.ps1" `
            -ResourceGroup "${{ env.RESOURCE_GROUP }}" `
            -KeyVaultName "${{ env.KEY_VAULT_NAME }}" `
            -ContainerEnvName "${{ env.CONTAINER_ENV_NAME }}" `
            -IdentityName "${{ env.BACKEND_IDENTITY_NAME }}" `
            -ApiAppName "${{ env.API_APP_NAME }}" `
            -WorkerAppName "${{ env.WORKER_APP_NAME }}" `
            -SourceEnvFile "${{ steps.runtime_env.outputs.path }}" `
            -SyncKeyVaultSecrets `
            -FrontendOrigin "${env:FRONTEND_ORIGIN}" `
            -ApiPublicUrl "${env:API_PUBLIC_URL}"

      - name: Verify Azure runtime drift
        shell: pwsh
        env:
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN || '' }}
          API_PUBLIC_URL: ${{ vars.API_PUBLIC_URL || '' }}
        run: |
          & ".\\infra\\azure\\verify-containerapps-runtime.ps1" `
            -ResourceGroup "${{ env.RESOURCE_GROUP }}" `
            -KeyVaultName "${{ env.KEY_VAULT_NAME }}" `
            -ApiAppName "${{ env.API_APP_NAME }}" `
            -WorkerAppName "${{ env.WORKER_APP_NAME }}" `
            -SourceEnvFile "${{ steps.runtime_env.outputs.path }}" `
            -FrontendOrigin "${env:FRONTEND_ORIGIN}" `
            -ApiPublicUrl "${env:API_PUBLIC_URL}" `
            -ReportOutputPath "${{ runner.temp }}/azure-runtime-verify.json"

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: azure-runtime-verify
          path: ${{ runner.temp }}/azure-runtime-verify.json
          retention-days: 7
