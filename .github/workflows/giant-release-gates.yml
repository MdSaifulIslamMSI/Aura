name: Giant Release Gates

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
  STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL || vars.STAGING_BASE_URL }}
  STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
  STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
  STAGING_SSM_PREFIX: /aura/staging
  SMOKE_TARGET_ENV: staging
  SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
  SMOKE_REQUIRE_BACKEND_STAGING: "true"
  SMOKE_FORBID_PRODUCTION_ORIGINS: "true"
  PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
  PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
  PROD_HEALTH_URL: ${{ vars.PROD_HEALTH_URL || vars.PROD_API_BASE_URL }}
  PROD_SSM_PREFIX: /aura/prod
  AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
  ROLLBACK_ARTIFACT_URI: ${{ vars.ROLLBACK_ARTIFACT_URI }}
  ROLLBACK_TARGET_SHA: ${{ vars.ROLLBACK_TARGET_SHA || github.event.pull_request.base.sha || github.sha }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm --prefix server ci
      - run: npm test

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run security:secrets
      - run: npm run security:maturity

  smoke-staging:
    name: smoke:staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Assert staging AWS role is configured
        run: test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
      - name: Configure staging read role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-giant-release-staging-smoke
          mask-aws-account-id: true
          unset-current-credentials: true
      - run: npm run staging:state:refresh
      - run: npm run smoke:staging
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: staging-smoke-evidence
          path: artifacts/release-gates/
          if-no-files-found: ignore
          retention-days: 14

  smoke-staging-frontend:
    name: smoke:staging:frontend
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Assert staging AWS role is configured
        run: test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
      - name: Configure staging read role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-giant-release-frontend-smoke
          mask-aws-account-id: true
          unset-current-credentials: true
      - run: npm run staging:state:refresh
      - run: npm run smoke:staging:frontend

  smoke-env-contract:
    name: smoke:env-contract
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Assert staging AWS role is configured
        run: test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
      - name: Configure staging read role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-giant-release-env-contract
          mask-aws-account-id: true
          unset-current-credentials: true
      - run: npm run staging:state:refresh
      - run: npm run smoke:env-contract
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: env-contract-evidence
          path: artifacts/release-gates/
          if-no-files-found: ignore
          retention-days: 14

  aws-cost-guard:
    name: aws:cost-guard
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Assert staging AWS role is configured
        run: test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
      - name: Configure staging read role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-giant-release-cost-guard
          mask-aws-account-id: true
          unset-current-credentials: true
      - run: npm run aws:cost-guard
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cost-guard-evidence
          path: artifacts/release-gates/
          if-no-files-found: ignore
          retention-days: 14

  aws-observability-guard:
    name: aws:observability:guard
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Assert staging AWS role is configured
        run: test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
      - name: Configure staging read role
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-giant-release-observability
          mask-aws-account-id: true
          unset-current-credentials: true
      - run: npm run aws:observability:guard

  release-rollback-ready:
    name: release:rollback-ready
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_AWS_DEPLOY_ROLE_ARN: ${{ vars.STAGING_AWS_DEPLOY_ROLE_ARN || secrets.STAGING_AWS_DEPLOY_ROLE_ARN || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Assert staging AWS role is configured
        run: test -n "${STAGING_AWS_DEPLOY_ROLE_ARN}" || { echo "Missing STAGING_AWS_DEPLOY_ROLE_ARN."; exit 1; }
      - name: Configure staging read role for optional S3 rollback proof
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.STAGING_AWS_DEPLOY_ROLE_ARN }}
          role-session-name: aura-giant-release-rollback-ready
          mask-aws-account-id: true
          unset-current-credentials: true
      - run: npm run release:rollback-ready
