name: Deploy Gateway To Vercel

on:
  pull_request:
    branches: ["main"]
    paths:
      - "gateway/**"
      - ".github/workflows/deploy-gateway-vercel.yml"
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: false
        default: production
        type: choice
        options:
          - preview
          - production
  workflow_call:
    inputs:
      target:
        description: Deployment target
        required: false
        default: production
        type: string
      parent_holds_production_lock:
        description: Internal only; the reusable-workflow caller already owns the shared production mutation lock
        required: false
        default: false
        type: boolean
    outputs:
      gateway_rollback_ref:
        description: Vercel gateway deployment that was live before this release
        value: ${{ jobs.deploy-production.outputs.rollback_ref }}
      deployment_attempted:
        description: Whether the production alias mutation was attempted
        value: ${{ jobs.deploy-production.outputs.deployment_attempted }}
    secrets:
      VERCEL_TOKEN:
        required: false

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ inputs.target == 'production' && inputs.parent_holds_production_lock == true && format('aura-production-parent-{0}-gateway', github.run_id) || inputs.target == 'production' && 'aura-production-mutation' || format('gateway-vercel-{0}', github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref) }}
  cancel-in-progress: ${{ inputs.target != 'production' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x
  VERCEL_SCOPE: mdsaifulislammsis-projects
  VERCEL_GATEWAY_PROJECT_NAME: aura-gateway
  VERCEL_GATEWAY_ALIAS: aura-gateway.vercel.app

jobs:
  deploy-preview:
    if: (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]') || inputs.target == 'preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      inspect_url: ${{ steps.deploy.outputs.inspect_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate gateway deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "${VERCEL_TOKEN}" || { echo "Missing GitHub secret VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_SCOPE}" || { echo "Missing gateway scope"; exit 1; }
          test -n "${VERCEL_GATEWAY_PROJECT_NAME}" || { echo "Missing gateway project name"; exit 1; }
          test -n "${VERCEL_GATEWAY_ALIAS}" || { echo "Missing gateway production alias"; exit 1; }

      - name: Link gateway project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel link \
            --cwd gateway \
            --yes \
            --project "${VERCEL_GATEWAY_PROJECT_NAME}" \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}"

      - name: Publish preview deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_LOG="${RUNNER_TEMP}/gateway-preview.log"
          npx vercel deploy \
            --cwd gateway \
            --yes \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}" \
            > "${DEPLOY_LOG}" 2>&1
          DEPLOY_LOG="${DEPLOY_LOG}" node <<'EOF'
          const fs = require('fs');
          const log = fs.readFileSync(process.env.DEPLOY_LOG, 'utf8');
          const preview = log.match(/Preview:\s+(https:\/\/\S+)/)
            || log.match(/(https:\/\/[-A-Za-z0-9.]+\.vercel\.app)\b/);
          const inspect = log.match(/Inspect:\s+(https:\/\/\S+)/);
          if (!preview) {
            process.stderr.write(log);
            throw new Error('Vercel CLI did not return a preview deployment URL.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_url=${preview[1]}\n`);
          if (inspect) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `inspect_url=${inspect[1]}\n`);
          }
          EOF

      - name: Add preview to job summary
        run: |
          {
            echo "### Gateway Vercel Preview"
            echo
            echo "- Project: ${VERCEL_GATEWAY_PROJECT_NAME}"
            echo "- Preview: ${{ steps.deploy.outputs.deploy_url }}"
            if [ -n "${{ steps.deploy.outputs.inspect_url }}" ]; then
              echo "- Inspect: ${{ steps.deploy.outputs.inspect_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          INSPECT_URL: ${{ steps.deploy.outputs.inspect_url }}
          PROJECT_NAME: ${{ env.VERCEL_GATEWAY_PROJECT_NAME }}
        with:
          script: |
            const marker = '<!-- aura-gateway-vercel-preview -->';
            const body = [
              marker,
              `Gateway Vercel preview for \`${process.env.PROJECT_NAME}\` is ready.`,
              `Preview URL: ${process.env.DEPLOY_URL}`,
              process.env.INSPECT_URL ? `Inspect URL: ${process.env.INSPECT_URL}` : '',
            ].filter(Boolean).join('\n\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy-production:
    if: inputs.target == 'production'
    runs-on: ubuntu-latest
    # Leave deterministic headroom for the bounded deploy plus in-job restore.
    timeout-minutes: 60
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      inspect_url: ${{ steps.deploy.outputs.inspect_url }}
      rollback_ref: ${{ steps.rollback_target.outputs.ref }}
      deployment_attempted: ${{ steps.mutation.outputs.attempted }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate gateway deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "${VERCEL_TOKEN}" || { echo "Missing GitHub secret VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_SCOPE}" || { echo "Missing gateway scope"; exit 1; }
          test -n "${VERCEL_GATEWAY_PROJECT_NAME}" || { echo "Missing gateway project name"; exit 1; }

      - name: Link gateway project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel link \
            --cwd gateway \
            --yes \
            --project "${VERCEL_GATEWAY_PROJECT_NAME}" \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}"

      - name: Capture current production gateway deployment
        id: rollback_target
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          linked_project="gateway/.vercel/project.json"
          alias_state="$(mktemp)"
          linked_project_id="$(jq -r '.projectId // empty' "${linked_project}")"
          linked_org_id="$(jq -r '.orgId // empty' "${linked_project}")"
          test -n "${linked_project_id}" || { echo "Linked gateway project id is missing." >&2; exit 1; }
          test -n "${linked_org_id}" || { echo "Linked gateway org id is missing." >&2; exit 1; }

          sanitized_vercel_token="$(printf '%s' "${VERCEL_TOKEN}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          test -n "${sanitized_vercel_token}" || { echo "Vercel token is empty after trimming whitespace." >&2; exit 1; }
          echo "::add-mask::${sanitized_vercel_token}"

          curl --fail --show-error --silent --location --get \
            --header "Authorization: Bearer ${sanitized_vercel_token}" \
            --data-urlencode "projectId=${linked_project_id}" \
            --data-urlencode "teamId=${linked_org_id}" \
            "https://api.vercel.com/v4/aliases/${VERCEL_GATEWAY_ALIAS}" \
            > "${alias_state}"

          rollback_ref="$(jq -r '.deploymentId // .deployment.id // empty' "${alias_state}")"
          alias_project_id="$(jq -r '.projectId // empty' "${alias_state}")"
          test -n "${rollback_ref}" || { echo "Gateway production alias has no deployment to restore." >&2; exit 1; }
          test "${alias_project_id}" = "${linked_project_id}" || {
            echo "Gateway production alias belongs to an unexpected Vercel project." >&2
            exit 1
          }
          echo "ref=${rollback_ref}" >> "$GITHUB_OUTPUT"

      - name: Mark gateway production mutation attempt
        id: mutation
        run: echo "attempted=true" >> "$GITHUB_OUTPUT"

      - name: Publish production deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_LOG="${RUNNER_TEMP}/gateway-production.log"
          timeout --signal=TERM --kill-after=30s 30m npx vercel deploy \
            --cwd gateway \
            --prod \
            --yes \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}" \
            > "${DEPLOY_LOG}" 2>&1
          DEPLOY_LOG="${DEPLOY_LOG}" node <<'EOF'
          const fs = require('fs');
          const log = fs.readFileSync(process.env.DEPLOY_LOG, 'utf8');
          const production = log.match(/Production:\s+(https:\/\/\S+)/);
          const preview = log.match(/Preview:\s+(https:\/\/\S+)/);
          const vercelApp = log.match(/(https:\/\/[-A-Za-z0-9.]+\.vercel\.app)\b/);
          const inspect = log.match(/Inspect:\s+(https:\/\/\S+)/);
          const deployUrl = (production && production[1]) || (preview && preview[1]) || (vercelApp && vercelApp[1]) || '';
          if (!deployUrl) {
            process.stderr.write(log);
            throw new Error('Vercel CLI did not return a production deployment URL.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_url=${deployUrl}\n`);
          if (inspect) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `inspect_url=${inspect[1]}\n`);
          }
          EOF

      - name: Verify public gateway domain
        run: |
          set -euo pipefail
          curl --fail --location --max-time 20 "https://${VERCEL_GATEWAY_ALIAS}" >/dev/null

      - name: Restore previous gateway after a failed production mutation
        if: failure() && steps.mutation.outputs.attempted == 'true' && steps.rollback_target.outputs.ref != ''
        env:
          ROLLBACK_REF: ${{ steps.rollback_target.outputs.ref }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ env.VERCEL_SCOPE }}
          VERCEL_GATEWAY_PROJECT_NAME: ${{ env.VERCEL_GATEWAY_PROJECT_NAME }}
          GATEWAY_PRODUCTION_URL: https://${{ env.VERCEL_GATEWAY_ALIAS }}
        run: bash scripts/rollback-gateway-vercel.sh

      - name: Add production deploy to job summary
        run: |
          {
            echo "### Gateway Vercel Production"
            echo
            echo "- Project: ${VERCEL_GATEWAY_PROJECT_NAME}"
            echo "- Deploy URL: ${{ steps.deploy.outputs.deploy_url }}"
            echo "- Public Gateway: https://${VERCEL_GATEWAY_ALIAS}"
            if [ -n "${{ steps.deploy.outputs.inspect_url }}" ]; then
              echo "- Inspect: ${{ steps.deploy.outputs.inspect_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
