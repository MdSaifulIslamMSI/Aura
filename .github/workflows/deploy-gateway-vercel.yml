name: Deploy Gateway To Vercel

on:
  pull_request:
    branches: ["main"]
    paths:
      - "gateway/**"
      - ".github/workflows/deploy-gateway-vercel.yml"
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: false
        default: production
        type: choice
        options:
          - preview
          - production
  workflow_call:
    inputs:
      target:
        description: Deployment target
        required: false
        default: production
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: gateway-vercel-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x
  VERCEL_SCOPE: mdsaifulislammsis-projects
  VERCEL_GATEWAY_PROJECT_NAME: general
  VERCEL_GATEWAY_ALIAS: aura-gateway.vercel.app

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' || inputs.target == 'preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      inspect_url: ${{ steps.deploy.outputs.inspect_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate gateway deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "${VERCEL_TOKEN}" || { echo "Missing GitHub secret VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_SCOPE}" || { echo "Missing gateway scope"; exit 1; }
          test -n "${VERCEL_GATEWAY_PROJECT_NAME}" || { echo "Missing gateway project name"; exit 1; }
          test -n "${VERCEL_GATEWAY_ALIAS}" || { echo "Missing gateway production alias"; exit 1; }
          test -n "${VERCEL_GATEWAY_ALIAS}" || { echo "Missing gateway production alias"; exit 1; }

      - name: Link gateway project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel link \
            --cwd gateway \
            --yes \
            --project "${VERCEL_GATEWAY_PROJECT_NAME}" \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}"

      - name: Publish preview deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_LOG="${RUNNER_TEMP}/gateway-preview.log"
          npx vercel deploy \
            --cwd gateway \
            --yes \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}" \
            > "${DEPLOY_LOG}" 2>&1
          DEPLOY_LOG="${DEPLOY_LOG}" node <<'EOF'
          const fs = require('fs');
          const log = fs.readFileSync(process.env.DEPLOY_LOG, 'utf8');
          const preview = log.match(/Preview:\s+(https:\/\/\S+)/);
          const inspect = log.match(/Inspect:\s+(https:\/\/\S+)/);
          if (!preview) {
            throw new Error('Vercel CLI did not return a preview deployment URL.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_url=${preview[1]}\n`);
          if (inspect) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `inspect_url=${inspect[1]}\n`);
          }
          EOF

      - name: Add preview to job summary
        run: |
          {
            echo "### Gateway Vercel Preview"
            echo
            echo "- Project: ${VERCEL_GATEWAY_PROJECT_NAME}"
            echo "- Preview: ${{ steps.deploy.outputs.deploy_url }}"
            if [ -n "${{ steps.deploy.outputs.inspect_url }}" ]; then
              echo "- Inspect: ${{ steps.deploy.outputs.inspect_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          INSPECT_URL: ${{ steps.deploy.outputs.inspect_url }}
          PROJECT_NAME: ${{ env.VERCEL_GATEWAY_PROJECT_NAME }}
        with:
          script: |
            const marker = '<!-- aura-gateway-vercel-preview -->';
            const body = [
              marker,
              `Gateway Vercel preview for \`${process.env.PROJECT_NAME}\` is ready.`,
              `Preview URL: ${process.env.DEPLOY_URL}`,
              process.env.INSPECT_URL ? `Inspect URL: ${process.env.INSPECT_URL}` : '',
            ].filter(Boolean).join('\n\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy-production:
    if: inputs.target == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
      inspect_url: ${{ steps.deploy.outputs.inspect_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate gateway deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "${VERCEL_TOKEN}" || { echo "Missing GitHub secret VERCEL_TOKEN"; exit 1; }
          test -n "${VERCEL_SCOPE}" || { echo "Missing gateway scope"; exit 1; }
          test -n "${VERCEL_GATEWAY_PROJECT_NAME}" || { echo "Missing gateway project name"; exit 1; }

      - name: Link gateway project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel link \
            --cwd gateway \
            --yes \
            --project "${VERCEL_GATEWAY_PROJECT_NAME}" \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}"

      - name: Publish production deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          DEPLOY_LOG="${RUNNER_TEMP}/gateway-production.log"
          npx vercel deploy \
            --cwd gateway \
            --prod \
            --yes \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}" \
            > "${DEPLOY_LOG}" 2>&1
          DEPLOY_LOG="${DEPLOY_LOG}" node <<'EOF'
          const fs = require('fs');
          const log = fs.readFileSync(process.env.DEPLOY_LOG, 'utf8');
          const production = log.match(/Production:\s+(https:\/\/\S+)/);
          const preview = log.match(/Preview:\s+(https:\/\/\S+)/);
          const inspect = log.match(/Inspect:\s+(https:\/\/\S+)/);
          const deployUrl = (production && production[1]) || (preview && preview[1]) || '';
          if (!deployUrl) {
            throw new Error('Vercel CLI did not return a production deployment URL.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deploy_url=${deployUrl}\n`);
          if (inspect) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `inspect_url=${inspect[1]}\n`);
          }
          EOF

      - name: Point production alias at latest deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel alias set \
            "${{ steps.deploy.outputs.deploy_url }}" \
            "${VERCEL_GATEWAY_ALIAS}" \
            --scope "${VERCEL_SCOPE}" \
            --token "${VERCEL_TOKEN}"

      - name: Add production deploy to job summary
        run: |
          {
            echo "### Gateway Vercel Production"
            echo
            echo "- Project: ${VERCEL_GATEWAY_PROJECT_NAME}"
            echo "- Deploy URL: ${{ steps.deploy.outputs.deploy_url }}"
            echo "- Production Alias: https://${VERCEL_GATEWAY_ALIAS}"
            if [ -n "${{ steps.deploy.outputs.inspect_url }}" ]; then
              echo "- Inspect: ${{ steps.deploy.outputs.inspect_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
