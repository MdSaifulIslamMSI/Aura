name: Performance Nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TARGET_URL: ${{ vars.PERF_BASE_URL || vars.STAGING_BASE_URL || '' }}
      PERF_ALLOW_PRODUCTION: ${{ vars.PERF_ALLOW_PRODUCTION || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Guard target
        shell: bash
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "No PERF_BASE_URL or STAGING_BASE_URL configured; skipping nightly performance run."
            exit 0
          fi
          if echo "$TARGET_URL" | grep -Eiq '(^https://)?(www\.)?(prod|production)\.' && [ "$PERF_ALLOW_PRODUCTION" != "true" ]; then
            echo "Refusing to run nightly performance tests against a production-looking target without PERF_ALLOW_PRODUCTION=true."
            exit 1
          fi

      - name: Setup k6
        if: ${{ env.TARGET_URL != '' }}
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1

      - name: Stress test
        if: ${{ env.TARGET_URL != '' }}
        run: npm run perf:stress
        env:
          PERF_BASE_URL: ${{ env.TARGET_URL }}
          PERF_API_BASE_URL: ${{ env.TARGET_URL }}
          PERF_P95_MS: ${{ vars.PERF_P95_MS || '500' }}
          PERF_ERROR_RATE: ${{ vars.PERF_ERROR_RATE || '0.01' }}

      - name: Spike test
        if: ${{ env.TARGET_URL != '' }}
        run: node scripts/performance/run-k6.mjs spike
        env:
          PERF_BASE_URL: ${{ env.TARGET_URL }}
          PERF_API_BASE_URL: ${{ env.TARGET_URL }}
          PERF_P95_MS: ${{ vars.PERF_P95_MS || '500' }}
          PERF_ERROR_RATE: ${{ vars.PERF_ERROR_RATE || '0.01' }}
