name: Post-Quantum Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: post-quantum-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pqc-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate crypto inventory
        run: npm run security:pqc:inventory

      - name: Upload crypto inventory
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pqc-crypto-inventory
          path: |
            reports/security/crypto-inventory.json
            reports/security/crypto-inventory.md
          retention-days: 14

  pqc-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PQC policy check
        run: npm run security:pqc:policy

      - name: Upload PQC policy reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pqc-policy-reports
          path: |
            reports/security/crypto-inventory.json
            reports/security/crypto-inventory.md
            reports/security/pqc-policy-check.json
            reports/security/pqc-policy-check.md
          retention-days: 14

  pqc-deployment-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate controllable-surface PQC deployment proof
        run: npm run security:pqc:proof:strict

      - name: Generate PQC maturity scorecard
        run: npm run security:pqc:scorecard:strict

      - name: Verify provider dependency register
        run: npm run security:pqc:provider-register

      - name: Generate real-target PQC proof envelope
        run: npm run security:pqc:real-target

      - name: Upload PQC deployment proof reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pqc-deployment-proof-reports
          path: |
            reports/security/pqc-deployment-proof.json
            reports/security/pqc-deployment-proof.md
            reports/security/ssh-pqc-readiness.json
            reports/security/ssh-pqc-readiness.md
            reports/security/ssh-pqc-environment-proof.json
            reports/security/ssh-pqc-environment-proof.md
            reports/security/tls-config-readiness.json
            reports/security/tls-config-readiness.md
            reports/security/tls-endpoint-pqc-readiness.json
            reports/security/tls-endpoint-pqc-readiness.md
            reports/security/pqc-lab-smoke.json
            reports/security/pqc-lab-smoke.md
            reports/security/pqc-lab-benchmark.json
            reports/security/pqc-lab-benchmark.md
            reports/security/internal-service-encryption-check.json
            reports/security/internal-service-encryption-check.md
            reports/security/internal-service-encryption-evidence.json
            reports/security/internal-service-encryption-evidence.md
            reports/security/backup-crypto-agility-check.json
            reports/security/backup-crypto-agility-check.md
            reports/security/backup-pqc-encryption-evidence.json
            reports/security/backup-pqc-encryption-evidence.md
            reports/security/release-signing-readiness.json
            reports/security/release-signing-readiness.md
            reports/security/pqc-provider-register-check.json
            reports/security/pqc-provider-register-check.md
            reports/security/pqc-real-target-proof.json
            reports/security/pqc-real-target-proof.md
            reports/security/pqc-maturity-scorecard.json
            reports/security/pqc-maturity-scorecard.md
          if-no-files-found: error
          retention-days: 14

  semgrep-pqc:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare report directory
        run: mkdir -p reports/security

      - name: Install Semgrep CE
        id: semgrep-install
        continue-on-error: true
        run: python -m pip install --user semgrep

      - name: Run Semgrep PQC rules
        if: steps.semgrep-install.outcome == 'success'
        continue-on-error: true
        run: python -m semgrep scan --config security/semgrep/pqc-crypto-policy.yml --sarif --output reports/security/semgrep-pqc.sarif .

      - name: Note Semgrep unavailable
        if: steps.semgrep-install.outcome != 'success'
        run: echo "Semgrep CE was not installable in this runner; npm run security:pqc still enforces blocker policy."

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('reports/security/semgrep-pqc.sarif') != ''
        with:
          sarif_file: reports/security/semgrep-pqc.sarif
          category: semgrep-pqc

      - name: Upload Semgrep artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pqc-semgrep
          path: reports/security/semgrep-pqc.sarif
          if-no-files-found: ignore
          retention-days: 14
