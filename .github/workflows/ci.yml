name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  artifact-guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Guard committed runtime/test artifacts
        run: node server/scripts/ci-guard-artifacts.js

  backend-regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: '6.0'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Regression Suite
        run: >
          npx jest --runInBand --runTestsByPath
          tests/authMiddleware.test.js
          tests/profileSecurity.test.js
          tests/otpSystem.test.js
          tests/otpEmailFailClosed.test.js
          tests/paymentOrderIntegrity.test.js
          tests/userPhoneIndex.test.js
          tests/orderControllerCreate.test.js
          tests/communicationUtilities.test.js
          tests/communicationServices.test.js
          tests/adminUserControllerResilience.test.js
          tests/adminUserRoutes.integration.test.js
          tests/paymentSecurityGuards.test.js
          tests/adminProductRoutes.integration.test.js
          tests/paymentRefundState.test.js
          tests/adminPaymentRoutes.integration.test.js
          tests/adminAnalyticsRoutes.integration.test.js
          tests/adminNotificationRoutes.integration.test.js
          tests/aiRoutes.test.js
          tests/healthRoutes.test.js
          tests/commerceAssistantService.test.js
          tests/geminiGatewayService.test.js
          tests/modelGatewayService.test.js
          tests/ollamaGatewayService.test.js
          tests/runtimeConfig.test.js
        env:
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_ci
          TEST_USE_IN_MEMORY_MONGO: 'false'
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: 'false'
          NODE_ENV: test

  backend-coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: '6.0'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Coverage Regression Suite
        run: >
          npx jest --runInBand --coverage --runTestsByPath
          tests/authMiddleware.test.js
          tests/profileSecurity.test.js
          tests/otpSystem.test.js
          tests/otpEmailFailClosed.test.js
          tests/paymentOrderIntegrity.test.js
          tests/userPhoneIndex.test.js
          tests/orderControllerCreate.test.js
          tests/communicationUtilities.test.js
          tests/communicationServices.test.js
          tests/adminUserControllerResilience.test.js
          tests/adminUserRoutes.integration.test.js
          tests/paymentSecurityGuards.test.js
          tests/adminProductRoutes.integration.test.js
          tests/paymentRefundState.test.js
          tests/adminPaymentRoutes.integration.test.js
          tests/adminAnalyticsRoutes.integration.test.js
          tests/adminNotificationRoutes.integration.test.js
          tests/aiRoutes.test.js
          tests/healthRoutes.test.js
          tests/commerceAssistantService.test.js
          tests/geminiGatewayService.test.js
          tests/modelGatewayService.test.js
          tests/ollamaGatewayService.test.js
          tests/runtimeConfig.test.js
        env:
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_ci
          TEST_USE_IN_MEMORY_MONGO: 'false'
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: 'false'
          NODE_ENV: test

  azure-runtime-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Audit Key Vault secret coverage
        run: node server/scripts/audit_keyvault_secret_contract.js

      - name: Validate Azure runtime templates with the current env contract
        shell: pwsh
        run: |
          & ".\\infra\\azure\\sync-containerapps-runtime.ps1" `
            -SourceEnvFile ".\\server\\.env.azure-secrets.example" `
            -DryRun `
            -PlanOutputPath "${{ runner.temp }}\\azure-runtime-plan.json"

      - name: Upload Azure runtime plan
        uses: actions/upload-artifact@v4
        with:
          name: azure-runtime-plan
          path: ${{ runner.temp }}/azure-runtime-plan.json
          retention-days: 7

  backend-container-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Build backend container image
        run: docker build --file server/Dockerfile --tag aura-backend-ci ./server

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Run Component Tests
        run: npm test

      - name: Verify Build
        run: npm run build

      - name: Enforce Bundle Budgets
        run: npm run bundle:budget

  frontend-e2e:
    # Run E2E only on direct pushes to main to conserve CI minutes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: '6.0'

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: 'true'
          PAYMENTS_ENABLED: 'false'
          PAYMENT_WEBHOOKS_ENABLED: 'false'
          PAYMENT_PROVIDER: 'disabled'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

