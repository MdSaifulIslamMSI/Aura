name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "server/**"
      - "infra/aws/bootstrap-instance-user-data.sh"
      - "infra/aws/deploy-release.sh"
      - "infra/aws/docker-compose.ec2.yml"
      - "infra/aws/render-runtime-secrets.sh"
      - ".github/workflows/**"
      - "vercel.json"
      - "app/vercel.json"
      - ".vercelignore"
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "server/**"
      - "infra/aws/bootstrap-instance-user-data.sh"
      - "infra/aws/deploy-release.sh"
      - "infra/aws/docker-compose.ec2.yml"
      - "infra/aws/render-runtime-secrets.sh"
      - ".github/workflows/**"
      - "vercel.json"
      - "app/vercel.json"
      - ".vercelignore"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.backend || steps.filter.outputs.backend }}
      frontend: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.frontend || steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0

      - name: Mark all surfaces changed for manual runs
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed surfaces
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'server/**'
              - 'infra/aws/bootstrap-instance-user-data.sh'
              - 'infra/aws/deploy-release.sh'
              - 'infra/aws/docker-compose.ec2.yml'
              - 'infra/aws/render-runtime-secrets.sh'
              - '.github/workflows/**'
            frontend:
              - 'app/**'
              - 'vercel.json'
              - 'app/vercel.json'
              - '.vercelignore'
              - '.github/workflows/**'

  artifact-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Guard committed runtime/test artifacts
        run: node server/scripts/ci-guard-artifacts.js

  backend-regression:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install dependencies
        run: npm ci

      - name: Run backend regression suite
        run: >
          npx jest --runInBand --runTestsByPath
          tests/authMiddleware.test.js
          tests/profileSecurity.test.js
          tests/otpSystem.test.js
          tests/otpEmailFailClosed.test.js
          tests/paymentOrderIntegrity.test.js
          tests/userPhoneIndex.test.js
          tests/orderControllerCreate.test.js
          tests/communicationUtilities.test.js
          tests/communicationServices.test.js
          tests/adminUserControllerResilience.test.js
          tests/adminUserRoutes.integration.test.js
          tests/paymentSecurityGuards.test.js
          tests/adminProductRoutes.integration.test.js
          tests/paymentRefundState.test.js
          tests/adminPaymentRoutes.integration.test.js
          tests/adminAnalyticsRoutes.integration.test.js
          tests/adminNotificationRoutes.integration.test.js
          tests/aiRoutes.test.js
          tests/healthRoutes.test.js
          tests/commerceAssistantService.test.js
          tests/geminiGatewayService.test.js
          tests/modelGatewayService.test.js
          tests/ollamaGatewayService.test.js
          tests/runtimeConfig.test.js
        env:
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_ci
          TEST_USE_IN_MEMORY_MONGO: "false"
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
          NODE_ENV: test
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

  aws-runtime-contract:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit AWS runtime + secret contract
        run: node server/scripts/audit_parameter_store_secret_contract.js

  backend-container-smoke:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Build backend container image
        run: docker build --file server/Dockerfile --tag aura-backend-ci ./server

  frontend-quality:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run component tests
        run: npm test

      - name: Verify build
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run bundle:budget

  frontend-e2e:
    needs:
      - changes
      - frontend-quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies for E2E server
        working-directory: ./server
        run: npm ci

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          PAYMENTS_ENABLED: "false"
          PAYMENT_WEBHOOKS_ENABLED: "false"
          PAYMENT_PROVIDER: "disabled"
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
