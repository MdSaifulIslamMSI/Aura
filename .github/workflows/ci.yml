name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "desktop/**"
      - "gateway/**"
      - "netlify.toml"
      - ".netlifyignore"
      - "server/**"
      - "scripts/security-*.mjs"
      - "scripts/post-merge-security-smoke.mjs"
      - "scripts/validate-env-contract.mjs"
      - "scripts/smoke-preflight.mjs"
      - "scripts/scan-prod-fallbacks.mjs"
      - "scripts/env-contract-lib.mjs"
      - "scripts/duo-activate.mjs"
      - "scripts/cloudflare-free-security-activate.mjs"
      - "scripts/smoke-origin-protection.mjs"
      - "scripts/smoke-production-login.mjs"
      - "scripts/validate-edge-security-assets.mjs"
      - "scripts/validate-upload-malware-runtime.mjs"
      - "scripts/validate-login-*.mjs"
      - "scripts/run-auth-*.js"
      - "scripts/auth-runner.js"
      - "scripts/auth/**"
      - "scripts/classify-auth-change-risk.js"
      - "scripts/count-auth-combinations.js"
      - "tests/auth/**"
      - "docs/auth/**"
      - "docs/*security*.md"
      - "docs/ci-cd.md"
      - "docs/critical-invariants.md"
      - "docs/emergency-controls.md"
      - "docs/login-staging-production-activation.md"
      - "docs/environment-contract.md"
      - "docs/staging-bootstrap.md"
      - "docs/staging-readiness-inventory.md"
      - "docs/privileged-access-management.md"
      - "SECURITY_TEST_PLAN.md"
      - "security_best_practices_report.md"
      - ".gitleaks.toml"
      - "security-audit-exceptions.json"
      - "infra/cloudflare/**"
      - "infra/edge/**"
      - "infra/observability/**"
      - "infra/security/**"
      - "infra/auth/**"
      - "infra/opentofu/**"
      - "k8s/**"
      - "charts/**"
      - "gitops/**"
      - "observability/**"
      - "docker-compose.split-runtime.yml"
      - "docker-compose.yml"
      - "docker-compose.observability.yml"
      - "Dockerfile"
      - "Makefile"
      - "config/environments/**"
      - "config/auth.example.env"
      - "docs/desktop-app.md"
      - "infra/aws/bootstrap-instance-user-data.sh"
      - "infra/aws/deploy-release.sh"
      - "infra/aws/docker-compose.ec2.yml"
      - "infra/aws/render-runtime-secrets.sh"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
      - "app/vercel.json"
      - "gateway/vercel.json"
      - ".vercelignore"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.backend || steps.filter.outputs.backend }}
      desktop: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.desktop || steps.filter.outputs.desktop }}
      frontend: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.frontend || steps.filter.outputs.frontend }}
      gateway: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.gateway || steps.filter.outputs.gateway }}

    steps:
      - uses: actions/checkout@v6
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call'
        with:
          fetch-depth: 0

      - name: Mark all surfaces changed for manual runs
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        id: manual
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "desktop=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"
          echo "gateway=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed surfaces
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call'
        id: filter
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          backend=false
          desktop=false
          frontend=false
          gateway=false

          if ! changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"; then
            echo "Primary diff failed; falling back to the checked out PR range."
            changed_files="$(git diff --name-only "origin/${GITHUB_BASE_REF:-main}"...HEAD)"
          fi

          echo "Changed files:"
          if [ -n "${changed_files}" ]; then
            printf '%s\n' "${changed_files}"
          else
            echo "(none)"
          fi

          while IFS= read -r file; do
            [ -z "${file}" ] && continue

            case "${file}" in
              .github/workflows/*)
                backend=true
                desktop=true
                frontend=true
                gateway=true
                ;;
            esac

            case "${file}" in
              server/*)
                backend=true
                ;;
              scripts/security-*.mjs|scripts/post-merge-security-smoke.mjs|scripts/validate-env-contract.mjs|scripts/smoke-preflight.mjs)
                backend=true
                ;;
              scripts/scan-prod-fallbacks.mjs|scripts/env-contract-lib.mjs|scripts/duo-activate.mjs)
                backend=true
                ;;
              scripts/cloudflare-free-security-activate.mjs|scripts/smoke-origin-protection.mjs|scripts/smoke-production-login.mjs)
                backend=true
                ;;
              scripts/validate-edge-security-assets.mjs|scripts/validate-upload-malware-runtime.mjs|scripts/validate-login-*.mjs)
                backend=true
                ;;
              scripts/run-auth-*.js|scripts/auth-runner.js|scripts/auth/*|scripts/classify-auth-change-risk.js|scripts/count-auth-combinations.js)
                backend=true
                ;;
              tests/auth/*|docs/auth/*)
                backend=true
                ;;
              docs/*security*.md|docs/ci-cd.md|docs/critical-invariants.md|docs/emergency-controls.md)
                backend=true
                ;;
              docs/login-staging-production-activation.md|docs/environment-contract.md|docs/staging-bootstrap.md)
                backend=true
                ;;
              docs/staging-readiness-inventory.md|docs/privileged-access-management.md)
                backend=true
                ;;
              SECURITY_TEST_PLAN.md|security_best_practices_report.md|.gitleaks.toml|security-audit-exceptions.json)
                backend=true
                ;;
              infra/cloudflare/*|infra/edge/*|infra/observability/*|infra/security/*|infra/auth/*|infra/opentofu/*)
                backend=true
                ;;
              k8s/*|charts/*|gitops/*|observability/*)
                backend=true
                ;;
              docker-compose.split-runtime.yml|docker-compose.yml|docker-compose.observability.yml|Dockerfile|Makefile)
                backend=true
                ;;
              config/environments/*|config/auth.example.env)
                backend=true
                ;;
              infra/aws/bootstrap-instance-user-data.sh|infra/aws/deploy-release.sh|infra/aws/docker-compose.ec2.yml|infra/aws/render-runtime-secrets.sh)
                backend=true
                ;;
            esac

            case "${file}" in
              app/*|desktop/*|docs/desktop-app.md|package.json|package-lock.json)
                desktop=true
                ;;
            esac

            case "${file}" in
              app/*|netlify.toml|.netlifyignore|vercel.json|app/vercel.json|.vercelignore)
                frontend=true
                ;;
            esac

            case "${file}" in
              gateway/*)
                gateway=true
                ;;
            esac
          done <<< "${changed_files}"

          {
            echo "backend=${backend}"
            echo "desktop=${desktop}"
            echo "frontend=${frontend}"
            echo "gateway=${gateway}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Changed surfaces"
            echo "- backend: ${backend}"
            echo "- desktop: ${desktop}"
            echo "- frontend: ${frontend}"
            echo "- gateway: ${gateway}"
          } >> "$GITHUB_STEP_SUMMARY"

  artifact-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Guard committed runtime/test artifacts
        run: node server/scripts/ci-guard-artifacts.js

      - name: Guard production hardening contract
        run: node server/scripts/audit_production_hardening_contract.js

      - name: Validate environment contract
        run: npm run env:validate

      - name: Run smoke preflight without live target
        run: npm run smoke:preflight

      - name: Scan for unsafe production fallbacks
        run: npm run scan:prod-fallbacks

  backend-regression:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install dependencies
        run: npm ci

      - name: Run assistant query-quality eval
        run: npm run assistant:eval:query-quality
        env:
          NODE_ENV: test

      - name: Run backend regression suite
        run: >
          npx jest --runInBand --runTestsByPath
          tests/authMiddleware.test.js
          tests/profileSecurity.test.js
          tests/otpSystem.test.js
          tests/otpEmailFailClosed.test.js
          tests/paymentOrderIntegrity.test.js
          tests/userPhoneIndex.test.js
          tests/orderControllerCreate.test.js
          tests/communicationUtilities.test.js
          tests/communicationServices.test.js
          tests/adminUserControllerResilience.test.js
          tests/adminUserRoutes.integration.test.js
          tests/paymentSecurityGuards.test.js
          tests/adminProductRoutes.integration.test.js
          tests/paymentRefundState.test.js
          tests/adminPaymentRoutes.integration.test.js
          tests/adminAnalyticsRoutes.integration.test.js
          tests/adminNotificationRoutes.integration.test.js
          tests/aiRoutes.test.js
          tests/healthRoutes.test.js
          tests/healthReadinessService.test.js
          tests/adminFraudRoutes.test.js
          tests/fraudDecisioningService.test.js
          tests/marketplaceIntegrityService.test.js
          tests/orderPlacementService.test.js
          tests/commerceAssistantService.test.js
          tests/geminiGatewayService.test.js
          tests/modelGatewayService.test.js
          tests/ollamaGatewayService.test.js
          tests/runtimeConfig.test.js
          tests/stagingSmokeSafety.test.js
          tests/envContractScripts.test.js
        env:
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_ci
          TEST_USE_IN_MEMORY_MONGO: "false"
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
          NODE_ENV: test
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

  aws-runtime-contract:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit AWS runtime + secret contract
        run: node server/scripts/audit_parameter_store_secret_contract.js

  login-security-gates:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
            server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Run login security gates
        run: npm run security:login-gates
        env:
          NODE_ENV: test
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_login_security_ci
          TEST_USE_IN_MEMORY_MONGO: "false"
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

  security-verification:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
            server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Cloudflare security readiness gate
        run: npm run security:cloudflare
        env:
          NODE_ENV: test

      - name: Run production-grade security verification suite
        run: npm run security:all
        env:
          NODE_ENV: test
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_security_ci
          TEST_USE_IN_MEMORY_MONGO: "false"
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379
          PAYMENTS_ENABLED: "true"
          PAYMENT_WEBHOOKS_ENABLED: "true"
          PAYMENT_PROVIDER: razorpay
          RAZORPAY_KEY_ID: rzp_test_fake_key
          RAZORPAY_KEY_SECRET: fake-razorpay-key-secret
          RAZORPAY_WEBHOOK_SECRET: fake-razorpay-webhook-secret
          STRIPE_SECRET_KEY: sk_test_fake_security_suite
          STRIPE_WEBHOOK_SECRET: whsec_fake_security_suite

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: security-reports/
          retention-days: 14

  backend-container-smoke:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Build backend container image
        run: docker build --file server/Dockerfile --tag aura-backend-ci ./server

  frontend-quality:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run component tests
        run: npm test

      - name: Audit locale coverage
        run: npm run audit:locale

      - name: Audit locale quality
        run: npm run audit:locale:quality

      - name: Verify build
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run bundle:budget

  frontend-e2e:
    needs:
      - changes
      - frontend-quality
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies for E2E server
        working-directory: ./server
        run: npm ci

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Verify hosted Chrome for Playwright
        run: |
          google-chrome --version
          npx playwright --version

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          CI_DISABLE_PLAYWRIGHT_VIDEO: "true"
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
          PAYMENTS_ENABLED: "false"
          PAYMENT_WEBHOOKS_ENABLED: "false"
          PAYMENT_PROVIDER: "disabled"
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

  gateway-static:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Validate gateway download links
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('fs');
          const html = fs.readFileSync('gateway/index.html', 'utf8');
          const config = JSON.parse(fs.readFileSync('gateway/vercel.json', 'utf8'));
          const requiredAssets = [
            'Aura-Marketplace-Windows-x64-Setup.exe',
            'Aura-Marketplace-Windows-arm64-Setup.exe',
            'Aura-Marketplace-Windows-ia32-Setup.exe',
            'Aura-Marketplace-Windows-x64-Portable.exe',
            'Aura-Marketplace-macOS-arm64.dmg',
            'Aura-Marketplace-macOS-x64.dmg',
            'Aura-Marketplace-macOS-arm64.zip',
            'Aura-Marketplace-macOS-x64.zip',
            'Aura-Marketplace-Linux-x86_64.AppImage',
            'Aura-Marketplace-Linux-amd64.deb',
            'Aura-Marketplace-Linux-x86_64.rpm',
            'Aura-Marketplace-Linux-x64.tar.gz',
            'Aura-Marketplace-Linux-arm64.AppImage',
            'Aura-Marketplace-Linux-arm64.deb',
            'Aura-Marketplace-Linux-aarch64.rpm',
            'Aura-Marketplace-Linux-arm64.tar.gz',
          ];
          if (html.includes('/releases/latest/download/')) {
            throw new Error('Gateway must not link directly to latest/download assets before release resolution.');
          }
          for (const asset of requiredAssets) {
            if (!html.includes(`data-release-asset="${asset}"`)) {
              throw new Error(`Missing gateway download resolver asset: ${asset}`);
            }
          }
          for (const label of ['Ubuntu/Debian deb', 'Fedora/RHEL RPM', 'iPadOS PWA', 'ChromeOS', 'Unix / BSD', 'HarmonyOS', 'FreeRTOS / RTOS family', 'BOSS Linux family', 'Maya OS', 'Garuda Linux', 'BharOS, JioOS, and Indus', 'JioTele OS', 'watchOS', 'tvOS', 'Red Hat Enterprise Linux', 'VxWorks', 'Linux / GNU-Linux family', 'SUSE Linux Enterprise + openSUSE', 'Raspberry Pi OS', 'Sailfish OS', 'MINIX + RISC OS', 'Symbian OS', 'Mageia', 'Astra Linux, ALT Linux, RED OS, and ROSA Linux', 'Aurora OS', 'KasperskyOS', 'Elbrus Linux / Elbrus OS', 'Calculate Linux', 'KolibriOS + Phantom OS', 'HarmonyOS / Hongmeng OS + OpenHarmony', 'Kylin OS, Galaxy Kylin, UOS, and deepin Linux', 'openEuler, Anolis OS, and TencentOS Server', 'AliOS, AliOS Things, and RT-Thread']) {
            if (!html.includes(label)) {
              throw new Error(`Missing gateway platform availability label: ${label}`);
            }
          }
          if (config.outputDirectory !== '.') {
            throw new Error('gateway/vercel.json must deploy the static gateway root as outputDirectory ".".');
          }
          EOF

  desktop-package-smoke:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Build frontend for desktop packaging
        run: npm run desktop:frontend:build

      - name: Package Linux desktop directory smoke test
        run: npx electron-builder --linux dir --publish never

  devops-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Validate environment examples
        run: |
          npm run env:validate
          npm run env:validate:staging
          npm run env:validate:production

      - name: Validate observability assets
        run: npm run observability:validate

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Validate Kubernetes kustomize base
        run: kubectl kustomize k8s/base > /tmp/k8s-base.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint and render Helm chart
        run: |
          npm run helm:lint
          npm --silent run helm:template:staging > /tmp/helm-staging.yaml
          npm --silent run helm:template:production > /tmp/helm-production.yaml

      - name: Validate Kubernetes schemas with kubeconform
        run: |
          docker run --rm \
            -v /tmp:/manifests:ro \
            ghcr.io/yannh/kubeconform:v0.6.7 \
            -strict \
            -summary \
            -ignore-missing-schemas \
            /manifests/k8s-base.yaml \
            /manifests/helm-staging.yaml \
            /manifests/helm-production.yaml

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.8.8

      - name: Validate OpenTofu
        run: |
          npm run tofu:fmt
          tofu -chdir=infra/opentofu init -backend=false
          tofu -chdir=infra/opentofu validate
