name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - "desktop/**"
      - "gateway/**"
      - "netlify.toml"
      - ".netlifyignore"
      - "server/**"
      - "docs/desktop-app.md"
      - "infra/aws/bootstrap-instance-user-data.sh"
      - "infra/aws/deploy-release.sh"
      - "infra/aws/docker-compose.ec2.yml"
      - "infra/aws/render-runtime-secrets.sh"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "vercel.json"
      - "app/vercel.json"
      - "gateway/vercel.json"
      - ".vercelignore"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.backend || steps.filter.outputs.backend }}
      desktop: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.desktop || steps.filter.outputs.desktop }}
      frontend: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.frontend || steps.filter.outputs.frontend }}
      gateway: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && steps.manual.outputs.gateway || steps.filter.outputs.gateway }}

    steps:
      - uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call'
        with:
          fetch-depth: 0

      - name: Mark all surfaces changed for manual runs
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
        id: manual
        run: |
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "desktop=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"
          echo "gateway=true" >> "$GITHUB_OUTPUT"

      - name: Detect changed surfaces
        if: github.event_name != 'workflow_dispatch' && github.event_name != 'workflow_call'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'server/**'
              - 'infra/aws/bootstrap-instance-user-data.sh'
              - 'infra/aws/deploy-release.sh'
              - 'infra/aws/docker-compose.ec2.yml'
              - 'infra/aws/render-runtime-secrets.sh'
              - '.github/workflows/**'
            desktop:
              - 'app/**'
              - 'desktop/**'
              - 'docs/desktop-app.md'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
            frontend:
              - 'app/**'
              - 'netlify.toml'
              - '.netlifyignore'
              - 'vercel.json'
              - 'app/vercel.json'
              - '.vercelignore'
              - '.github/workflows/**'
            gateway:
              - 'gateway/**'
              - '.github/workflows/**'

  artifact-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Guard committed runtime/test artifacts
        run: node server/scripts/ci-guard-artifacts.js

  backend-regression:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install dependencies
        run: npm ci

      - name: Run backend regression suite
        run: >
          npx jest --runInBand --runTestsByPath
          tests/authMiddleware.test.js
          tests/profileSecurity.test.js
          tests/otpSystem.test.js
          tests/otpEmailFailClosed.test.js
          tests/paymentOrderIntegrity.test.js
          tests/userPhoneIndex.test.js
          tests/orderControllerCreate.test.js
          tests/communicationUtilities.test.js
          tests/communicationServices.test.js
          tests/adminUserControllerResilience.test.js
          tests/adminUserRoutes.integration.test.js
          tests/paymentSecurityGuards.test.js
          tests/adminProductRoutes.integration.test.js
          tests/paymentRefundState.test.js
          tests/adminPaymentRoutes.integration.test.js
          tests/adminAnalyticsRoutes.integration.test.js
          tests/adminNotificationRoutes.integration.test.js
          tests/aiRoutes.test.js
          tests/healthRoutes.test.js
          tests/commerceAssistantService.test.js
          tests/geminiGatewayService.test.js
          tests/modelGatewayService.test.js
          tests/ollamaGatewayService.test.js
          tests/runtimeConfig.test.js
        env:
          TEST_MONGO_URI: mongodb://127.0.0.1:27017/aura_ci
          TEST_USE_IN_MEMORY_MONGO: "false"
          TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
          NODE_ENV: test
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

  aws-runtime-contract:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit AWS runtime + secret contract
        run: node server/scripts/audit_parameter_store_secret_contract.js

  backend-container-smoke:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Build backend container image
        run: docker build --file server/Dockerfile --tag aura-backend-ci ./server

  frontend-quality:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run component tests
        run: npm test

      - name: Audit locale coverage
        run: npm run audit:locale

      - name: Verify build
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run bundle:budget

  frontend-e2e:
    needs:
      - changes
      - frontend-quality
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies for E2E server
        working-directory: ./server
        run: npm ci

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.0
        with:
          mongodb-version: "6.0"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          PAYMENTS_ENABLED: "false"
          PAYMENT_WEBHOOKS_ENABLED: "false"
          PAYMENT_PROVIDER: "disabled"
          REDIS_ENABLED: "true"
          REDIS_URL: redis://127.0.0.1:6379

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

  gateway-static:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Validate gateway download links
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('fs');
          const html = fs.readFileSync('gateway/index.html', 'utf8');
          const config = JSON.parse(fs.readFileSync('gateway/vercel.json', 'utf8'));
          const requiredAssets = [
            'Aura-Marketplace-Windows-x64-Setup.exe',
            'Aura-Marketplace-Windows-arm64-Setup.exe',
            'Aura-Marketplace-Windows-ia32-Setup.exe',
            'Aura-Marketplace-Windows-x64-Portable.exe',
            'Aura-Marketplace-macOS-arm64.dmg',
            'Aura-Marketplace-macOS-x64.dmg',
            'Aura-Marketplace-macOS-arm64.zip',
            'Aura-Marketplace-macOS-x64.zip',
            'Aura-Marketplace-Linux-x86_64.AppImage',
            'Aura-Marketplace-Linux-amd64.deb',
            'Aura-Marketplace-Linux-x86_64.rpm',
            'Aura-Marketplace-Linux-x64.tar.gz',
            'Aura-Marketplace-Linux-arm64.AppImage',
            'Aura-Marketplace-Linux-arm64.deb',
            'Aura-Marketplace-Linux-aarch64.rpm',
            'Aura-Marketplace-Linux-arm64.tar.gz',
          ];
          if (html.includes('/releases/latest/download/')) {
            throw new Error('Gateway must not link directly to latest/download assets before release resolution.');
          }
          for (const asset of requiredAssets) {
            if (!html.includes(`data-release-asset="${asset}"`)) {
              throw new Error(`Missing gateway download resolver asset: ${asset}`);
            }
          }
          if (config.outputDirectory !== '.') {
            throw new Error('gateway/vercel.json must deploy the static gateway root as outputDirectory ".".');
          }
          EOF

  desktop-package-smoke:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix app ci

      - name: Build frontend for desktop packaging
        run: npm run desktop:frontend:build

      - name: Package Linux desktop directory smoke test
        run: npx electron-builder --linux dir --publish never
