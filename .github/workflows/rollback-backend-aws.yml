name: Rollback Backend AWS

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      rollback_ref:
        description: Explicit known-good backend release SHA to restore
        required: false
        default: ""
        type: string
      execute_rollback:
        description: Allow a trusted reusable-workflow caller to execute the rollback hook
        required: false
        default: false
        type: boolean
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: aws-backend-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rollback:
    name: Roll back backend on AWS
    runs-on: ubuntu-latest
    # The deploy role trusts the main-branch OIDC subject. A GitHub Environment
    # changes that subject, so do not add one without updating and verifying IAM.

    steps:
      - name: Checkout
        if: inputs.execute_rollback == true
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate explicit backend rollback release
        if: inputs.execute_rollback == true
        env:
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
        run: |
          set -euo pipefail
          [[ "${ROLLBACK_REF}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Backend rollback requires a full known-good release SHA." >&2
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Verify AWS rollback identity
        run: aws sts get-caller-identity --query Account --output text > /dev/null

      - name: Execute backend rollback hook
        if: inputs.execute_rollback == true
        env:
          ROLLBACK_REF: ${{ inputs.rollback_ref }}
          AWS_DEPLOY_BUCKET: ${{ vars.AWS_DEPLOY_BUCKET }}
          AWS_INSTANCE_TAG_VALUE: ${{ vars.AWS_INSTANCE_TAG_VALUE }}
          AWS_PARAMETER_STORE_PATH_PREFIX: ${{ vars.AWS_PARAMETER_STORE_PATH_PREFIX }}
        run: |
          set -euo pipefail

          if [ -f "infra/aws/rollback-backend.sh" ]; then
            bash infra/aws/rollback-backend.sh
          elif [ -f "infra/aws/rollback-backend.ps1" ]; then
            pwsh -NoLogo -NoProfile -File infra/aws/rollback-backend.ps1
          else
            echo "::error::Missing rollback hook: infra/aws/rollback-backend.sh or infra/aws/rollback-backend.ps1"
            echo "Create one hook that restores the previous backend artifact/configuration safely."
            exit 1
          fi

      - name: Confirm credential-only validation
        if: inputs.execute_rollback != true
        run: echo "AWS rollback credential validation passed; no rollback hook was executed."
