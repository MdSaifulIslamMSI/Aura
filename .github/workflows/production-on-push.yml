name: Production On Every Main Push

on:
  push:
    branches: ["main"]

permissions:
  actions: write
  checks: read
  contents: read

concurrency:
  group: aura-production-on-push-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x

jobs:
  production-preflight:
    name: Production push preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CI and auth contracts
        run: |
          npm run ci:doctor
          npm run auth:env:validate
          npm run auth:smoke

  deploy-backend:
    name: Dispatch backend production deploy
    needs: production-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch backend deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow deploy-backend-aws.yml
          --label "Backend production deploy"
          --ref "${{ github.ref_name }}"
          --sha "${{ github.sha }}"
          --timeout-minutes 70
          --inputs '{"git_ref":"${{ github.sha }}","skip_healthcheck":false}'

  deploy-storefront:
    name: Dispatch storefront production deploy
    needs: deploy-backend
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch storefront deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow deploy-netlify.yml
          --label "Storefront multi-host production deploy"
          --ref "${{ github.ref_name }}"
          --sha "${{ github.sha }}"
          --timeout-minutes 85
          --inputs '{"target":"production"}'

  deploy-gateway:
    name: Dispatch gateway production deploy
    needs: deploy-backend
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch gateway deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow deploy-gateway-vercel.yml
          --label "Gateway production deploy"
          --ref "${{ github.ref_name }}"
          --sha "${{ github.sha }}"
          --timeout-minutes 40
          --inputs '{"target":"production"}'
