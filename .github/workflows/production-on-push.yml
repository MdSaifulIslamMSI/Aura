name: Automatic Production Release On Main Push

on:
  push:
    branches: ["main"]

permissions:
  actions: write
  checks: read
  contents: read

concurrency:
  group: aura-production-on-push-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24.x

jobs:
  production-preflight:
    name: Production push preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CI and auth contracts
        run: |
          npm run ci:doctor
          npm run auth:env:validate
          npm run auth:smoke

  staging-promotion-gate:
    name: Staging promotion gate
    needs: production-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch staging validation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow staging-ops-watch.yml
          --label "Staging promotion gate"
          --ref "$DEPLOY_REF_NAME"
          --sha "$DEPLOY_SHA"
          --timeout-minutes 30

  deploy-backend:
    name: Dispatch backend production deploy
    needs: staging-promotion-gate
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch backend deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_INPUTS: '{"git_ref":"${{ github.sha }}","skip_healthcheck":false}'
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow deploy-backend-aws.yml
          --label "Backend production deploy"
          --ref "$DEPLOY_REF_NAME"
          --sha "$DEPLOY_SHA"
          --timeout-minutes 70
          --inputs "$DEPLOY_INPUTS"

  deploy-storefront:
    name: Dispatch storefront production deploy
    needs: staging-promotion-gate
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch storefront deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_INPUTS: '{"target":"production"}'
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow deploy-netlify.yml
          --label "Storefront multi-host production deploy"
          --ref "$DEPLOY_REF_NAME"
          --sha "$DEPLOY_SHA"
          --timeout-minutes 85
          --inputs "$DEPLOY_INPUTS"

  deploy-gateway:
    name: Dispatch gateway production deploy
    needs: staging-promotion-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch gateway deployment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_INPUTS: '{"target":"production"}'
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow deploy-gateway-vercel.yml
          --label "Gateway production deploy"
          --ref "$DEPLOY_REF_NAME"
          --sha "$DEPLOY_SHA"
          --timeout-minutes 40
          --inputs "$DEPLOY_INPUTS"

  release-desktop:
    name: Dispatch desktop production release
    needs:
      - deploy-backend
      - deploy-storefront
      - deploy-gateway
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch desktop release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          DESKTOP_RELEASE_INPUTS: '{"version":"","require_windows_signing":false,"require_macos_signing":false,"publish_store_release":false}'
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow desktop-release.yml
          --label "Desktop production release"
          --ref "$DEPLOY_REF_NAME"
          --sha "$DEPLOY_SHA"
          --timeout-minutes 145
          --inputs "$DESKTOP_RELEASE_INPUTS"

  release-mobile:
    name: Dispatch mobile production release
    needs:
      - deploy-backend
      - deploy-storefront
      - deploy-gateway
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Dispatch and watch mobile release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          MOBILE_RELEASE_INPUTS: '{"version":"","require_android_signing":false,"require_ios_signing":false,"publish_store_release":false}'
        run: >-
          node scripts/github/dispatch-workflow-and-watch.mjs
          --workflow mobile-release.yml
          --label "Mobile production release"
          --ref "$DEPLOY_REF_NAME"
          --sha "$DEPLOY_SHA"
          --timeout-minutes 145
          --inputs "$MOBILE_RELEASE_INPUTS"

  production-summary:
    name: Production push release summary
    if: always()
    needs:
      - production-preflight
      - staging-promotion-gate
      - deploy-backend
      - deploy-storefront
      - deploy-gateway
      - release-desktop
      - release-mobile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Write production push summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          PREFLIGHT_RESULT: ${{ needs.production-preflight.result }}
          STAGING_RESULT: ${{ needs.staging-promotion-gate.result }}
          BACKEND_RESULT: ${{ needs.deploy-backend.result }}
          STOREFRONT_RESULT: ${{ needs.deploy-storefront.result }}
          GATEWAY_RESULT: ${{ needs.deploy-gateway.result }}
          DESKTOP_RESULT: ${{ needs.release-desktop.result }}
          MOBILE_RESULT: ${{ needs.release-mobile.result }}
        run: |
          {
            echo "## Aura Production On Every Main Push"
            echo
            echo "| Lane | Result |"
            echo "|---|---|"
            echo "| Preflight: CI/auth contracts | ${PREFLIGHT_RESULT} |"
            echo "| Staging: same-commit promotion gate | ${STAGING_RESULT} |"
            echo "| Backend: AWS production deploy | ${BACKEND_RESULT} |"
            echo "| Storefront: Netlify/Vercel/AWS production deploy | ${STOREFRONT_RESULT} |"
            echo "| Gateway: Vercel production deploy | ${GATEWAY_RESULT} |"
            echo "| Desktop: Windows/macOS/Linux GitHub release | ${DESKTOP_RESULT} |"
            echo "| Mobile: Android/iOS GitHub release | ${MOBILE_RESULT} |"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Commit | ${COMMIT_SHA} |"
            echo "| Run | ${RUN_ID} |"
            echo "| Store publishing | Disabled by default; requires signed manual release inputs. |"
            echo "| Desktop signing | Disabled by default for internal GitHub release artifacts. |"
            echo "| Mobile signing | Disabled by default for internal GitHub release artifacts. |"
          } >> "$GITHUB_STEP_SUMMARY"
