services:
  mongo:
    image: mongo:8.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:8.0
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - bash
      - -lc
      - >
        mongosh --host mongo --quiet --eval
        "try { rs.status().ok } catch (error) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongo:27017' }]
          })
        }"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./server
    env_file:
      - ./server/.env
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/aura?replicaSet=rs0
      CORS_ORIGIN: http://localhost:5173
      APP_PUBLIC_URL: http://localhost:5173
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "true"
      SPLIT_RUNTIME_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      PAYMENT_PROVIDER: simulated
      ORDER_EMAILS_ENABLED: "false"
      ACTIVITY_EMAILS_ENABLED: "false"
      OTP_SMS_ENABLED: "false"
      CATALOG_DEFAULT_SYNC_PROVIDER: file
      CATALOG_PROVIDER_SOURCE_REF: data/catalog_1m.jsonl
      CATALOG_IMPORT_ALLOW_SYNTHETIC: "true"
      TEST_USE_IN_MEMORY_MONGO: "false"
      TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
      APP_BUILD_SHA: local-compose
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
    restart: unless-stopped

  worker:
    build:
      context: ./server
    env_file:
      - ./server/.env
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["node", "scripts/start_worker_runtime.js"]
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/aura?replicaSet=rs0
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "true"
      SPLIT_RUNTIME_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      PAYMENT_PROVIDER: simulated
      ORDER_EMAILS_ENABLED: "false"
      ACTIVITY_EMAILS_ENABLED: "false"
      OTP_SMS_ENABLED: "false"
      CATALOG_DEFAULT_SYNC_PROVIDER: file
      CATALOG_PROVIDER_SOURCE_REF: data/catalog_1m.jsonl
      CATALOG_IMPORT_ALLOW_SYNTHETIC: "true"
      TEST_USE_IN_MEMORY_MONGO: "false"
      TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
      APP_BUILD_SHA: local-compose
    volumes:
      - ./server:/app
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
