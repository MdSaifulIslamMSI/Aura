services:
  mongo:
    image: mongo:8.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:8.0
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - bash
      - -lc
      - >
        mongosh --host mongo --quiet --eval
        "try { rs.status().ok } catch (error) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongo:27017' }]
          })
        }"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  clamav:
    image: clamav/clamav:1.4
    profiles: ["malware-scan"]
    ports:
      - "3310:3310"
    volumes:
      - clamav-db:/var/lib/clamav
    restart: unless-stopped

  backend:
    build:
      context: ./server
    env_file:
      - ./server/.env
      - path: ./.student-pack.local.env
        required: false
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/aura?replicaSet=rs0
      CORS_ORIGIN: http://localhost:5173
      APP_PUBLIC_URL: http://localhost:5173
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "true"
      SPLIT_RUNTIME_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      PAYMENT_PROVIDER: simulated
      FIREBASE_SERVICE_ACCOUNT_FILE: ""
      GOOGLE_APPLICATION_CREDENTIALS: ""
      ORDER_EMAILS_ENABLED: "false"
      ACTIVITY_EMAILS_ENABLED: "false"
      OTP_SMS_ENABLED: "false"
      CATALOG_DEFAULT_SYNC_PROVIDER: file
      CATALOG_PROVIDER_SOURCE_REF: data/catalog_1m.jsonl
      CATALOG_IMPORT_ALLOW_SYNTHETIC: "true"
      TEST_USE_IN_MEMORY_MONGO: "false"
      TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
      APP_BUILD_SHA: local-compose
      STUDENT_PACK_SECURITY_HARNESS_ENABLED: "true"
      STUDENT_PACK_SECURITY_HARNESS_PUBLIC: "true"
      STUDENT_PACK_LIVE_AUTH_REPORT_PATH: /workspace/.run-logs/student-pack-live-auth.json
      UPLOAD_MALWARE_SCAN_ENABLED: ${UPLOAD_MALWARE_SCAN_ENABLED:-false}
      UPLOAD_MALWARE_SCAN_FAIL_CLOSED: ${UPLOAD_MALWARE_SCAN_FAIL_CLOSED:-true}
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      YARA_ENABLED: ${YARA_ENABLED:-false}
      YARA_RULES_PATH: ${YARA_RULES_PATH:-/security/yara-rules}
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - ./.run-logs:/workspace/.run-logs:ro
      - ./infra/security/yara-rules:/security/yara-rules:ro
    restart: unless-stopped

  worker:
    build:
      context: ./server
    env_file:
      - ./server/.env
      - path: ./.student-pack.local.env
        required: false
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["node", "scripts/start_worker_runtime.js"]
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/aura?replicaSet=rs0
      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "true"
      SPLIT_RUNTIME_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      PAYMENT_PROVIDER: simulated
      FIREBASE_SERVICE_ACCOUNT_FILE: ""
      GOOGLE_APPLICATION_CREDENTIALS: ""
      ORDER_EMAILS_ENABLED: "false"
      ACTIVITY_EMAILS_ENABLED: "false"
      OTP_SMS_ENABLED: "false"
      CATALOG_DEFAULT_SYNC_PROVIDER: file
      CATALOG_PROVIDER_SOURCE_REF: data/catalog_1m.jsonl
      CATALOG_IMPORT_ALLOW_SYNTHETIC: "true"
      TEST_USE_IN_MEMORY_MONGO: "false"
      TEST_FALLBACK_TO_IN_MEMORY_MONGO: "false"
      APP_BUILD_SHA: local-compose
      STUDENT_PACK_SECURITY_HARNESS_ENABLED: "true"
      STUDENT_PACK_SECURITY_HARNESS_PUBLIC: "true"
      STUDENT_PACK_LIVE_AUTH_REPORT_PATH: /workspace/.run-logs/student-pack-live-auth.json
      UPLOAD_MALWARE_SCAN_ENABLED: ${UPLOAD_MALWARE_SCAN_ENABLED:-false}
      UPLOAD_MALWARE_SCAN_FAIL_CLOSED: ${UPLOAD_MALWARE_SCAN_FAIL_CLOSED:-true}
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      YARA_ENABLED: ${YARA_ENABLED:-false}
      YARA_RULES_PATH: ${YARA_RULES_PATH:-/security/yara-rules}
    volumes:
      - ./server:/app
      - ./.run-logs:/workspace/.run-logs:ro
      - ./infra/security/yara-rules:/security/yara-rules:ro
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  clamav-db:
