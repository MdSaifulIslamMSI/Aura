replicaCount: 3

image:
  repository: ghcr.io/owner/aura-api
  tag: "1.1.0-production"

env:
  APP_ENV: production
  NODE_ENV: production
  PORT: "5000"
  APP_BASE_URL: https://www.example.invalid
  API_BASE_URL: https://api.example.invalid
  LOG_LEVEL: info
  HEALTHCHECK_PATH: /health
  CORS_ORIGINS: https://www.example.invalid
  OTEL_SERVICE_NAME: aura-marketplace-api
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  METRICS_ENABLED: "true"
  METRICS_PATH: /metrics

ingress:
  hosts:
    - host: api.example.invalid
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: aura-api-tls
      hosts:
        - api.example.invalid

autoscaling:
  minReplicas: 3
  maxReplicas: 10

podDisruptionBudget:
  minAvailable: 2
