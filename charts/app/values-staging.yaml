replicaCount: 2

image:
  repository: ghcr.io/owner/aura-api
  tag: "1.1.0-staging"

env:
  APP_ENV: staging
  NODE_ENV: production
  PORT: "5000"
  APP_BASE_URL: https://staging.example.invalid
  API_BASE_URL: https://api.staging.example.invalid
  LOG_LEVEL: info
  HEALTHCHECK_PATH: /health
  CORS_ORIGINS: https://staging.example.invalid
  OTEL_SERVICE_NAME: aura-marketplace-api
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4318
  METRICS_ENABLED: "true"
  METRICS_PATH: /metrics

ingress:
  hosts:
    - host: api.staging.example.invalid
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: aura-api-tls
      hosts:
        - api.staging.example.invalid

autoscaling:
  minReplicas: 2
  maxReplicas: 5
