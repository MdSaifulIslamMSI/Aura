apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aura-api-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: aura-api
    app.kubernetes.io/part-of: aura-marketplace
    environment: production
  annotations:
    aura.devops/example-only: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/MdSaifulIslamMSI/Aura.git
    targetRevision: main
    path: charts/app
    helm:
      releaseName: aura-api
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aura-production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
