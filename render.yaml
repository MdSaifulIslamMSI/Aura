services:
  - type: web
    name: aura-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: SPLIT_RUNTIME_ENABLED
        value: "true"
      - key: REDIS_ENABLED
        value: "true"
      - key: REDIS_REQUIRED
        value: "true"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: aura-redis
          property: connectionString
      - key: REDIS_PREFIX
        value: aura
      - key: JSON_BODY_LIMIT
        value: 12mb
      - key: UPLOAD_STORAGE_DRIVER
        value: local
      - key: REVIEW_UPLOAD_DIR
        value: /opt/render/project/src/server/uploads/reviews
      - key: CORS_ORIGIN
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: BYTEZ_API_KEY
        sync: false
      - key: UPLOAD_SIGNING_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true

  - type: keyvalue
    name: aura-redis
    plan: free
    region: singapore
    ipAllowList: []
