services:
  - type: web
    name: aura-api
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm ci --production
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: SPLIT_RUNTIME_ENABLED
        value: "true"
      - key: REDIS_ENABLED
        value: "false"
      - key: REDIS_REQUIRED
        value: "false"
      - key: DISTRIBUTED_SECURITY_CONTROLS_ENABLED
        value: "false"
      - key: REDIS_URL
        fromDatabase:
          name: aura-redis
          property: connectionString
      - key: REDIS_PREFIX
        value: aura
      - key: JSON_BODY_LIMIT
        value: 12mb
      - key: UPLOAD_STORAGE_DRIVER
        value: local
      - key: REVIEW_UPLOAD_DIR
        value: /opt/render/project/src/server/uploads/reviews
      - key: CORS_ORIGIN
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: AUTH_VAULT_SECRET
        sync: false
      - key: AUTH_VAULT_SECRET_VERSION
        value: v1
      - key: AUTH_VAULT_PREVIOUS_SECRETS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GROQ_CHAT_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_AUDIO_MODEL
        value: whisper-large-v3-turbo
      - key: VOYAGE_TEXT_EMBEDDING_MODEL
        value: voyage-3.5-lite
      - key: VOYAGE_RERANK_MODEL
        value: rerank-2.5-lite
      - key: ELEVENLABS_MODEL
        value: eleven_flash_v2_5
      - key: AI_DEFAULT_LOCALE
        value: en-IN
      - key: ORDER_EMAIL_PROVIDER
        value: "null"
      - key: ORDER_EMAILS_ENABLED
        value: "true"
      - key: ORDER_EMAIL_FROM_NAME
        value: "Aura Marketplace"
      - key: ORDER_EMAIL_FROM_ADDRESS
        sync: false
      - key: ORDER_EMAIL_REPLY_TO
        sync: false
      - key: ORDER_EMAIL_ALERT_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOAD_SIGNING_SECRET
        generateValue: true
      - key: OTP_FLOW_SECRET
        generateValue: true
      - key: OTP_CHALLENGE_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true


databases:
  - name: aura-redis
    plan: free
    region: singapore
