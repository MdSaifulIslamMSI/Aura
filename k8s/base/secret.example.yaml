apiVersion: v1
kind: Secret
metadata:
  name: aura-api-secrets
  namespace: aura-staging
  labels:
    app.kubernetes.io/name: aura-api
    app.kubernetes.io/part-of: aura-marketplace
type: Opaque
stringData:
  DATABASE_URL: mongodb://staging-mongo.example.invalid:27017/aura
  MONGO_URI: mongodb://staging-mongo.example.invalid:27017/aura
  REDIS_URL: redis://staging-redis.example.invalid:6379
  OBJECT_STORAGE_BUCKET: aura-staging-uploads-example
  HEALTH_READY_TOKEN: replace-with-cluster-secret
  OTP_FLOW_SECRET: replace-with-cluster-secret
  OTP_CHALLENGE_SECRET: replace-with-cluster-secret
  UPLOAD_SIGNING_SECRET: replace-with-cluster-secret
  AUTH_VAULT_SECRET: replace-with-cluster-secret
