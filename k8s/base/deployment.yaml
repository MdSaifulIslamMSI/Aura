apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-api
  namespace: aura-staging
  labels:
    app.kubernetes.io/name: aura-api
    app.kubernetes.io/part-of: aura-marketplace
    app.kubernetes.io/version: "1.1.0"
  annotations:
    checkov.io/skip1: CKV_K8S_35=Runtime configuration intentionally comes from ConfigMap and Kubernetes Secret refs.
    checkov.io/skip2: CKV_K8S_43=Base manifest uses a version tag as a deploy template; promoted images are controlled by release automation.
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: aura-api
      app.kubernetes.io/part-of: aura-marketplace
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aura-api
        app.kubernetes.io/part-of: aura-marketplace
        app.kubernetes.io/version: "1.1.0"
      annotations:
        container.apparmor.security.beta.kubernetes.io/api: runtime/default
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "5000"
    spec:
      serviceAccountName: aura-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/owner/aura-api:1.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: aura-api-config
            - secretRef:
                name: aura-api-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: uploads
              mountPath: /app/server/uploads
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: uploads
          emptyDir: {}
        - name: tmp
          emptyDir: {}
