AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Aura IAM + S3 bootstrap. Deploys once from the AWS Console or CLI with
  admin credentials to grant the aura-local-emergency-ops role full access
  to Aura S3 buckets, IAM resources, EC2, and Parameter Store.

Parameters:
  MediaBucketName:
    Type: String
    Default: aura-review-media
    Description: S3 bucket for user-uploaded review media
  DeployBucketName:
    Type: String
    Default: aura-backend-deployments
    Description: S3 bucket for backend deployment artifacts
  RoleName:
    Type: String
    Default: aura-local-emergency-ops
    Description: Existing IAM role name to receive permissions
  AwsRegion:
    Type: String
    Default: ap-south-1

Resources:
  AuraS3KmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Aura S3 bucket encryption key
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: AllowAuraRoleBucketCrypto
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${RoleName}'
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
              - kms:ReEncryptFrom
              - kms:ReEncryptTo
            Resource: '*'

  AuraS3KmsAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/aura-s3-bootstrap
      TargetKeyId: !Ref AuraS3KmsKey

  # ── S3 Buckets ────────────────────────────────────────────────────────────────
  AccessLogBucket:
    Type: AWS::S3::Bucket
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: Dedicated destination for S3 server access logs.
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAccessLogs
            Status: Enabled
            ExpirationInDays: 90
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: App
          Value: Aura
        - Key: Purpose
          Value: s3-access-logs

  AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3ServerAccessLogs
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AccessLogBucket.Arn}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn:
                  - !Sub 'arn:aws:s3:::${MediaBucketName}'
                  - !Sub 'arn:aws:s3:::${DeployBucketName}'

  ReviewMediaBucket:
    Type: AWS::S3::Bucket
    DependsOn: AccessLogBucketPolicy
    Properties:
      BucketName: !Ref MediaBucketName
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: review-media/
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref AuraS3KmsKey
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: App
          Value: Aura
        - Key: Purpose
          Value: review-media

  DeployBucket:
    Type: AWS::S3::Bucket
    DependsOn: AccessLogBucketPolicy
    Properties:
      BucketName: !Ref DeployBucketName
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: deploy-artifacts/
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref AuraS3KmsKey
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireDeployArtifacts
            Status: Enabled
            Prefix: releases/
            ExpirationInDays: 14
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: App
          Value: Aura
        - Key: Purpose
          Value: deploy-artifacts

  # ── IAM Policy for the existing role ──────────────────────────────────────────
  AuraResourcePolicy:
    Type: AWS::IAM::Policy
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_111
            comment: Bootstrap EC2 create and describe actions require Resource '*'; IAM, S3, KMS, and SSM permissions remain scoped.
    Properties:
      PolicyName: AuraResourceAccess
      Roles:
        - !Ref RoleName
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AuraS3Full
            Effect: Allow
            Action:
              - s3:AbortMultipartUpload
              - s3:DeleteObject
              - s3:DeleteObjectVersion
              - s3:GetBucketLocation
              - s3:GetBucketVersioning
              - s3:GetObject
              - s3:GetObjectTagging
              - s3:GetObjectVersion
              - s3:ListBucket
              - s3:ListBucketMultipartUploads
              - s3:ListMultipartUploadParts
              - s3:PutObject
              - s3:PutObjectTagging
            Resource:
              - !Sub 'arn:aws:s3:::${MediaBucketName}'
              - !Sub 'arn:aws:s3:::${MediaBucketName}/*'
              - !Sub 'arn:aws:s3:::${DeployBucketName}'
              - !Sub 'arn:aws:s3:::${DeployBucketName}/*'
          - Sid: AuraS3KmsUse
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
              - kms:ReEncryptFrom
              - kms:ReEncryptTo
            Resource: !GetAtt AuraS3KmsKey.Arn
          - Sid: AuraIAMBootstrap
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:GetRole
              - iam:PutRolePolicy
              - iam:AttachRolePolicy
              - iam:CreateInstanceProfile
              - iam:GetInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
              - iam:PassRole
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:role/aura-*'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/aura-*'
            Condition:
              StringEquals:
                iam:PassedToService: ec2.amazonaws.com
          - Sid: AuraEC2Bootstrap
            Effect: Allow
            Action:
              - ec2:DescribeVpcs
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:CreateSecurityGroup
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:DescribeInstanceTypes
              - ec2:DescribeInstances
              - ec2:RunInstances
              - ec2:StartInstances
              - ec2:CreateTags
            Resource: '*'
          - Sid: AuraSSM
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParametersByPath
              - ssm:PutParameter
              - ssm:DeleteParameter
            Resource: !Sub 'arn:aws:ssm:${AwsRegion}:${AWS::AccountId}:parameter/aura/*'

Outputs:
  ReviewMediaBucketArn:
    Value: !GetAtt ReviewMediaBucket.Arn
  DeployBucketArn:
    Value: !GetAtt DeployBucket.Arn
  PolicyName:
    Value: AuraResourceAccess
