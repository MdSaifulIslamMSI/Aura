services:
  api:
    image: ${AURA_BACKEND_IMAGE:?AURA_BACKEND_IMAGE is required}
    restart: unless-stopped
    command: ["node", "scripts/start_api_runtime.js"]
    env_file:
      - /opt/aura/shared/base.env
      - /opt/aura/shared/runtime-secrets.env
      - /opt/aura/shared/release.env
    environment:
      NODE_ENV: production
      PORT: 5000
      SPLIT_RUNTIME_ENABLED: "true"
      ORDER_EMAIL_PROVIDER: gmail
      AI_PUBLIC_CHAT_ACCESS_ENABLED: ${AI_PUBLIC_CHAT_ACCESS_ENABLED:-false}
      AI_PUBLIC_VOICE_ACCESS_ENABLED: ${AI_PUBLIC_VOICE_ACCESS_ENABLED:-false}
      AI_CHAT_TIMEOUT_MS: ${AI_CHAT_TIMEOUT_MS:-45000}
      AI_MODEL_PROVIDER: disabled
      AI_MODEL_PROVIDER_FALLBACKS: ""
      ASSISTANT_COMMERCE_REQUIRE_HOSTED_GEMMA: "false"
      ASSISTANT_COMMERCE_MODEL_SUMMARY_ENABLED: "false"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_CHAT_MODEL_FALLBACKS: ""
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-all-minilm}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-300000}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      AUTH_DEVICE_CHALLENGE_MODE: admin
      AUTH_DEVICE_CHALLENGE_ALLOW_VAULT_FALLBACK: "true"
      ADMIN_REQUIRE_PASSKEY: "true"
      UPLOAD_MALWARE_SCAN_ENABLED: ${UPLOAD_MALWARE_SCAN_ENABLED:-false}
      UPLOAD_MALWARE_SCAN_FAIL_CLOSED: ${UPLOAD_MALWARE_SCAN_FAIL_CLOSED:-true}
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      YARA_ENABLED: ${YARA_ENABLED:-false}
      YARA_RULES_PATH: ${YARA_RULES_PATH:-/security/yara-rules}
    depends_on:
      - redis
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - aura-uploads:/app/uploads
      - /opt/aura/security/yara-rules:/security/yara-rules:ro

  edge:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - /opt/aura/shared/base.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - aura-caddy-data:/data
      - aura-caddy-config:/config

  worker:
    image: ${AURA_BACKEND_IMAGE:?AURA_BACKEND_IMAGE is required}
    restart: unless-stopped
    command: ["node", "scripts/start_worker_runtime.js"]
    env_file:
      - /opt/aura/shared/base.env
      - /opt/aura/shared/runtime-secrets.env
      - /opt/aura/shared/release.env
    environment:
      NODE_ENV: production
      SPLIT_RUNTIME_ENABLED: "true"
      PORT: 8080
      WORKER_HEALTH_PORT: 8080
      ORDER_EMAIL_PROVIDER: gmail
      AI_MODEL_PROVIDER: disabled
      AI_MODEL_PROVIDER_FALLBACKS: ""
      ASSISTANT_COMMERCE_REQUIRE_HOSTED_GEMMA: "false"
      ASSISTANT_COMMERCE_MODEL_SUMMARY_ENABLED: "false"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_CHAT_MODEL_FALLBACKS: ""
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-all-minilm}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-300000}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      UPLOAD_MALWARE_SCAN_ENABLED: ${UPLOAD_MALWARE_SCAN_ENABLED:-false}
      UPLOAD_MALWARE_SCAN_FAIL_CLOSED: ${UPLOAD_MALWARE_SCAN_FAIL_CLOSED:-true}
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-false}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      YARA_ENABLED: ${YARA_ENABLED:-false}
      YARA_RULES_PATH: ${YARA_RULES_PATH:-/security/yara-rules}
    depends_on:
      - redis
    volumes:
      - aura-uploads:/app/uploads
      - /opt/aura/security/yara-rules:/security/yara-rules:ro

  clamav:
    image: clamav/clamav:1.4
    profiles: ["malware-scan"]
    restart: unless-stopped
    volumes:
      - aura-clamav-db:/var/lib/clamav

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-15m}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-all-minilm}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-1024}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-q8_0}
      OLLAMA_NO_CLOUD: ${OLLAMA_NO_CLOUD:-1}
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        ollama serve &
        pid=$$!
        until OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1; do
          sleep 2
        done
        OLLAMA_HOST=http://127.0.0.1:11434 ollama pull "$${OLLAMA_CHAT_MODEL:-llama3.2:3b}" || true
        OLLAMA_HOST=http://127.0.0.1:11434 ollama pull "$${OLLAMA_EMBED_MODEL:-all-minilm}" || true
        wait "$$pid"
    volumes:
      - aura-ollama:/root/.ollama

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - aura-redis:/data

volumes:
  aura-redis:
  aura-ollama:
  aura-uploads:
  aura-clamav-db:
  aura-caddy-data:
  aura-caddy-config:
