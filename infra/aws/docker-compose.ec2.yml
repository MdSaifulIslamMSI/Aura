services:
  api:
    image: ${AURA_BACKEND_IMAGE:?AURA_BACKEND_IMAGE is required}
    restart: unless-stopped
    command: ["node", "scripts/start_api_runtime.js"]
    env_file:
      - /opt/aura/shared/base.env
      - /opt/aura/shared/runtime-secrets.env
      - /opt/aura/shared/release.env
    environment:
      NODE_ENV: production
      PORT: 5000
      SPLIT_RUNTIME_ENABLED: "true"
      ORDER_EMAIL_PROVIDER: gmail
      AUTH_DEVICE_CHALLENGE_MODE: admin
      AUTH_DEVICE_CHALLENGE_ALLOW_VAULT_FALLBACK: "true"
      ADMIN_REQUIRE_PASSKEY: "true"
    depends_on:
      - redis
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - aura-uploads:/app/uploads

  edge:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - /opt/aura/shared/base.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - aura-caddy-data:/data
      - aura-caddy-config:/config

  worker:
    image: ${AURA_BACKEND_IMAGE:?AURA_BACKEND_IMAGE is required}
    restart: unless-stopped
    command: ["node", "scripts/start_worker_runtime.js"]
    env_file:
      - /opt/aura/shared/base.env
      - /opt/aura/shared/runtime-secrets.env
      - /opt/aura/shared/release.env
    environment:
      NODE_ENV: production
      SPLIT_RUNTIME_ENABLED: "true"
      WORKER_HEALTH_PORT: 8080
      ORDER_EMAIL_PROVIDER: gmail
    depends_on:
      - redis
    volumes:
      - aura-uploads:/app/uploads

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - aura-redis:/data

volumes:
  aura-redis:
  aura-uploads:
  aura-caddy-data:
  aura-caddy-config:
