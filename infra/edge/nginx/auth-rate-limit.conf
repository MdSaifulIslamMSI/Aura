# Include this file from the nginx `http` context.
# It is a first-layer throttle only; app-level Redis rate limits remain required.

map $http_cf_connecting_ip $aura_client_ip {
    default $remote_addr;
    "~.+" $http_cf_connecting_ip;
}

limit_req_zone $aura_client_ip zone=aura_login_ip:50m rate=5r/m;
limit_req_zone $aura_client_ip zone=aura_signup_ip:50m rate=3r/m;
limit_req_zone $aura_client_ip zone=aura_recovery_ip:50m rate=3r/m;
limit_req_zone $aura_client_ip zone=aura_refresh_ip:50m rate=20r/m;
limit_req_zone $binary_remote_addr zone=aura_admin_ip:20m rate=2r/m;
limit_req_zone $http_user_agent zone=aura_user_agent:50m rate=60r/m;

limit_conn_zone $aura_client_ip zone=aura_client_conn:20m;

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    limit_conn aura_client_conn 20;

    location = /api/auth/login {
        limit_req zone=aura_login_ip burst=10 nodelay;
        limit_req zone=aura_user_agent burst=30 nodelay;
        proxy_pass http://aura_waf;
    }

    location = /api/auth/register {
        limit_req zone=aura_signup_ip burst=5 nodelay;
        limit_req zone=aura_user_agent burst=20 nodelay;
        proxy_pass http://aura_waf;
    }

    location ~ ^/api/(otp|auth)/(reset-password|check-user|recovery-codes|forgot-password) {
        limit_req zone=aura_recovery_ip burst=5 nodelay;
        proxy_pass http://aura_waf;
    }

    location = /api/auth/refresh {
        limit_req zone=aura_refresh_ip burst=20 nodelay;
        proxy_pass http://aura_waf;
    }

    location ^~ /api/admin/ {
        limit_req zone=aura_admin_ip burst=4 nodelay;
        proxy_pass http://aura_waf;
    }

    location / {
        proxy_pass http://aura_waf;
    }
}
