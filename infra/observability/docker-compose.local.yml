services:
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - aura-prometheus-data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana-oss:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - aura-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  aura-prometheus-data:
  aura-grafana-data:
