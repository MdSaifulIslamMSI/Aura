groups:
  - name: aura-login-security
    interval: 30s
    rules:
      - alert: AuraAuthLoginFailureSpike
        expr: sum(increase(aura_auth_security_events_total{event="login_failure"}[5m])) > 25
        for: 2m
        labels:
          severity: warning
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura login failures are spiking
          description: More than 25 login failures were recorded in the last 5 minutes.

      - alert: AuraAuthOtpVerifyFailureSpike
        expr: sum(increase(aura_auth_security_events_total{event="otp_verify",outcome="failure"}[5m])) > 50
        for: 2m
        labels:
          severity: warning
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura OTP verification failures are spiking
          description: More than 50 OTP verification failures were recorded in the last 5 minutes.

      - alert: AuraAuthRecoveryCodeAbuse
        expr: sum(increase(aura_auth_security_events_total{event="recovery_code",outcome="failure"}[15m])) > 3
        for: 1m
        labels:
          severity: critical
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura recovery-code failures need review
          description: More than 3 recovery-code failures were recorded in the last 15 minutes.

      - alert: AuraAuthAdminAccessBlocked
        expr: sum(increase(aura_auth_security_events_total{event="admin_access_blocked"}[10m])) > 1
        for: 1m
        labels:
          severity: critical
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura admin access blocks need review
          description: More than 1 admin access block was recorded in the last 10 minutes.

      - alert: AuraAuthCsrfRejectionBurst
        expr: sum(increase(aura_auth_security_events_total{event="csrf_rejected"}[5m])) > 25
        for: 2m
        labels:
          severity: warning
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura CSRF rejections are elevated
          description: More than 25 CSRF rejections were recorded in the last 5 minutes.

      - alert: AuraAuthTrustedDeviceVerifyFailureSpike
        expr: sum(increase(aura_auth_security_events_total{event="trusted_device_verify",outcome="failure"}[10m])) > 10
        for: 2m
        labels:
          severity: warning
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura trusted-device verification failures are elevated
          description: More than 10 trusted-device verification failures were recorded in the last 10 minutes.

      - alert: AuraAuthAdminTrustedDeviceVerifyFailure
        expr: sum(increase(aura_auth_security_events_total{event="trusted_device_verify",outcome="failure",audience="admin"}[10m])) > 2
        for: 1m
        labels:
          severity: critical
          domain: auth
          runbook: trusted-device-v2-rollout
        annotations:
          summary: Admin trusted-device verification failures are elevated
          description: More than 2 admin trusted-device verification failures were recorded in 10 minutes; pause the admin cohort.

      - alert: AuraAuthPublicTrustedDeviceFailureRatio
        expr: (sum(rate(aura_auth_security_events_total{event="trusted_device_verify",outcome="failure",audience="public"}[10m])) / clamp_min(sum(rate(aura_auth_security_events_total{event="trusted_device_verify",audience="public"}[10m])), 0.001)) > 0.15 and sum(increase(aura_auth_security_events_total{event="trusted_device_verify",audience="public"}[10m])) > 20
        for: 5m
        labels:
          severity: warning
          domain: auth
          runbook: trusted-device-v2-rollout
        annotations:
          summary: Public trusted-device verification failure ratio is elevated
          description: More than 15 percent of at least 20 public verifications failed over 10 minutes; stop widening the public cohort.

      - alert: AuraAuthTrustedDeviceRevocationFailure
        expr: sum(increase(aura_auth_security_events_total{event=~"trusted_device[.]revoked|trusted_device[.]others_revoked",outcome=~"failure|blocked"}[10m])) > 0
        for: 0m
        labels:
          severity: critical
          domain: auth
          runbook: trusted-device-v2-rollout
        annotations:
          summary: Trusted-device revocation failed
          description: A device revocation or revoke-others operation failed; halt trusted-device rollout until session invalidation is restored.

      - alert: AuraAuthTrustedDeviceV2ShadowMismatch
        expr: sum(increase(aura_auth_security_events_total{event="trusted_device_v2_shadow_compare",outcome="failure"}[10m])) > 0
        for: 0m
        labels:
          severity: critical
          domain: auth
          runbook: trusted-device-v2-rollout
        annotations:
          summary: Trusted-device V2 shadow comparison drifted
          description: Legacy and V2 trust decisions disagreed; keep V2 reads disabled and investigate the mismatch.

      - alert: AuraAuthTrustedDeviceV2WriteFailure
        expr: sum(increase(aura_auth_security_events_total{event=~"trusted_device_v2_dual_write|trusted_device_v2_metadata_write|trusted_device_v2_bulk_revoke",outcome="failure"}[10m])) > 0
        for: 0m
        labels:
          severity: critical
          domain: auth
          runbook: trusted-device-v2-rollout
        annotations:
          summary: Trusted-device V2 dual-write drift detected
          description: A V2 credential or lifecycle mirror failed; keep V2 reads disabled and repair the cohort before widening rollout.

      - alert: AuraAuthStepUpPressure
        expr: sum(increase(aura_auth_security_events_total{event="step_up_required"}[10m])) > 25
        for: 5m
        labels:
          severity: info
          domain: auth
          runbook: login-security-observability
        annotations:
          summary: Aura step-up requirements are elevated
          description: More than 25 step-up requirements were recorded in the last 10 minutes.

      - alert: AuraUploadMalwareBlocked
        expr: sum(increase(aura_upload_security_events_total{event="malware_blocked"}[15m])) > 0
        for: 0m
        labels:
          severity: critical
          domain: uploads
          runbook: upload-security-observability
        annotations:
          summary: Aura blocked an infected upload
          description: At least one upload was blocked by the malware scan gate in the last 15 minutes.

      - alert: AuraUploadScanUnavailable
        expr: sum(increase(aura_upload_security_events_total{event="malware_scan_unavailable"}[10m])) > 0
        for: 1m
        labels:
          severity: critical
          domain: uploads
          runbook: upload-security-observability
        annotations:
          summary: Aura upload malware scanning is unavailable
          description: The upload scan gate failed closed for at least one upload in the last 10 minutes.

      - alert: AuraUploadMimeMismatchBurst
        expr: sum(increase(aura_upload_security_events_total{event=~"magic_mismatch|mime_mismatch|unsupported_mime|unsupported_extension"}[10m])) > 10
        for: 2m
        labels:
          severity: warning
          domain: uploads
          runbook: upload-security-observability
        annotations:
          summary: Aura upload validation mismatches are elevated
          description: More than 10 MIME, extension, or magic-byte upload mismatches were blocked in the last 10 minutes.
