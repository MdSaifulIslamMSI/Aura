services:
  sonarqube-db:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:?Set SONAR_DB_NAME in .env}
      POSTGRES_USER: ${SONAR_DB_USER:?Set SONAR_DB_USER in .env}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:?}
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:?Set SONAR_DB_USER in .env} -d ${SONAR_DB_NAME:?Set SONAR_DB_NAME in .env}"]
      interval: 10s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/${SONAR_DB_NAME:?Set SONAR_DB_NAME in .env}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:?Set SONAR_DB_USER in .env}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:?}
    ports:
      - "${SONAR_PORT:-9000}:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs

volumes:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
