[databases]
app = host=postgres port=5432 dbname=app

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
reserve_pool_size = 5
server_idle_timeout = 60
server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits

; Health check:
; psql "postgres://app:password@localhost:6432/app" -c "SHOW POOLS;"
;
; Warning:
; Transaction pooling can be incompatible with prepared statements,
; session variables, advisory locks, LISTEN/NOTIFY, and some ORM session
; assumptions. Validate ORM behavior before production use.
