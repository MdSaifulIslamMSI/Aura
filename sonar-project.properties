sonar.projectKey=aura
sonar.projectName=Aura
sonar.sourceEncoding=UTF-8

sonar.sources=app/src,server,desktop,gateway,scripts
sonar.tests=app/src,app/e2e,server/tests
sonar.test.inclusions=app/src/**/*.test.js,app/src/**/*.test.jsx,app/e2e/**/*.spec.js,server/tests/**/*.test.js
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.cache/**,**/.trivycache/**,**/desktop-release/**,**/generated/**,**/output/**,**/reports/**,**/security-reports/**,app/android/**,app/ios/**,server/data/**,server/uploads/**,app/src/**/*.test.js,app/src/**/*.test.jsx,server/tests/**
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,app/coverage/lcov.info
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
