name: aura-payment-foundation

services:
  payment-postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: aura_payments
      POSTGRES_USER: aura_payments
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD:-local-only-password}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_payments -d aura_payments"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data

  payment-redpanda:
    image: redpandadata/redpanda:v24.2.10
    profiles: ["kafka"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  payment-temporal:
    image: temporalio/auto-setup:1.24
    profiles: ["temporal"]
    environment:
      DB: sqlite
    ports:
      - "7233:7233"

  payment-openbao:
    image: openbao/openbao:2.0
    profiles: ["openbao"]
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_ROOT_TOKEN_ID:-}
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    ports:
      - "8200:8200"

  payment-prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro

  payment-grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  payment-postgres-data:
